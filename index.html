 конфликта.</li><li>При конфликте - разделить стороны физически (разные зоны/задачи), затем поговорить отдельно с каждым.</li><li>Если конфликт серьёзный или повторяющийся - сообщить управляющему для более глубокого разбора.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Два сотрудника на смене начинают открыто спорить из-за того, кто должен выполнять менее приятную задачу (уборка туалета), прямо в зале, где это могут услышать Гости. Разбор. Публичный конфликт между сотрудниками сильно вредит впечатлению Гостей и требует немедленного, но спокойного вмешательства, а не разбирательства «кто прав» прямо в моменте на глазах у всех. Действия. 1) Сразу развести сотрудников по разным задачам/зонам, не разбирая конфликт публично. 2) В свободную минуту поговорить с каждым отдельно, понять причину. 3) Если конфликт повторяющийся - обязательно сообщить управляющему для системного решения (например, пересмотра распределения неприятных задач).</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - пытаться разрешить конфликт «здесь и сейчас» публично, требуя от сотрудников немедленно помириться на глазах у Гостей.</div></div><h3>КОНТРОЛЬ И ДИСЦИПЛИНА</h3><h4>11. Контролировать соблюдение сотрудниками правил внутреннего трудового распорядка (ПВТР) на смене</h4><p class="kb-italic">Что это значит на практике: Менеджер - тот, кто видит дисциплину в реальном времени: опоздания, незапланированные перерывы, использование телефона в рабочее время.</p><p><strong>Как действовать:</strong></p><ul><li>Отмечать факт начала и окончания работы каждого сотрудника на смене.</li><li>Реагировать на нарушение сразу, но без излишней драматизации по мелочам.</li><li>Применять правило одинаково ко всем сотрудникам без исключений.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник несколько раз за смену проверяет личный телефон в рабочей зоне, хотя это запрещено правилами точки. Разбор. Если не сделать замечание сразу, поведение закрепится и станет восприниматься как норма, особенно если другие сотрудники это видят. Действия. 1) Спокойно, без публичного выговора, напомнить сотруднику правило в моменте. 2) Если ситуация повторяется в течение смены - сделать более серьёзное предупреждение и зафиксировать для управляющего. 3) Применять то же правило ко всем сотрудникам смены одинаково.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - закрывать глаза на мелкие нарушения у «удобных» сотрудников, создавая ощущение несправедливости у остальной команды.</div></div><h4>12. Контролировать соблюдение сотрудниками правил охраны труда и техники безопасности на смене</h4><p class="kb-italic">Что это значит на практике: Прямой контроль безопасности людей в моменте - задача менеджера, потому что только он физически видит, как именно сотрудники работают с оборудованием на этой смене.</p><p><strong>Как действовать:</strong></p><ul><li>Следить за использованием защитных средств при работе с горячим оборудованием, острыми предметами.</li><li>Реагировать немедленно на любое нарушение, не дожидаясь, что «обойдётся».</li><li>Поддерживать порядок на полу (отсутствие пролитой жидкости, скользких поверхностей).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. На полу за баром пролита вода, и сотрудники продолжают ходить через эту зону, не вытирая лужу немедленно, потому что «заняты потоком». Разбор. Мокрый пол - прямой риск падения и травмы, и отложенная уборка даже на несколько минут создаёт реальную опасность для команды. Действия. 1) Немедленно (лично или поручив свободному человеку) убрать лужу, прежде чем заниматься чем-либо ещё. 2) Поставить предупреждающий знак, если уборка не моментальна. 3) Напомнить команде: безопасность - приоритет даже выше скорости обслуживания в моменте, когда есть прямой риск травмы.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - откладывать устранение очевидной опасности (мокрый пол, незакреплённое оборудование) на «когда будет свободная минута».</div></div><h4>13. Фиксировать нарушения дисциплины и докладывать управляющему</h4><p class="kb-italic">Что это значит на практике: Менеджер не принимает финальные дисциплинарные решения (это зона управляющего и HR), но обязан точно фиксировать факты, чтобы решение можно было принять обоснованно.</p><p><strong>Как действовать:</strong></p><ul><li>Записывать нарушение сразу после факта: дата, время, что произошло, кто свидетель.</li><li>Передавать информацию управляющему оперативно, а не накапливать «на потом».</li><li>Быть объективным в описании, избегая личных оценок и эмоций в фиксации.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник систематически опаздывает на 5-10 минут, но менеджер не фиксирует это письменно, считая, что «и так все знают». Разбор. Без письменной фиксации управляющему сложно принять обоснованное дисциплинарное решение - устные жалобы выглядят менее весомо и сложно восстановить точную хронологию нарушений. Действия. 1) Начать вести простую запись (дата, на сколько минут опоздание) с этого момента. 2) Передать управляющему собранные факты за прошедший период. 3) В дальнейшем фиксировать каждое нарушение сразу в момент его обнаружения, а не пытаться вспомнить потом.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - полагаться на память и устные жалобы вместо системной письменной фиксации фактов нарушения.</div></div><h3>УЧЁТ РАБОЧЕГО ВРЕМЕНИ</h3><h4>14. Вести и своевременно передавать управляющему данные для табеля учёта рабочего времени</h4><p class="kb-italic">Что это значит на практике: Точность данных от менеджера - основа корректного расчёта зарплаты команды. Ошибка здесь прямо бьёт по доходу конкретных людей.</p><p><strong>Как действовать:</strong></p><ul><li>Фиксировать фактическое время начала/окончания смены каждого сотрудника, а не ориентироваться только на график.</li><li>Передавать данные управляющему регулярно (например, по итогам каждой смены или раз в несколько дней), а не накапливать на конец месяца.</li><li>Перепроверять данные перед передачей, особенно по нестандартным случаям (подработки, замены, переработки).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер забывает зафиксировать, что один из сотрудников отработал дополнительные два часа из-за подмены коллеги, и эта информация не попадает в табель. Разбор. Без своевременной фиксации сотрудник просто не получит оплату за реально отработанное время, что несправедливо и демотивирует. Действия. 1) Немедленно восстановить и передать управляющему точную информацию о переработке. 2) Извиниться перед сотрудником и объяснить, что вопрос будет решён в следующей выплате. 3) Ввести для себя привычку фиксировать любые отклонения от стандартного графика сразу в момент, когда они происходят, а не вспоминать в конце смены.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - фиксировать рабочее время «по памяти» в конце смены, когда детали (особенно нестандартные часы) легко забываются.</div></div><h4>15. Контролировать фактическое время начала и окончания смены сотрудниками</h4><p class="kb-italic">Что это значит на практике: Это конкретное ежедневное действие - отметить, когда реально сотрудник начал и закончил работу, независимо от того, что написано в графике.</p><p><strong>Как действовать:</strong></p><ul><li>Использовать систему учёта (если есть) или фиксировать вручную фактическое время.</li><li>Сверять фактическое время с плановым графиком, отмечая отклонения.</li><li>Не позволять задним числом корректировать время без объективной причины.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник просит менеджера отметить в системе, что он начал смену вовремя, хотя реально пришёл на 15 минут позже, обещая «отработать в следующий раз». Разбор. Согласие на искажение фактических данных, даже из лучших побуждений (не хочется наказывать хорошего сотрудника), создаёт прецедент недостоверного учёта и риск для самого менеджера, если это будет обнаружено при проверке. Действия. 1) Зафиксировать фактическое время прихода, как было на самом деле. 2) Отдельно поговорить с сотрудником о причине опоздания и напомнить о важности пунктуальности. 3) Не идти на компромисс с точностью данных учёта времени, даже по личной просьбе сотрудника.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - искажать фактические данные учёта времени из желания не создавать сотруднику проблему, что подрывает достоверность всей системы учёта.</div></div>'},
        {title:'БЛОК: ПРОЦЕССЫ', body:'<p>Блок «Процессы» для менеджера смены - это конкретные, повторяющиеся операционные ритуалы: открытие и закрытие точки, контроль кассы и оборудования, журналы. В отличие от ТУ, который выстраивает процессы на уровне точки в целом, менеджер исполняет и контролирует их исполнение именно в рамках своей смены, без права на пропуск ни одного шага.</p><p><strong>Зона ответственности</strong></p><p>За открытие и закрытие смены. За операционные процессы на точке во время смены. За исправность оборудования на смене. За соблюдение кассовой дисциплины.</p><p><strong>Метрики и ожидаемые результаты</strong></p><ul><li>Время открытия/закрытия смены</li><li>Отсутствие сбоев и простоев на смене</li><li>Время реакции на неисправность оборудования</li><li>Отсутствие кассовых нарушений -----------------------------------------------------------------------</li></ul><h3>ОТКРЫТИЕ И ЗАКРЫТИЕ СМЕНЫ</h3><h4>1. Открывать точку в соответствии с чек-листом открытия (готовность оборудования, выкладка, касса)</h4><p class="kb-italic">Что это значит на практике: Открытие смены - это не «прийти и начать работать», а структурированная последовательность проверок, которая гарантирует, что точка готова принять первого Гостя без сбоев.</p><p><strong>Как действовать:</strong></p><ul><li>Идти по чек-листу пошагово, не пропускать пункты «потому что вроде всё в порядке».</li><li>Проверять оборудование на готовность к работе (прогрев кофемашины, исправность техники).</li><li>Сверять кассу на старте - наличие необходимой суммы для расчётов, исправность терминала.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер торопится и открывает точку без полной проверки по чек-листу, понадеявшись, что «вчера всё было в порядке», а в итоге через час выясняется, что кофемашина не до конца прогрелась и первые напитки получаются неоднородного качества. Разбор. Пропуск даже одного пункта чек-листа экономит пару минут, но создаёт риск, который проявляется уже при первых Гостях, когда исправить ситуацию сложнее и заметнее. Действия. 1) Срочно дать машине время на полный прогрев, временно скорректировав скорость обслуживания. 2) Извиниться перед затронутыми Гостями и предложить замену напитка при необходимости. 3) Возобновить строгое следование чек-листу открытия без исключений, даже при нехватке времени.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - воспринимать чек-лист открытия как формальность, которую можно сократить, если «вроде всё было в порядке накануне».</div></div><h4>2. Закрывать точку в соответствии с чек-листом закрытия (уборка, сдача кассы, выключение оборудования)</h4><p class="kb-italic">Что это значит на практике: Закрытие смены так же критично, как открытие: ошибка здесь (не выключенное оборудование, неправильно сданная касса) создаёт проблему уже для следующей смены или для безопасности точки в нерабочее время.</p><p><strong>Как действовать:</strong></p><ul><li>Идти по чек-листу закрытия так же тщательно, как по открытию, не торопясь из желания быстрее уйти домой.</li><li>Сверять кассу точно, без приближённых оценок «на глаз».</li><li>Проверять, что всё оборудование, требующее выключения, действительно выключено.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В конце долгой и утомительной смены менеджер быстро проходит по чек-листу закрытия, не проверяя внимательно, и забывает выключить одно из вспомогательных устройств, которое работает всю ночь впустую. Разбор. Усталость в конце смены - главный риск для качественного закрытия, именно поэтому строгое следование чек-листу важнее личного ощущения «я и так помню, что нужно сделать». Действия. 1) Если ошибка обнаружена утром следующей смены - немедленно исправить и сообщить о случившемся. 2) Использовать чек-лист буквально, отмечая каждый пункт галочкой, а не полагаясь на память в конце смены. 3) При системной усталости к концу смены - поднять вопрос с управляющим о возможной корректировке графика или распределении задач закрытия между двумя людьми.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - ускорять или сокращать процедуру закрытия именно в конце смены, когда внимание и так уже снижено из-за усталости.</div></div><h4>3. Проверять готовность точки к приёму Гостей перед открытием</h4><p class="kb-italic">Что это значит на практике: Финальная проверка перед тем, как открыть двери - взгляд на точку глазами первого Гостя дня: чисто, аккуратно, всё на месте.</p><p><strong>Как действовать:</strong></p><ul><li>Пройти по залу за несколько минут до открытия, оценивая визуальное состояние.</li><li>Проверить, что меню, ценники и рекламные материалы на месте и актуальны.</li><li>Убедиться, что вся команда готова и расставлена по местам.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. За пять минут до открытия менеджер замечает, что не выставлена свежая выпечка на витрину, потому что сотрудник отвлёкся на другую задачу. Разбор. Без финальной проверки этот пробел был бы замечен только первым Гостем, что создаёт негативное первое впечатление в самом начале дня. Действия. 1) Немедленно выставить выпечку до открытия дверей. 2) Включить проверку витрины в личный финальный обход перед открытием как обязательный пункт. 3) Уточнить с сотрудником, что отвлекло его от задачи, чтобы избежать повторения.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - открывать точку по времени строго по графику, не уделяя последние минуты финальной визуальной проверке готовности.</div></div><h3>ОПЕРАЦИОННЫЕ ПРОЦЕССЫ СМЕНЫ</h3><h4>4. Контролировать кассовую дисциплину и порядок расчёта с Гостями на смене</h4><p class="kb-italic">Что это значит на практике: Менеджер следит, чтобы каждая операция с деньгами на смене проводилась корректно - это защита и Гостя, и компании, и самого сотрудника от ошибок и подозрений.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически наблюдать за процессом расчёта с Гостями.</li><li>Проверять, что чеки выдаются корректно, скидки и акции применяются правильно.</li><li>Реагировать сразу при любом отклонении от стандартного порядка расчёта.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Бариста в спешке забывает выдать чек нескольким Гостям подряд, торопясь обслужить очередь быстрее. Разбор. Это не злой умысел, а следствие давления скорости, но накопление таких ошибок создаёт риски при кассовой сверке и потенциальное недовольство Гостей, которым может понадобиться чек. Действия. 1) В моменте напомнить бариста у о необходимости выдавать чек каждому Гостю. 2) Помочь разгрузить поток (подключиться самому или попросить помощи), чтобы бариста не чувствовал необходимости жертвовать процедурой ради скорости. 3) После смены кратко обсудить с бариста ом важность этого правила без излишней строгости, понимая контекст спешки.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - реагировать на нарушение кассовой дисциплины только при кассовой сверке в конце смены, а не замечать его в моменте, когда легче исправить.</div></div><h4>5. Контролировать соблюдение технологии приготовления напитков и блюд на смене</h4><p class="kb-italic">Что это значит на практике: В отличие от пункта про качество в блоке «Сервис» (контроль готового результата), здесь фокус на процессе - соблюдается ли сама технология (порядок действий, температура, время), а не только то, как выглядит готовый напиток.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически наблюдать сам процесс приготовления, а не только проверять результат.</li><li>Сверять с технологическими картами, если есть сомнения в правильности процесса.</li><li>Обращать внимание на распространённые отклонения (пропуск шага для скорости, неправильная температура).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Бариста готовит напиток быстрее обычного, и при наблюдении выясняется, что он пропускает этап взбивания молока до нужной консистенции, чтобы сэкономить время. Разбор. Конечный напиток может визуально выглядеть приемлемо, но нарушение технологии повлияет на вкус и консистенцию, что Гость заметит при дегустации, даже если не сразу при выдаче. Действия. 1) В моменте остановить и показать правильную технологию, объяснив, на что она влияет во вкусе. 2) Понаблюдать за следующими несколькими напитками этого бариста, чтобы убедиться в исправлении. 3) Включить этот момент в следующую пятиминутку как напоминание для всей команды.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - оценивать качество работы только по внешнему виду готового напитка, не наблюдая сам процесс приготовления.</div></div><h4>6. Вести журналы и отчётность по смене (явки, температурные режимы, чек-листы и др.)</h4><p class="kb-italic">Что это значит на практике: Журналы - это не бюрократия, а ежедневное документальное доказательство того, что процессы реально соблюдались, что критично при любой внешней проверке.</p><p><strong>Как действовать:</strong></p><ul><li>Заполнять журналы в течение смены, в момент проведения проверки, а не задним числом в конце дня.</li><li>Быть точным и честным в записях, даже если показатель не идеальный.</li><li>Хранить журналы в порядке, доступном для проверки в любой момент.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В конце смены менеджер обнаруживает, что не заполнил температурный журнал холодильников за весь день, и заполняет его задним числом «по примерным значениям». Разбор. Заполнение журнала задним числом по приближённым данным - это фактически создание недостоверного документа, который не отражает реальный контроль, даже если показатели, скорее всего, были в порядке. Действия. 1) В этой ситуации честно отметить факт пропуска, а не подделывать данные, и сообщить управляющему о произошедшем сбое в процессе. 2) Установить себе конкретные временные точки в течение смены для заполнения журнала (например, при каждой плановой проверке оборудования). 3) Использовать напоминания (будильник, чек-лист на бумаге), чтобы не забывать о регулярном заполнении.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - заполнять журналы «задним числом» по приближённым или придуманным значениям вместо честной фиксации реального пропуска контроля.</div></div><h4>7. Соблюдать и контролировать соблюдение сотрудниками регламентов, установленных на предприятии</h4><p class="kb-italic">Что это значит на практике: Менеджер - пример соблюдения правил для команды на смене; любое личное отступление от регламента подрывает требовательность к остальным.</p><p><strong>Как действовать:</strong></p><ul><li>Знать действующие регламенты компании, относящиеся к смене.</li><li>Соблюдать их лично, даже когда «никто не видит» и это неудобно.</li><li>Требовать соблюдения от команды последовательно, без исключений.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер лично нарушает один из регламентов (например, не соблюдает порядок открытия кассы), считая его неудобным, а команда видит это расхождение между требованиями к ним и поведением самого менеджера. Разбор. Подобное поведение разрушает авторитет менеджера, когда он позже требует от команды строгого соблюдения других правил - двойные стандарты быстро становятся заметны. Действия. 1) Вернуться к соблюдению регламента лично, даже если это неудобно. 2) Если регламент действительно создаёт практические сложности - поднять вопрос с управляющим официально, а не игнорировать молча. 3) Транслировать команде только то поведение, которое сам менеджер готов демонстрировать.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - считать, что менеджеру «можно» немного отступать от правил, которые он требует соблюдать от остальной команды.</div></div><h3>ОБОРУДОВАНИЕ НА СМЕНЕ</h3><h4>8. Контролировать исправное состояние оборудования в течение смены</h4><p class="kb-italic">Что это значит на практике: Менеджер должен замечать первые признаки неисправности оборудования до того, как оно полностью выйдет из строя в разгар работы.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически проверять работу ключевого оборудования визуально и на слух.</li><li>Поощрять сотрудников сообщать о любых нестандартных признаках (звук, запах, медленная работа).</li><li>Не игнорировать «мелкие» странности в работе техники.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Кофемолка начинает работать с непривычным звуком в середине смены, но бариста продолжает использовать её, не сообщая менеджеру, потому что «вроде работает». Разбор. Игнорирование раннего сигнала неисправности повышает риск, что оборудование полностью выйдет из строя в самый неподходящий момент, например в час пик. Действия. 1) Немедленно проверить оборудование самостоятельно при получении информации о странном звуке. 2) При сомнении - временно прекратить использование и применить резервное решение (подменный фонд, если есть). 3) Сообщить управляющему о ситуации для организации ремонта/замены.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - продолжать эксплуатацию оборудования с явными признаками неисправности, пока оно «всё ещё работает», вместо превентивной реакции.</div></div><h4>9. При неисправности оборудования принимать меры на месте (использование подменного фонда) и сообщать управляющему</h4><p class="kb-italic">Что это значит на практике: В момент поломки у менеджера нет времени ждать решения сверху - нужно немедленно использовать доступные ресурсы (резервное оборудование, альтернативный процесс) и параллельно эскалировать ситуацию.</p><p><strong>Как действовать:</strong></p><ul><li>Знать заранее, где находится и как использовать подменный фонд.</li><li>Действовать быстро: подключить резерв или временно скорректировать процесс обслуживания.</li><li>Сообщать управляющему сразу после принятия первых мер, а не дожидаясь конца смены.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Основная кофемашина выходит из строя в середине рабочего дня, и менеджер не сразу вспоминает, где находится резервное оборудование, теряя несколько минут на поиск. Разбор. Задержка в реакции из-за незнания, где находится подменный фонд, увеличивает время простоя и количество недовольных Гостей в очереди. Действия. 1) Немедленно найти и подключить резервное оборудование, временно скорректировав скорость обслуживания. 2) Сразу сообщить управляющему о поломке и принятых мерах. 3) После смены уточнить у управляющего точное место хранения и состояние всего подменного фонда, чтобы не терять время в будущем.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - не знать заранее расположение и состояние подменного фонда, теряя критичное время именно в момент, когда счёт идёт на минуты.</div></div><h3>БЕЗОПАСНОСТЬ И ОХРАНА ИМУЩЕСТВА</h3><h4>10. Немедленно сообщать управляющему о любой ситуации, угрожающей жизни и здоровью людей, о каждом несчастном случае на смене</h4><p class="kb-italic">Что это значит на практике: Любой инцидент безопасности на смене требует мгновенной эскалации, независимо от того, насколько серьёзным он кажется на первый взгляд.</p><p><strong>Как действовать:</strong></p><ul><li>Знать точный алгоритм действий при несчастном случае: первая помощь, вызов скорой при необходимости, уведомление управляющего.</li><li>Сообщать сразу, не дожидаясь окончания смены или попытки «разобраться самому».</li><li>Фиксировать детали инцидента для последующего оформления документов.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник получает небольшой порез во время работы, и менеджер обрабатывает рану аптечкой, но не сообщает об этом управляющему, считая случай слишком мелким. Разбор. Даже незначительный на первый взгляд инцидент должен фиксироваться согласно требованиям охраны труда - это защищает и сотрудника, и компанию в случае осложнений или повторения подобных случаев. Действия. 1) Сообщить управляющему о случившемся, даже если рана уже обработана. 2) Зафиксировать инцидент письменно (когда, как, что предпринято). 3) В будущем сообщать обо всех случаях травм без исключения, не оценивая самостоятельно их серьёзность.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - самостоятельно решать, какой инцидент «достаточно серьёзен» для сообщения, замалчивая случаи, которые показались мелкими.</div></div><h4>11. Бережно относиться к имуществу работодателя и контролировать сохранность имущества на смене</h4><p class="kb-italic">Что это значит на практике: Менеджер следит, чтобы оборудование и инвентарь использовались правильно и не повреждались из-за небрежности в течение смены.</p><p><strong>Как действовать:</strong></p><ul><li>Следить за правильным использованием оборудования и инвентаря командой.</li><li>Реагировать сразу на случаи небрежного обращения.</li><li>Личным примером показывать аккуратное отношение к имуществу.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник в спешке роняет и разбивает посуду, и команда реагирует на это как на привычную мелочь, не обращая особого внимания. Разбор. Если небрежное отношение к имуществу регулярно остаётся без внимания, оно становится нормой поведения, увеличивая количество подобных случаев и расходы на списания. Действия. 1) В моменте убедиться, что осколки убраны безопасно, и не было травм. 2) Кратко обсудить с сотрудником, что привело к ситуации (спешка, неудобное расположение посуды), чтобы предотвратить повторение. 3) Зафиксировать случай боя как списание по итогам смены согласно стандартной процедуре.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - относиться к регулярным мелким порчам имущества как к неизбежной мелочи, не пытаясь разобраться в системной причине.</div></div><h4>12. Незамедлительно сообщать управляющему о ситуациях, угрожающих сохранности имущества на точке</h4><p class="kb-italic">Что это значит на практике: Это превентивная функция - заметить риск (неисправный замок, подозрительная активность) до того, как произойдёт реальный ущерб или кража.</p><p><strong>Как действовать:</strong></p><ul><li>Обращать внимание на нестандартные ситуации в течение смены, относящиеся к безопасности точки.</li><li>Сообщать управляющему сразу, не дожидаясь подтверждения, что угроза реальна.</li><li>Принимать доступные меры на месте (например, временно закрыть доступ к проблемной зоне).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер замечает, что камера видеонаблюдения в одной из зон не работает уже несколько дней, но не сообщает об этом, думая, что это заметят без него. Разбор. Молчание о неисправности системы безопасности увеличивает окно уязвимости точки на неопределённый срок, особенно если никто другой действительно не заметил проблему. Действия. 1) Немедленно сообщить управляющему о неисправности камеры. 2) При возможности - временно усилить визуальный контроль этой зоны силами команды. 3) В дальнейшем сообщать о любых отклонениях в работе систем безопасности сразу при обнаружении, не предполагая, что кто-то другой уже знает об этом.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - предполагать, что проблему безопасности заметит и решит кто-то другой, вместо того чтобы сообщить о ней самостоятельно сразу.</div></div>'},
        {title:'БЛОК: ДЕНЬГИ', body:'<p>Блок «Деньги» для менеджера смены - это финансовый результат конкретных рабочих часов: выручка, средний чек, списания и точность кассы именно на этой смене. Менеджер не строит финансовую стратегию точки, но напрямую влияет на то, сколько денег точка зарабатывает и теряет именно сегодня, в его смену.</p><p><strong>Зона ответственности</strong></p><p>За выручку и продажи на своей смене. За средний чек и допродажи на смене. За контроль списаний и остатков на смене. За корректность кассовых операций.</p><p><strong>Метрики и ожидаемые результаты</strong></p><ul><li>Выручка/товарооборот за смену</li><li>Средний чек и наполняемость чека на смене</li><li>% списаний за смену</li><li>Отсутствие недостач и излишков в кассе</li><li>Выполнение плана по допродажам -----------------------------------------------------------------------</li></ul><h3>ВЫРУЧКА И ПРОДАЖИ НА СМЕНЕ</h3><h4>1. Управлять выручкой точки на своей смене, отслеживать выполнение плана продаж в течение дня</h4><p class="kb-italic">Что это значит на практике: Менеджер следит за динамикой продаж в реальном времени в течение смены, а не узнаёт результат только в конце дня позволяет среагировать, если что-то идёт не по плану.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически (например, раз в несколько часов) смотреть текущую выручку относительно ожидаемого темпа дня.</li><li>При заметном отставании - анализировать возможную причину (медленный поток, отсутствие активных допродаж) и предпринимать действия в течение смены.</li><li>Делиться промежуточным результатом с командой, чтобы создать ощущение совместной цели.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. К середине смены менеджер замечает, что выручка заметно ниже, чем обычно в это время дня, хотя поток Гостей визуально нормальный. Разбор. Несоответствие между видимым потоком и низкой выручкой может говорить о низком среднем чеке - то есть Гости приходят, но покупают меньше, что требует не привлечения большего потока, а усиления допродаж. Действия. 1) Обратить внимание команды на необходимость активнее предлагать дополнения к заказу (десерт, больший размер напитка). 2) Самому показать пример успешной допродажи в течение часа. 3) К концу смены оценить, помогло ли усиление допродаж скорректировать отставание, и передать наблюдение управляющему.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - узнавать о невыполнении плана только в конце смены, когда уже невозможно предпринять действия в течение этого рабочего дня.</div></div><h4>2. Применять и контролировать применение сотрудниками техник продаж и допродаж (предложение допов, акций)</h4><p class="kb-italic">Что это значит на практике: Менеджер не просто наблюдает, а лично демонстрирует и тренирует команду в применении конкретных фраз и техник допродажи прямо во время смены.</p><p><strong>Как действовать:</strong></p><ul><li>Лично использовать технику допродажи, показывая пример сотрудникам.</li><li>Слушать, как сотрудники предлагают допы, и корректировать формулировки, если они звучат навязчиво или неуверенно.</li><li>Хвалить за успешные случаи допродажи в моменте.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Бариста либо вообще не предлагает допы, либо делает это так неуверенно, что Гости почти всегда отказываются. Разбор. Проблема может быть не в нежелании сотрудника, а в неуверенности или неудачной формулировке предложения, которая звучит как обязанность, а не искреннее предложение. Действия. 1) Показать на собственном примере 2-3 удачные формулировки предложения допа. 2) Понаблюдать, как бариста пробует применить их, и дать обратную связь сразу. 3) В течение смены периодически проверять и поддерживать эту практику, не давая ей сойти на нет.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - требовать от команды предлагать допы «потому что надо», без демонстрации конкретных работающих формулировок и без практической поддержки.</div></div><h4>3. Контролировать наполняемость чеков и средний чек на смене</h4><p class="kb-italic">Что это значит на практике: это конкретные измеримые показатели, которые менеджер должен отслеживать в течение смены и связывать с реальными действиями команды (допродажи, рекомендации).</p><p><strong>Как действовать:</strong></p><ul><li>Если есть доступ к данным в течение смены - периодически проверять средний чек.</li><li>Связывать наблюдаемое поведение команды (предлагают ли допы) с динамикой показателя.</li><li>Обсуждать с командой итоговый показатель смены в конце, отмечая успехи.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Средний чек на смене стабильно ниже, чем в среднем по точке, хотя команда вроде бы активно работает. Разбор. Возможно, команда работает быстро и вежливо, но не уделяет внимание именно технике увеличения чека - это разные навыки, и хорошее обслуживание не гарантирует автоматически высокий чек. Действия. 1) Понаблюдать конкретно за моментом предложения допа на кассе и баре. 2) Если предложений почти нет - провести короткий разбор на пятиминутке с конкретными фразами для использования. 3) Через несколько смен сравнить динамику показателя после внедрения изменений.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - считать, что хорошая скорость и вежливость автоматически обеспечивают высокий средний чек, не уделяя отдельного внимания технике допродаж.</div></div><h3>ОСТАТКИ И СПИСАНИЯ</h3><h4>4. Контролировать товарные остатки на смене с целью отсутствия стоп-листов</h4><p class="kb-italic">Что это значит на практике: Менеджер следит, чтобы в течение смены не закончился ключевой ингредиент, что привело бы к невозможности продавать популярные позиции меню.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически проверять остатки ключевых ингредиентов в течение смены.</li><li>При риске нехватки - заранее предупреждать команду скорректировать активность продаж этой позиции либо найти альтернативу.</li><li>Сообщать управляющему о приближающемся стоп-листе как можно раньше.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. К вечеру смены остаётся очень мало одного из сиропов, который активно используется в нескольких позициях меню, и менеджер замечает это только когда сироп заканчивается полностью. Разбор. Если бы остаток был замечен раньше, можно было бы временно скорректировать активность продаж этой позиции (например, не предлагать её в допродажах) или организовать срочную докупку, прежде чем возник полный стоп-лист. Действия. 1) Немедленно проверить, есть ли альтернатива или способ временно докупить недостающий ингредиент. 2) Предупредить бариста ов/бариста о невозможности продавать соответствующие позиции, чтобы не создавать неловкую ситуацию перед Гостем на кассе. 3) В будущем проверять остатки ключевых ингредиентов не только в начале, но и в середине смены, особенно по позициям с высоким спросом.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - проверять остатки только в начале смены, не отслеживая их расход в течение дня, особенно по высокооборотным позициям.</div></div><h4>5. Фиксировать и оформлять списания по итогам смены (бой посуды, порча продукта и др.)</h4><p class="kb-italic">Что это значит на практике: Списания - неизбежная часть работы (бой посуды, испорченные продукты), но они должны быть точно и честно зафиксированы, а не скрыты или забыты.</p><p><strong>Как действовать:</strong></p><ul><li>Фиксировать каждый случай списания сразу по факту, а не вспоминать в конце смены.</li><li>Указывать точную причину списания (бой, порча, истёкший срок), а не обобщённо.</li><li>Передавать данные по списаниям управляющему согласно установленному процессу.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. За смену произошло несколько случаев боя посуды, но менеджер не зафиксировал их вовремя, и к концу смены не может точно вспомнить, сколько и что именно было разбито. Разбор. Неточная фиксация списаний искажает реальную картину потерь точки и затрудняет анализ их причин (например, выявление систематической проблемы с конкретным видом посуды). Действия. 1) Постараться восстановить максимально точную картину по памяти и зафиксировать имеющуюся информацию, отметив, что данные могут быть неполными. 2) В будущем фиксировать списание сразу в момент происшествия, используя заметки на телефоне или бумажный журнал на смене. 3) Передать управляющему честную информацию, не пытаясь скрыть факт неполной фиксации.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - откладывать фиксацию списаний на конец смены, когда детали уже забываются, и данные становятся неточными.</div></div><h4>6. Контролировать сроки годности и условия хранения товаров на смене</h4><p class="kb-italic">Что это значит на практике: В рамках конкретной смены менеджер следит за тем, чтобы товар использовался по принципу FIFO и хранился в правильных условиях, предотвращая порчу.</p><p><strong>Как действовать:</strong></p><ul><li>Проверять визуально маркировку и сроки годности при получении и в течение смены.</li><li>Следить, чтобы команда использовала более старые партии товара первыми.</li><li>Контролировать температурный режим хранения согласно графику проверок.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В середине смены замечено, что часть молока хранится не на холоде, потому что не было места в холодильнике, и его временно оставили рядом на стойке. Разбор. Нарушение температурного режима хранения, даже временное, создаёт риск порчи продукта и потенциальную угрозу безопасности для Гостей, если продукт всё же будет использован. Действия. 1) Немедленно найти место в холодильнике, переставив менее срочные товары, или использовать дополнительный холодильник, если есть. 2) Оценить, сколько времени товар находился без охлаждения, и принять решение о его дальнейшем использовании согласно нормам безопасности. 3) Сообщить управляющему, если нехватка места в холодильнике - повторяющаяся системная проблема, требующая решения (дополнительное оборудование, пересмотр объёма закупки).</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - временно жертвовать условиями хранения «на пару часов» при нехватке места, считая краткосрочное нарушение незначительным.</div></div><h3>КАССОВАЯ ДИСЦИПЛИНА</h3><h4>7. Контролировать корректность кассовых операций сотрудников в течение смены</h4><p class="kb-italic">Что это значит на практике: Менеджер следит за правильностью каждого типа кассовой операции - продажа, возврат, скидка, аннулирование - в реальном времени, не дожидаясь итоговой сверки.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически наблюдать за процессом проведения операций на кассе.</li><li>Уделять особое внимание нестандартным операциям (возврат, скидка, отмена), которые чаще подвержены ошибкам или злоупотреблениям.</li><li>Сразу уточнять у сотрудника, если операция выглядит нестандартно или непонятно.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Бариста несколько раз за смену проводит операцию аннулирования чека без объяснения причины, и менеджер замечает это только при случайном взгляде на экран кассы. Разбор. Частые аннулирования без явной причины могут быть как технической особенностью (ошибки ввода), так и потенциальным признаком злоупотребления - в любом случае это требует прояснения, а не игнорирования. Действия. 1) Подойти и спросить у бариста а причину аннулирований в моменте, спокойно и без обвинений. 2) Если причина объективна (ошибка ввода, технический сбой) - помочь устранить корень проблемы. 3) Если причина не убедительна или повторяется - зафиксировать ситуацию и сообщить управляющему для более глубокой проверки.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - замечать подозрительные кассовые операции только при итоговой сверке кассы, теряя возможность прояснить ситуацию в моменте, когда контекст ещё свежий.</div></div><h4>8. Проводить снятие и сверку кассы по итогам смены</h4><p class="kb-italic">Что это значит на практике: Финальная сверка - это момент истины: соответствует ли фактическая сумма в кассе тому, что должно быть согласно проведённым операциям.</p><p><strong>Как действовать:</strong></p><ul><li>Проводить сверку внимательно и без спешки, даже если смена уже закончилась физически и хочется домой.</li><li>Перепроверять расчёт при любом расхождении, не списывая сразу на «погрешность».</li><li>Документировать результат сверки точно, независимо от того, есть расхождение или нет.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. При сверке кассы обнаруживается небольшое расхождение (200 рублей недостачи), и менеджер, уже устав после долгой смены, просто записывает «погрешность» без дальнейшего анализа. Разбор. Любое расхождение, даже небольшое, должно получать попытку объяснения - иначе менеджер теряет возможность вовремя заметить системную ошибку (неправильная выдача сдачи) или более серьёзную проблему. Действия. 1) Перепроверить расчёт ещё раз, проверить, не забыл ли кто-то из бариста ов провести последнюю операцию. 2) Если расхождение действительно небольшое и причину установить не удаётся - зафиксировать его точно и сообщить управляющему, а не просто списать молча. 3) Обратить внимание, повторяется ли подобное расхождение на следующих сменах, чтобы заметить возможную закономерность.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - машинально списывать небольшие кассовые расхождения на «погрешность» без попытки разобраться и без фиксации для дальнейшего анализа управляющим.</div></div><h4>9. Сообщать управляющему о любых расхождениях по кассе сразу после их выявления</h4><p class="kb-italic">Что это значит на практике: Расхождение по кассе - финансовый сигнал, который должен дойти до управляющего немедленно, а не быть похороненным в записях смены без дальнейшего внимания.</p><p><strong>Как действовать:</strong></p><ul><li>Сообщать о любом расхождении сразу по факту обнаружения, независимо от размера суммы.</li><li>Предоставлять управляющему точные данные: сумма, возможная причина, кто работал на кассе.</li><li>Не пытаться самостоятельно «закрыть» расхождение из личных средств, чтобы не создавать проблему - это скрывает реальную картину.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер обнаруживает существенную недостачу в кассе и, чтобы не создавать проблему и не «получить разбор» от управляющего, решает временно покрыть её из собственных денег, надеясь разобраться позже. Разбор. Такое решение кажется заботой о спокойствии, но на самом деле скрывает реальную проблему (возможную системную ошибку или злоупотребление) от управляющего, который должен про неё знать, чтобы предотвратить повторение. Действия. 1) Немедленно сообщить управляющему о реальном размере расхождения без попытки скрыть его за счёт личных средств. 2) Предоставить все доступные данные для совместного расследования причины. 3) В будущем придерживаться правила: любое кассовое расхождение сообщается сразу и в полном объёме, независимо от того, насколько неприятен этот разговор.</div></div>'},
        {title:'Итоговые принципы работы менеджера (администратора) смены', body:'<h3>Семь принципов работы</h3><ol><li>Действуй в моменте. Твоя главная ценность - не стратегия на месяц, а правильное решение здесь и сейчас, в течение конкретной смены.</li><li>Замечай рано - реагируй сразу. Большинство проблем смены (от нехватки сырья до конфликта в команде) проще решить в первые минуты, чем когда они уже повлияли на Гостей.</li><li>Будь примером, а не только контролёром. Команда копирует поведение менеджера быстрее, чем выполняет любые написанные правила.</li><li>Различай, что решается на месте, а что требует звонка управляющему. Геройство в одиночку там, где нужна эскалация, создаёт больше риска, чем своевременная просьба о помощи.</li><li>Фиксируй факты, а не ощущения. Журналы, табели и записи о нарушениях - это не бюрократия, а основа, на которой управляющий принимает обоснованные решения.</li><li>Безопасность и честность - выше скорости. Ни поток Гостей, ни желание не создавать проблему не оправдывают нарушение техники безопасности или искажение кассовых/учётных данных.</li><li>Заканчивай смену так же внимательно, как начинаешь. Усталость к концу дня - главный риск для качества закрытия точки и передачи смены.</li></ol><h3>Чек-лист смены менеджера (администратора)</h3><ol><li>Проверить и пройти чек-лист открытия смены полностью, без сокращений</li><li>Провести пятиминутку с конкретными задачами на смену</li><li>Выборочно проверить качество напитков и скорость обслуживания минимум 2 раза за смену</li><li>Проверить остатки ключевых ингредиентов в начале и середине смены</li><li>Дать минимум одну точечную обратную связь сотруднику в течение смены</li><li>Зафиксировать любые отклонения (опоздания, нарушения, инциденты) сразу по факту</li><li>Провести точную сверку кассы по итогам смены и сообщить управляющему о расхождениях, если они есть</li><li>Передать управляющему данные по табелю, спискам и наблюдениям за смену</li><li>Пройти чек-лист закрытия смены полностью, включая проверку оборудования и безопасности</li><li>Оставить чёткую передачу информации следующей смене (что произошло, на что обратить внимание)</li></ol>'}
      ]

let stack = [{ view:'home' }];

function push(view, params){ stack.push({view, params: params||{}}); render(); }
function pop(){ if(stack.length>1){ stack.pop(); render(); } }
function resetHome(){ stack = [{view:'home'}]; render(); }

function findById(list, id){ return list.find(x=>x.id===id); }

/* ---------------- РЕНДЕР ---------------- */

const topbarEl = document.getElementById('topbar');
const contentEl = document.getElementById('content');

function render(){
  const top = stack[stack.length-1];
  const showBack = stack.length>1;
  let title = 'Кофе Чек', sub = '';

  switch(top.view){
    case 'home': renderHome(); title=''; break;
    case 'list':
      if(top.params.section==='ttk'){ renderTtkSearch(); }
      else if(top.params.section==='orderMatrix' || top.params.section==='orderMatrixReady'){ renderSupplierSearch(top.params.section); }
      else { renderList(top.params); }
      title = top.params.sectionTitle; sub = top.params.sectionSub||''; break;
    case 'kb-list': renderKbList(top.params.kb); title = top.params.kb.title; sub = ''; break;
    case 'form': title = top.params.item.title; sub = top.params.item.meta||''; renderForm(top.params); break;
    case 'success': title=''; renderSuccess(top.params); break;
    case 'audit-result': title=''; renderAuditResult(top.params); break;
    case 'journal-locations': title = top.params.journal.title; sub = 'Выберите точку'; renderJournalLocations(top.params.journal); break;
    case 'journal': title = top.params.scopeTitle || top.params.journal.title; sub = top.params.journal.desc; renderJournal(top.params); break;
    case 'journal-add': title = 'Новая запись'; sub = top.params.scopeTitle || top.params.journal.title; renderJournalAdd(top.params); break;
    case 'journal-add-health': title = 'Новая запись'; sub = top.params.scopeTitle || top.params.journal.title; renderJournalAddHealth(top.params); break;
    case 'journal-add-temp': title = 'Новая запись'; sub = top.params.scopeTitle || top.params.journal.title; renderTempTableAdd(top.params); break;
    case 'shift-report': title = top.params.item.title; sub = top.params.item.meta; renderShiftReport(top.params); break;
    case 'training-report': title = top.params.item.title; sub = top.params.item.meta; renderTrainingReport(top.params); break;
    case 'training-report-result': title=''; renderTrainingReportResult(top.params); break;
    case 'order-sheet-search': title='Лист заявки'; sub='Найдите позиции и отметьте нужные'; renderOrderSheetSearch(); break;
    case 'order-sheet-summary': title='Заявка'; sub='Список по поставщикам'; renderOrderSheetSummary(); break;

  topbarEl.innerHTML = `
    ${showBack ? `<div class="back" onclick="pop()">←</div>` : ''}
    ${title ? `<div><h1>${title}</h1>${sub?`<div class="sub">${sub}</div>`:''}</div>` : ''}

function openForm(section, id){

function renderForm(params){
  const {section, item} = params;
  const isReport = section==='reports' || section==='timesheet';

  let qHtml = '';
  let lastCat = null;
  item.questions.forEach(q=>{
    if(isReport){
      let inputHtml;
      if(q.id==='Смена (с)'){
        inputHtml = `<input type="time" id="ts_start" oninput="setAns('${q.id}',this.value); calcTimesheetHours();">`;
      } else if(q.id==='Смена (по)'){
        inputHtml = `<input type="time" id="ts_end" oninput="setAns('${q.id}',this.value); calcTimesheetHours();">`;
      } else if(q.id==='Количество часов'){
        inputHtml = `<input type="text" id="ts_hours_result" readonly placeholder="Заполнится автоматически" style="background:var(--parchment-dark);opacity:0.85;">`;
      } else if(q.type==='textarea'){
        inputHtml = `<textarea rows="3" oninput="setAns('${q.id}',this.value)" placeholder="Комментарий..."></textarea>`;
      } else if(q.type==='select-name'){
        inputHtml = `<select oninput="setAns('${q.id}',this.value)" onchange="setAns('${q.id}',this.value)">${nameSelectOptions('')}</select>`;
      } else if(q.type==='select' && q.options){
        inputHtml = `<select oninput="setAns('${q.id}',this.value)" onchange="setAns('${q.id}',this.value)"><option value="" selected disabled>Выберите</option>${q.options.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
      } else {
        inputHtml = `<input type="${q.type}" oninput="setAns('${q.id}',this.value)" placeholder="Введите значение">`;
      }
      qHtml += `<div class="q-block">
        <div class="q-text">${q.label}</div>
        ${inputHtml}
      </div>`;
      return;
    }
    if(q.cat !== lastCat){ qHtml += `<div class="q-cat">${q.cat}</div>`; lastCat=q.cat; }
    qHtml += renderQuestion(q);
  });

  const total = item.questions.length;

  const headerHtml = item.headerFields ? item.headerFields.map(f=>{
    const isDate = f.id.includes('Дата') || f.label.includes('Дата');
    if(isDate) currentAnswers[f.id] = nowDateStr();
    return `
    <div class="who-field">
      <label>${f.label}</label>
      <input type="${isDate?'date':'text'}" oninput="currentAnswers['${f.id}']=this.value" placeholder="${f.label}" value="${isDate?nowDateStr():''}">
    </div>`;
  }).join('') : `
    <div class="who-field">
      <label>Кто заполняет</label>
      <select id="whoInput" onchange="STATE.userName=this.value">${nameSelectOptions(STATE.userName)}</select>
    </div>`;

  contentEl.innerHTML = `
    ${headerHtml}
    <div class="progress-wrap">
      ${cupSvg(44,'progressCup')}
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progFill" style="width:0%"></div></div>
      <div class="progress-txt" id="progTxt">0/${total}</div>
    </div>
    ${qHtml}
    <div class="sticky-submit">
      <button class="btn-primary" onclick="submitForm()">Отправить в Google Таблицу</button>
    </div>
  `;
  updateProgress();
}

function renderQuestion(q){
  if(q.type==='yesno'){
    const zoneVisible = q.alwaysPhoto;
    return `<div class="q-block" id="block_${q.id}">
      <div class="q-text">${q.text}</div>
      <div class="yesno-row">
        <div class="opt-btn yes" id="opt_${q.id}_yes" onclick="setAns('${q.id}','Да', this)">Да</div>
        <div class="opt-btn no" id="opt_${q.id}_no" onclick="setAns('${q.id}','Нет', this)">Нет</div>
        <div class="opt-btn na" id="opt_${q.id}_na" onclick="setAns('${q.id}','Н/Д', this)">Н/Д</div>
      </div>
      <div class="photo-zone" id="photozone_${q.id}" style="display:${zoneVisible?'block':'none'}; margin-top:10px;">${zoneVisible?renderMediaZoneHtml(q.id,'image'):''}</div>
    </div>`;
  }
  if(q.type==='photo' || q.type==='audio'){
    return `<div class="q-block">
      <div class="q-text">${q.text}</div>
      <div class="photo-zone" id="photozone_${q.id}">${renderMediaZoneHtml(q.id, q.type)}</div>
    </div>`;
  }
  if(q.type==='scale'){
    let btns = '';
    for(let i=1;i<=5;i++){ btns += `<div class="scale-btn" id="opt_${q.id}_${i}" onclick="setAns('${q.id}','${i}', this)">${i}</div>`; }
    return `<div class="q-block"><div class="q-text">${q.text}</div><div class="scale-row">${btns}</div></div>`;
  }
  if(q.type==='number'){
    return `<div class="q-block"><div class="q-text">${q.text}</div>
      <input type="number" oninput="setAns('${q.id}',this.value)" placeholder="${q.unit||''}"></div>`;
  }
  // text
  return `<div class="q-block"><div class="q-text">${q.text}</div>
    <textarea rows="2" oninput="setAns('${q.id}',this.value)" placeholder="Комментарий..."></textarea></div>`;
}

function setAns(id, value, el){
  currentAnswers[id] = value;
  if(el && el.parentElement.classList.contains('yesno-row')){
    el.parentElement.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
  }
  if(el && el.parentElement.classList.contains('scale-row')){
    el.parentElement.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
  }
  const top = stack[stack.length-1];
  const q = (top && top.params && top.params.item) ? top.params.item.questions.find(x=>x.id===id) : null;
  const zone = document.getElementById('photozone_'+id);
  if(zone && q && q.type==='yesno' && !q.alwaysPhoto){
    if(value==='Нет'){
      zone.style.display = 'block';
      zone.innerHTML = renderMediaZoneHtml(id,'image');
    } else {
      zone.style.display = 'none';
      zone.innerHTML = '';
      delete currentPhotos[id];
    }
  }
  updateProgress();
}

function renderMediaZoneHtml(id, kind){
  const item = currentPhotos[id];
  if(item){
    const preview = item.kind==='audio'
      ? `<audio controls src="${item.dataUrl}" style="height:34px;flex:1;"></audio>`
      : `<img src="${item.dataUrl}" style="width:56px;height:56px;object-fit:cover;border-radius:10px;border:1.5px solid var(--line);">`;
    return `<div style="display:flex;align-items:center;gap:10px;">
      ${preview}
      <div style="flex:${item.kind==='audio'?'0':'1'};font-size:12px;color:var(--espresso-soft);">${item.kind==='audio'?'':'Прикреплено'}</div>
      <div class="opt-btn no" style="flex:0 0 auto;padding:8px 12px;" onclick="removeMedia('${id}')">✕</div>
    </div>`;
  }
  const isAudio = kind==='audio';
  const label = isAudio ? '🎙️ Прикрепить аудиозапись приёма заказа' : '📷 Прикрепить фото';
  const accept = isAudio ? 'audio/*' : 'image/*';
  const capture = isAudio ? '' : 'capture="environment"';
  return `<label class="note-toggle" style="display:inline-flex;align-items:center;gap:6px;background:var(--cream);border:1.5px dashed var(--copper);border-radius:10px;padding:9px 12px;cursor:pointer;color:var(--copper-dark);">
    ${label}
    <input type="file" accept="${accept}" ${capture} style="display:none" onchange="handleMediaSelect('${id}', this, '${kind}')">
  </label>`;
}

function handleMediaSelect(id, inputEl, kind){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const top = stack[stack.length-1];
  const q = top.params.item.questions.find(x=>x.id===id);
  const qText = q ? q.text : id;

  if(kind==='audio'){
    const reader = new FileReader();
    reader.onload = function(ev){
      currentPhotos[id] = { dataUrl: ev.target.result, text: qText, kind:'audio', mime: file.type||'audio/mpeg' };
      currentAnswers[id] = 'Прикреплено';
      const zone = document.getElementById('photozone_'+id);
      if(zone) zone.innerHTML = renderMediaZoneHtml(id,'audio');
      updateProgress();
    };
    reader.readAsDataURL(file);
    return;
  }

  // изображение — сжимаем перед сохранением
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 900;
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*scale;
      canvas.height = img.height*scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
      currentPhotos[id] = { dataUrl, text: qText, kind:'image', mime:'image/jpeg' };
      currentAnswers[id] = 'Прикреплено';
      const zone = document.getElementById('photozone_'+id);
      if(zone) zone.innerHTML = renderMediaZoneHtml(id,'image');
      updateProgress();

function submitForm(){
  const top = stack[stack.length-1];
  const {section, item} = top.params;

  if((section==='reports' || section==='timesheet') && item.questions){
    for(const q of item.questions){
      const v = currentAnswers[q.id];
      if(v===undefined || v===null || v.toString().trim()===''){

    }
  }

  const photosArr = Object.keys(currentPhotos).map(id=>({
    questionId:id, text: currentPhotos[id].text, dataUrl: currentPhotos[id].dataUrl,
    kind: currentPhotos[id].kind||'image', mime: currentPhotos[id].mime||'image/jpeg'
  }));

  const payload = {
    type: section,

    submittedBy: STATE.userName || 'Не указано',
    timestamp: new Date().toLocaleString('ru-RU'),
    answers: currentAnswers,

  };

  if(item.scored){

    payload.scores = scores;
    sendToSheet(payload);
    STATE.submissions.push(payload);
    push('audit-result', {item, scores, photosArr});
  } else {
    sendToSheet(payload);
    STATE.submissions.push(payload);
    push('success', {label:item.title});
  }
}

/* Подсчёт баллов аудита: Да=1, Нет=0, Н/Д и неотвеченные исключаются из знаменателя. */
function computeScores(item, answers){
  const byCat = {};
  let overallYesW=0, overallTotalW=0;
  let baristaYesW=0, baristaTotalW=0;
  const violations = [];

  item.questions.forEach(q=>{
    if(q.type!=='yesno') return;
    const a = answers[q.id];
    const w = q.weight===undefined ? 1 : q.weight;
    if(!byCat[q.cat]) byCat[q.cat] = {yes:0,total:0};
    if(a==='Да' || a==='Нет'){
      byCat[q.cat].total += w;
      overallTotalW += w;
      if(q.barista) baristaTotalW += w;
      if(a==='Да'){
        byCat[q.cat].yes += w;
        overallYesW += w;
        if(q.barista) baristaYesW += w;
      } else {
        violations.push({ text:q.text, cat:q.cat, hasPhoto: !!currentPhotos[q.id], points: w });
      }
    }
  });

  const catResults = Object.keys(byCat).map(cat=>({
    cat, pct: byCat[cat].total ? Math.round((byCat[cat].yes/byCat[cat].total)*1000)/10 : null
  }));

  const overallPct = overallTotalW ? Math.round((overallYesW/overallTotalW)*1000)/10 : 0;
  const baristaPct = baristaTotalW ? Math.round((baristaYesW/baristaTotalW)*1000)/10 : null;

  return { overallPct, baristaPct, catResults, violations };
}

function gradeFor(item, pct){
  const g = item.grading.find(g=>pct>=g.min);
  return g || item.grading[item.grading.length-1];
}

function calcTimesheetHours(){
  const startEl = document.getElementById('ts_start');
  const endEl = document.getElementById('ts_end');
  const resultEl = document.getElementById('ts_hours_result');
  if(!startEl || !endEl || !resultEl) return;
  if(!startEl.value || !endEl.value) return;

  const [sh, sm] = startEl.value.split(':').map(Number);
  const [eh, em] = endEl.value.split(':').map(Number);
  let startMin = sh*60 + sm;
  let endMin = eh*60 + em;
  if(endMin <= startMin) endMin += 24*60; // смена через полночь

  const diff = endMin - startMin;
  const hours = Math.floor(diff/60);
  const minutes = diff % 60;
  const text = `${hours} ч ${minutes} мин`;

  resultEl.value = text;

let trainingRows = [];

function hoursMinutesBetween(startVal, endVal){
  if(!startVal || !endVal) return '';
  const [sh, sm] = startVal.split(':').map(Number);
  const [eh, em] = endVal.split(':').map(Number);
  let startMin = sh*60 + sm;
  let endMin = eh*60 + em;
  if(endMin <= startMin) endMin += 24*60;
  const diff = endMin - startMin;
  return `${Math.floor(diff/60)} ч ${diff%60} мин`;
}

  const p = parseFloat(plan), f = parseFloat(fact);
  if(!p || isNaN(p)) return null;
  return Math.round((f/p)*1000)/10;
}

function filterTtk(query){
  const q = query.trim().toLowerCase();
  const box = document.getElementById('ttkResults');
  if(!box) return;

  if(q===''){
    let html = '';
    DATA.ttk.forEach(cat=>{
      html += `<div class="item-row" onclick="openKbSection('${cat.id}')">
        <div class="num">${cat.icon}</div>

    });
    box.innerHTML = html;
    return;
  }

  const matches = [];

      if(a.title.toLowerCase().includes(q)){

    box.innerHTML = `<div class="empty-state"><span class="icon">🔍</span>Ничего не найдено по запросу «${query}».</div>`;

  filterOrderSheet('');
}

function updateOrderCartBadge(){
  const btn = document.getElementById('orderCartBtn');
  if(btn) btn.textContent = `Сформировать заявку (${Object.keys(orderCart).length})`;
}

function filterOrderSheet(query){
  const q = query.trim().toLowerCase();
  const box = document.getElementById('orderSearchResults');
  if(!box) return;

  if(q===''){
    box.innerHTML = `<div class="empty-state"><span class="icon">🔍</span>Начните вводить название позиции — появятся похожие варианты из обеих матриц.</div>`;
    return;
  }

  const matches = [];
  allOrderCatalogs().forEach(sup=>{
    sup.articles.forEach((a,i)=>{
      if(a.title.toLowerCase().includes(q)){
        matches.push({sup, i, article:a});
      }
    });
  });

  if(matches.length===0){
    box.innerHTML = `<div class="empty-state"><span class="icon">🔍</span>Ничего не найдено по запросу «${query}».</div>`;
    return;
  }

  box.innerHTML = matches.map(m=>{
    const key = m.sup.id+'__'+m.i;
    const inCart = !!orderCart[key];
    const qty = inCart ? orderCart[key].qty : 1;
    return `
    <div class="q-block" style="display:flex;align-items:center;gap:10px;padding:10px 12px;">
      <input type="checkbox" id="chk_${key}" ${inCart?'checked':''} onchange="toggleOrderItem('${key}','${esc4js(m.article.title)}','${esc4js(m.sup.title)}',this.checked)" style="width:20px;height:20px;flex-shrink:0;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13.5px;font-weight:600;">${m.article.title}</div>
        <div style="font-size:11.5px;color:var(--espresso-soft);">Поставщик: ${m.sup.title}</div>
      </div>
      <input type="number" min="1" value="${qty}" id="qty_${key}" oninput="updateOrderQty('${key}',this.value)" style="width:64px;text-align:center;flex-shrink:0;">
    </div>`;
  }).join('');
}

function esc4js(s){
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

function toggleOrderItem(key, name, supplierTitle, checked){
  if(checked){
    const qtyEl = document.getElementById('qty_'+key);
    const qty = qtyEl ? (parseFloat(qtyEl.value)||1) : 1;
    orderCart[key] = { name, supplierTitle, qty };
  } else {
    delete orderCart[key];
  }
  updateOrderCartBadge();
}

function updateOrderQty(key, value){
  if(orderCart[key]){
    orderCart[key].qty = parseFloat(value) || 1;
  }
}

function openOrderSheetSummary(){
  if(Object.keys(orderCart).length===0){
    showToast('Отметьте хотя бы одну позицию');
    return;
  }
  if(!orderAuthor){
    showToast('Выберите, кто составляет заявку');
    return;
  }
  if(!orderPoint){
    showToast('Выберите точку, куда заказывают');
    return;
  }
  if(!orderCategory){
    showToast('Выберите категорию');
    return;
  }
  push('order-sheet-summary', {});
}

function renderOrderSheetSummary(){
  const bySupplier = {};
  Object.values(orderCart).forEach(item=>{
    if(!bySupplier[item.supplierTitle]) bySupplier[item.supplierTitle] = [];
    bySupplier[item.supplierTitle].push(item);
  });

  let html = `<div class="who-field"><label>Составил</label><div style="font-weight:700;font-size:15px;padding-top:4px;">${orderAuthor}</div></div>
  <div class="who-field"><label>Точка</label><div style="font-weight:700;font-size:15px;padding-top:4px;">${orderPoint}</div></div>
  <div class="who-field"><label>Категория</label><div style="font-weight:700;font-size:15px;padding-top:4px;">${orderCategory}</div></div>`;

  Object.keys(bySupplier).forEach(sup=>{
    html += `<div class="section-title">${sup}</div><div class="q-block" style="padding:6px 14px;">`;
    bySupplier[sup].forEach(item=>{
      html += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;">
        <span>${item.name}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--copper-dark);">${item.qty} шт</span>
      </div>`;
    });
    html += `</div>`;
  });

  html += `
    <div class="sticky-submit">
      <button class="btn-primary" onclick="submitOrderSheet()">Отправить заявку</button>
      <button class="btn-secondary" onclick="pop()">← Добавить ещё позиции</button>
    </div>
  `;
  contentEl.innerHTML = html;
}

function submitOrderSheet(){
  const bySupplier = {};
  Object.values(orderCart).forEach(item=>{
    if(!bySupplier[item.supplierTitle]) bySupplier[item.supplierTitle] = [];
    bySupplier[item.supplierTitle].push(item);
  });

  const answers = { 'Дата': nowDateStr(), 'Точка': orderPoint, 'Категория': orderCategory };
  Object.keys(bySupplier).forEach(sup=>{
    const lines = bySupplier[sup].map(i=>`${i.name} — ${i.qty} шт`).join('; ');
    answers['Поставщик: '+sup] = lines;
  });

  const payload = {
    type:'order-sheet', title:'Лист заявки', submittedBy: orderAuthor,
    timestamp: new Date().toLocaleString('ru-RU'), answers, photos:[]
  };
  sendToSheet(payload);
  STATE.submissions.push(payload);

  orderCart = {};
  push('success', {label:'Лист заявки'});
}

function openKbDirect(key){
  push('kb-list', {kb: DATA[key]});
}

function openKbSection(id){
  const kb = findById(DATA.knowledge, id) || findById(DATA.ttk, id) || findById(DATA.orderMatrix, id) || findById(DATA.orderMatrixReady, id);
  push('kb-list', {kb});
}

function renderKbList(kb){
  if(!kb.articles || kb.articles.length===0){
    contentEl.innerHTML = `<div class="empty-state"><span class="icon">📂</span>Раздел пока пуст.<br>Материалы появятся здесь позже.</div>`;
    return;
  }
  let html='';
  if(kb.contact){
    html += `<div class="q-block" style="margin-bottom:6px;">
      <div style="font-size:13px;line-height:2;color:var(--espresso);">
        <div><strong>Контакты:</strong> ${kb.contact}</div>
        <div><strong>Мин. партия заказа:</strong> ${kb.minOrder}</div>
        <div><strong>Отсрочка платежа:</strong> ${kb.deferral}${kb.deferral!=='—'?' дн.':''}</div>
        <div><strong>Комментарий:</strong> ${linkify(kb.comment)}</div>
      </div>
    </div>
    <div class="section-title">Ассортимент</div>`;
  }
  kb.articles.forEach((a,i)=>{
    const plain = a.body.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    html += `<div class="kb-article" onclick="openKbArticleByIndex('${kb.id}',${i})">
      <strong>${a.title}</strong><span>${plain.slice(0,70)}…</span>
    </div>`;
  });
  contentEl.innerHTML = html;
}

function openKbArticleByIndex(kbId, i){
  const kb = findById(DATA.knowledge, kbId) || findById(DATA.ttk, kbId) || findById(DATA.orderMatrix, kbId) || findById(DATA.orderMatrixReady, kbId)
    || (DATA.shelfLife.id===kbId ? DATA.shelfLife : null);
  push('kb-article', {article: kb.articles[i]});
}

function openKbArticle(article){
  push('kb-article', {article});
}

function linkify(text){
  if(!text) return text;
  return text.replace(/(https?:\/\/[^\s<]+)/g, url => `<a href="${url}" target="_blank" rel="noopener" style="color:var(--copper-dark);word-break:break-all;">${url}</a>`);
}

function renderKbArticle(params){
  contentEl.innerHTML = `<div class="kb-body">${linkify(params.article.body)}</div>`;
}

/* ---------------- ОТПРАВКА В GOOGLE ТАБЛИЦУ ---------------- */

/* ---------------- СОГЛАСОВАНИЕ ЗАЯВОК ---------------- */

function renderApprovalsList(){
  if(!CONFIG.scriptUrl){
    contentEl.innerHTML = `<div class="empty-state"><span class="icon">⚙️</span>Сначала подключите Google Таблицу в Настройках — без неё список заявок недоступен.</div>`;
    return;
  }
  contentEl.innerHTML = `<div class="empty-state"><span class="icon">⏳</span>Загружаем заявки…</div>`;

  fetch(CONFIG.scriptUrl + '?action=orders')
    .then(r=>r.json())
    .then(data=>{
      if(data.status!=='ok'){ throw new Error(data.message||'Ошибка'); }
      renderApprovalsData(data.orders||[]);
    })
    .catch(err=>{
      contentEl.innerHTML = `<div class="empty-state"><span class="icon">⚠️</span>Не удалось загрузить заявки.<br><span style="font-size:11px;">${err}</span></div>`;
    });
}

function statusBadge(status){
  if(status==='Подтверждено') return `<span class="badge" style="background:var(--sage);color:#fff;">✓ Согласована</span>`;
  if(status==='Отклонено') return `<span class="badge" style="background:var(--alert);color:#fff;">✕ Отклонена</span>`;
  return `<span class="badge" style="background:var(--copper);color:#fff;">Ожидает</span>`;
}

function renderApprovalsData(orders){
  if(orders.length===0){
    contentEl.innerHTML = `<div class="empty-state"><span class="icon">🎉</span>Заявок пока нет.</div>`;
    return;
  }
  contentEl.innerHTML = orders.map(o=>{
    const suppliersHtml = (o.suppliers||[]).map(s=>`
      <div style="margin-bottom:8px;">
        <div style="font-weight:700;font-size:12.5px;color:var(--espresso);">${s.name}</div>
        <div style="font-size:12px;color:var(--espresso-soft);">${s.items}</div>
      </div>
    `).join('');
    const actionsHtml = o.status==='Ожидает' ? `
      <div id="actions_${o.id}">
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button style="flex:1;padding:11px;border:none;border-radius:10px;background:var(--sage);color:#fff;font-weight:700;font-size:13px;cursor:pointer;" onclick="decideOrder('${o.id}','Подтверждено')">✓ Подтвердить</button>
          <button style="flex:1;padding:11px;border:none;border-radius:10px;background:var(--alert);color:#fff;font-weight:700;font-size:13px;cursor:pointer;" onclick="showRejectReason('${o.id}')">✕ Отклонить</button>
        </div>
      </div>` : '';
    const commentHtml = o.comment ? `<div style="margin-top:8px;font-size:12px;color:var(--alert);"><strong>Причина отказа:</strong> ${o.comment}</div>` : '';
    return `
    <div class="q-block" style="margin-bottom:14px;" id="order_${o.id}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-weight:700;font-size:14px;">${o.point||'—'}</span>
        <span id="badge_${o.id}">${statusBadge(o.status)}</span>
      </div>
      <div style="font-size:11.5px;color:var(--espresso-soft);margin-bottom:2px;">${o.date||o.timestamp||''}</div>
      <div style="font-size:12px;color:var(--espresso-soft);margin-bottom:10px;">Составил: ${o.author||'—'}</div>
      ${suppliersHtml}
      ${actionsHtml}
      <div id="comment_${o.id}">${commentHtml}</div>
    </div>`;
  }).join('');
}

function showRejectReason(id){
  const actionsEl = document.getElementById('actions_'+id);
  if(!actionsEl) return;
  actionsEl.innerHTML = `
    <div class="q-block" style="margin-top:10px;padding:12px;">
      <div class="q-text">Причина отказа</div>
      <textarea id="rejectReason_${id}" rows="2" placeholder="Например: перебор по бюджету, продублировали заказ..."></textarea>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button style="flex:1;padding:10px;border:none;border-radius:10px;background:var(--alert);color:#fff;font-weight:700;font-size:13px;cursor:pointer;" onclick="decideOrder('${id}','Отклонено')">Отправить отказ</button>
        <button class="btn-secondary" style="flex:0 0 auto;padding:10px 14px;margin-top:0;" onclick="renderApprovalsList()">Отмена</button>
      </div>
    </div>
  `;
}

function decideOrder(id, status){
  const reasonEl = document.getElementById('rejectReason_'+id);
  const comment = reasonEl ? reasonEl.value.trim() : '';

  fetch(CONFIG.scriptUrl, {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({ action:'updateStatus', id, status, comment })
  }).catch(err=>console.warn('Ошибка обновления статуса заявки:', err));

  const badgeEl = document.getElementById('badge_'+id);
  if(badgeEl) badgeEl.innerHTML = statusBadge(status);
  const actionsEl = document.getElementById('actions_'+id);
  if(actionsEl) actionsEl.remove();
  const commentEl = document.getElementById('comment_'+id);
  if(commentEl && comment) commentEl.innerHTML = `<div style="margin-top:8px;font-size:12px;color:var(--alert);"><strong>Причина отказа:</strong> ${comment}</div>`;
  showToast(status==='Подтверждено' ? 'Заявка подтверждена' : 'Заявка отклонена');
}

/* ---------------- ЧАСЫ СОТРУДНИКОВ ---------------- */

function renderEmployeeHours(){
  if(!CONFIG.scriptUrl){
    contentEl.innerHTML = `<div class="empty-state"><span class="icon">⚙️</span>Сначала подключите Google Таблицу в Настройках.</div>`;
    return;
  }
  contentEl.innerHTML = `<div class="empty-state"><span class="icon">⏳</span>Загружаем данные…</div>`;

  fetch(CONFIG.scriptUrl + '?action=timesheetSummary')
    .then(r=>r.json())
    .then(data=>{
      if(data.status!=='ok'){ throw new Error(data.message||'Ошибка'); }
      renderEmployeeHoursData(data.employees||[]);
    })
    .catch(err=>{
      contentEl.innerHTML = `<div class="empty-state"><span class="icon">⚠️</span>Не удалось загрузить данные.<br><span style="font-size:11px;">${err}</span></div>`;
    });
}

function renderEmployeeHoursData(employees){
  if(employees.length===0){
    contentEl.innerHTML = `<div class="empty-state"><span class="icon">🗒️</span>Записей пока нет.<br>Заполните «Учёт рабочего времени» — карточки появятся здесь.</div>`;
    return;
  }
  contentEl.innerHTML = employees.map(emp=>{
    const shiftsHtml = emp.shifts.map(s=>`
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;">
        <span>${s.date||'—'} · ${s.point||'—'} · ${s.start||'?'}–${s.end||'?'}</span>
        <span style="font-family:'JetBrains Mono',monospace;color:var(--espresso-soft);white-space:nowrap;">${s.hours||'—'}</span>
      </div>
    `).join('');
    return `
    <div class="q-block" style="margin-bottom:14px;">
      <div style="font-weight:700;font-size:15px;margin-bottom:8px;">${emp.name}</div>
      ${shiftsHtml}
      <div style="display:flex;justify-content:space-between;padding-top:10px;font-size:14px;font-weight:700;">
        <span>Итого</span>
        <span style="font-family:'JetBrains Mono',monospace;color:var(--sage-dark);">${emp.total}</span>
      </div>
    </div>`;
  }).join('');
}

function sendToSheet(payload){
  if(!CONFIG.scriptUrl){
    console.log('[Демо-режим] Нет URL Apps Script. Данные сохранены только локально:', payload);
    return;
  }
  fetch(CONFIG.scriptUrl, {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  }).catch(err=>console.warn('Ошибка отправки в Google Таблицу:', err));
}

/* ---------------- УТИЛИТЫ ---------------- */

function nowDateStr(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return yyyy+'-'+mm+'-'+dd;
}

function nowTimeStr(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return hh+':'+mm;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function cupSvg(size, id){
  return `<svg class="cup" ${id?`id="${id}"`:''} width="${size}" height="${size}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 35 h50 v30 a25 25 0 0 1 -25 25 h0 a25 25 0 0 1 -25 -25 z" fill="var(--parchment-dark)" stroke="var(--espresso)" stroke-width="3"/>
    <path d="M22 45 h46 v20 a23 23 0 0 1 -23 23 h0 a23 23 0 0 1 -23 -23 z" fill="var(--copper)"/>
    <path d="M70 40 q14 0 14 14 q0 14 -14 14" fill="none" stroke="var(--espresso)" stroke-width="4" stroke-linecap="round"/>
    <line x1="15" y1="35" x2="70" y2="35" stroke="var(--espresso)" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
}

/* ---------------- СТАРТ ---------------- */
render();
