<style>

    --espresso-soft:#5A4436;
    --cream:#FAF3E6;

    --parchment-dark:#E7D5B2;

    --copper-dark:#8E4A1F;
    --sage:#78865B;
    --sage-dark:#5E6E47;

    --shadow: 0 8px 24px rgba(44,27,18,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: linear-gradient(180deg,#EFE3CB 0%, #E3D2AD 100%);
    font-family:'Inter',sans-serif;
    color:var(--espresso);
    display:flex;
    justify-content:center;

  .phone{

    max-width:430px;
    min-height:100vh;

    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow: var(--shadow);
    overflow:hidden;

  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--espresso);
    color:var(--cream);
    padding:16px 16px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    min-height:34px;
  }
  .topbar .back{
    width:32px;height:32px;border-radius:50%;
    background:rgba(250,243,230,0.12);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
    font-size:16px;
    user-select:none;

    font-weight:600;
    font-size:19px;
    margin:0;
    letter-spacing:0.2px;
    line-height:1.2;
  }
  .topbar .sub{
    font-size:11.5px;
    opacity:0.65;
    margin-top:2px;
    font-weight:500;
  }
  .content{

    padding:18px 16px 90px;
    overflow-y:auto;

  }

  .brand h1{

  .brand .tag{
    font-size:12px; color:var(--espresso-soft); margin-top:1px; font-weight:500;
  }
  .section-title{
    font-family:'Fraunces',serif;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1.2px;
    color:var(--espresso-soft);
    margin:22px 0 10px 2px;
    font-weight:600;
  }
  .section-title:first-of-type{margin-top:0;}

  .cat-card{

    border-radius:16px;
    padding:14px 14px;
    display:flex; align-items:center; gap:13px;

  .cat-card:active{ transform:scale(0.98); border-color:var(--copper); }
  .cat-card .icon{

    display:flex;align-items:center;justify-content:center;

  }

  .cat-card .txt span{ display:block; font-size:12px; color:var(--espresso-soft); margin-top:1px; }
  .cat-card .chev{ margin-left:auto; opacity:0.35; font-size:18px; }
  .feedback-strip{

    color:var(--cream);
    border-radius:16px;

  .entry-card .row2{ font-size:12px; color:var(--espresso-soft); margin-top:3px; }

  .kb-article{ background:var(--parchment); border-radius:14px; padding:14px 15px; margin-bottom:9px; cursor:pointer; }
  .kb-article strong{ font-size:14px; display:block; margin-bottom:3px; }
  .kb-article span{ font-size:12px; color:var(--espresso-soft); }
  .kb-body{ font-size:13.5px; line-height:1.6; color:var(--espresso-soft); }
  .kb-body h3{ font-family:'Fraunces',serif; font-size:16px; color:var(--espresso); margin:22px 0 10px; padding-bottom:6px; border-bottom:2px solid var(--copper); }
  .kb-body h3:first-child{ margin-top:0; }
  .kb-body h4{ font-family:'Fraunces',serif; font-size:14.5px; color:var(--espresso); margin:18px 0 6px; }
  .kb-body p{ margin:0 0 10px; }
  .kb-body p.kb-italic{ font-style:italic; color:var(--espresso-soft); }
  .kb-body ul, .kb-body ol{ margin:0 0 10px; padding-left:20px; }
  .kb-body li{ margin-bottom:5px; }

    border-radius:12px; padding:12px 14px; margin:10px 0; font-size:13px;
  }
  .kb-body .case-box{ background:var(--parchment); border-left:4px solid var(--sage-dark); }
  .kb-body .error-box{ background:var(--parchment); border-left:4px solid var(--alert); }
  .kb-body .box-label{ font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; color:var(--espresso); }
  .kb-body .box-body{ color:var(--espresso-soft); }
  .kb-body table.ttk-table{ width:100%; border-collapse:collapse; margin:8px 0 14px; font-size:12.5px; }
  .kb-body table.ttk-table th{ background:var(--parchment); text-align:left; padding:6px 8px; font-weight:700; border-bottom:2px solid var(--copper); }
  .kb-body table.ttk-table td{ padding:6px 8px; border-bottom:1px solid var(--line); }

  /* ---------- SETTINGS ---------- */
  .settings-box{ background:var(--parchment); border-radius:14px; padding:15px; margin-bottom:14px; }
  .settings-box label{ font-size:12px; font-weight:700; display:block; margin-bottom:6px; color:var(--espresso-soft); }
  .status-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .badge{ display:inline-flex; align-items:center; font-size:11.5px; font-weight:600; padding:5px 9px; border-radius:20px; background:var(--cream); }

  ::-webkit-scrollbar{ width:0; }

  .toast{

    background:var(--espresso); color:var(--cream); padding:11px 18px; border-radius:30px;

    transition:opacity .25s ease, bottom .25s ease; max-width:85%; text-align:center;
  }
  .toast.show{ opacity:1; bottom:32px; }
</style>

let pushEnabled = false;

async function enablePushNotifications(){
  if(!CONFIG.scriptUrl){
    showToast('Сначала подключите Google Таблицу (URL Apps Script)');
    return;
  }
  try{
    if(!('serviceWorker' in navigator) || !('Notification' in window)){
      showToast('Этот браузер не поддерживает push-уведомления');
      return;
    }
    const permission = await Notification.requestPermission();
    if(permission !== 'granted'){
      showToast('Уведомления не разрешены');
      return;
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    const messaging = firebase.messaging();
    const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
    const token = await messaging.getToken({ vapidKey: FCM_VAPID_KEY, serviceWorkerRegistration: registration });
    if(!token){
      showToast('Не удалось получить токен уведомлений');
      return;
    }
    await fetch(CONFIG.scriptUrl, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'registerToken', token })
    });
    pushEnabled = true;
    showToast('Уведомления включены на этом устройстве');
    messaging.onMessage(payload=>{
      const t = payload.notification && payload.notification.title || 'Кофе Чек';
      const b = payload.notification && payload.notification.body || '';
      showToast(t + (b?(': '+b):''));
    });
    render();
  } catch(err){
    console.warn('Push setup error:', err);
    showToast('Ошибка включения уведомлений');
  }
}

function nameSelectOptions(selected){
  let html = `<option value="" ${!selected?'selected':''} disabled>Выберите сотрудника</option>`;

      {title:'Капучино', body:'<p>Классический кофейно-молочный напиток, в меру крепкий и молочный.</p><p><strong>Технология приготовления:</strong> В чашку для подачи вливаем эспрессо, далее сверху вливаем молоко, взбитое до температуры 60–65°C. Подача обязательна с латте-артом. Пена 1,5–2 см.</p><table class="ttk-table"><tr><th>Сырьё</th><th>200/300 мл</th><th>400 мл</th></tr><tr><td>Эспрессо шот</td><td>1</td><td>2</td></tr><tr><td>Молоко, мл</td><td>180</td><td>230</td></tr></table><p><strong>Подача в зале:</strong> Керамическая чашка 200/300/400 мл. Латте-арт обязателен.</p><p><strong>Подача «с собой»:</strong> Стакан для горячих напитков 250/350/450 мл. Латте-арт обязателен.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 50 · Белки 3,3 · Жиры 3,5 · Углеводы 4,1</p>'},
      {title:'Латте', body:'<p>Некрепкий кофейно-молочный напиток, во вкусе преобладает молочная сладость.</p><p><strong>Технология приготовления:</strong> В чашку для подачи вливаем эспрессо, далее сверху вливаем молоко, взбитое до температуры 60°C. Пена 1 см.</p><table class="ttk-table"><tr><th>Сырьё</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Эспрессо шот</td><td>1</td><td>2</td></tr><tr><td>Молоко, мл</td><td>250</td><td>300</td></tr></table><p><strong>Подача в зале:</strong> Керамическая чашка 300/400 мл. Латте-арт обязателен.</p><p><strong>Подача «с собой»:</strong> Стакан для горячих напитков 350/450 мл. Латте-арт обязателен.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 55 · Белки 3,5 · Жиры 3,5 · Углеводы 4,8</p>'},
      {title:'Раф', body:'<p>Кофейно-сливочный напиток, не сильно крепкий. Можно добавить любой сироп на выбор гостя (при добавлении сиропа сахар убираем), либо предложить авторские рафы.</p><p><strong>Технология приготовления:</strong> Готовим эспрессо, добавляем в питчер все ингредиенты и взбиваем в плотный однородный напиток. Пена 1,5 см.</p><table class="ttk-table"><tr><th>Сырьё</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Эспрессо шот</td><td>2</td><td>2</td></tr><tr><td>Сливки 10%, мл</td><td>230</td><td>280</td></tr><tr><td>Сахар ванильный, г</td><td>10</td><td>15</td></tr></table><p><strong>Подача в зале:</strong> Стеклянный стакан 300/400 мл.</p><p><strong>Подача «с собой»:</strong> Стакан для горячих напитков 250/350/450 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 105 · Белки 2,9 · Жиры 7,7 · Углеводы 6,2</p>'},
      {title:'Флэт Уайт', body:'<p>Яркий, преобладающий вкус кофе в сочетании с небольшим количеством молока.</p><p><strong>Технология приготовления:</strong> Приготовить эспрессо, влить норму молока, используя технику латте-арта. Пена не больше 0,7 см.</p><table class="ttk-table"><tr><th>Сырьё</th><th>200 мл</th></tr><tr><td>Эспрессо шот</td><td>2</td></tr><tr><td>Молоко, мл</td><td>150</td></tr></table><p><strong>Подача в зале:</strong> Стеклянный стакан 180/200 мл. Латте-арт обязателен.</p><p><strong>Подача «с собой»:</strong> Стакан для горячих напитков 250 мл. Латте-арт обязателен. НЕ доливаем на 2 см.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 45 · Белки 2,6 · Жиры 2,5 · Углеводы 3,5</p>'},
      {title:'Фильтр-кофе', body:'<p>Альтернативный метод приготовления чёрного кофе. Менее плотный по сравнению с американо, но более раскрытый по вкусу.</p><p><strong>Технология приготовления:</strong> Соотношение кофе и воды — 60 г на литр (65 г, если зерно уже не свежее). Готовится в кофеварке. Среднее время приготовления 5–10 минут.</p><table class="ttk-table"><tr><th>Сырьё</th><th>850 мл</th><th>1300 мл</th></tr><tr><td>Кофе, г</td><td>60–65</td><td>90–95</td></tr><tr><td>Вода, г</td><td>1000</td><td>1500</td></tr></table><p><strong>Подача в зале:</strong> Керамическая чашка 200/300 мл, желательно прогретая заранее. Подаётся со стаканом воды. Кратко рассказать про страну происхождения зерна и вкусовой профиль.</p><p><strong>Подача «с собой»:</strong> Стакан для горячих напитков 250/350 мл, обдать паром внутри перед подачей.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 5 · Белки 0,1 · Жиры 0,1 · Углеводы 0,1</p>'},
      {title:'Воронка классическая (V60)', body:'<p>Альтернативный метод приготовления чёрного кофе. Отличается от батч-брю и клевера большим раскрытием вкусового букета зерна.</p><p><strong>Технология приготовления:</strong> Соотношение кофе и воды — 1 к 16,6. Вода 93±1°C. Рекомендуемое время приготовления 3–5 минут.</p><table class="ttk-table"><tr><th>Сырьё</th><th>230–250 мл</th></tr><tr><td>Кофе, г</td><td>18</td></tr><tr><td>Вода, г</td><td>300</td></tr></table><p><strong>Подача в зале:</strong> Чайник Hario, подаём со стаканом воды и прогретой чашкой/стеклянным стаканом (нежелательно) 300 мл. Кратко рассказать про страну происхождения зерна и вкусовой профиль.</p><p><strong>Подача «с собой»:</strong> Стакан для горячих напитков 250/350 мл, обдать паром внутри перед подачей.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 5 · Белки 0,1 · Жиры 0,1 · Углеводы 0,1</p>'},
      {title:'Воронка иммерсионная', body:'<p>Альтернативный метод приготовления чёрного кофе. Отличается от батч-брю и V60 большей плотностью и насыщенностью.</p><p><strong>Технология приготовления:</strong> Соотношение кофе и воды — 1 к 16,6. Вода 93±1°C. Рекомендуемое время настаивания 2–4 минуты.</p><table class="ttk-table"><tr><th>Сырьё</th><th>230–250 мл</th></tr><tr><td>Кофе, г</td><td>18</td></tr><tr><td>Вода, г</td><td>300</td></tr></table><p><strong>Подача в зале:</strong> Чайник Hario, подаём со стаканом воды и прогретой чашкой/стеклянным стаканом (нежелательно) 300 мл. Кратко рассказать про страну происхождения зерна и вкусовой профиль.</p><p><strong>Подача «с собой»:</strong> Стакан для горячих напитков 250/350 мл, обдать паром внутри перед подачей.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 5 · Белки 0,1 · Жиры 0,1 · Углеводы 0,1</p>'}
      ]

вишней.</p><p><strong>Технология приготовления:</strong> В стакан добавить кордиал тонка, сиропы топинамбура и вишни, затем лёд и молоко. Перемешать барной ложкой, чтобы всё равномерно распределилось в молоке. Отдельно в чаше для матчи смешать порошковый чай ходзича с тёплой водой венчиком до полного растворения. Полученный концентрат влить в стакан ЧЕРЕЗ СИТО поверх молока и остальных ингредиентов.</p><table class="ttk-table"><tr><th>Сырьё</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Ходзича</td><td>2 г</td><td>2 г</td></tr><tr><td>Кордиал бобы тонка</td><td>12,5 г</td><td>18 г</td></tr><tr><td>Топинамбур сироп</td><td>7 г</td><td>10 г</td></tr><tr><td>Сироп вишня (Гербариста)</td><td>3 г</td><td>5 г</td></tr><tr><td>Лёд</td><td>150 г</td><td>180 г</td></tr><tr><td>Миндальное молоко (Планто)</td><td>170 г</td><td>180 г</td></tr></table><p><strong>Посуда для подачи:</strong> Стеклянный стакан.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 41,7 · Белки 0,5 · Жиры 0,9 · Углеводы 7,9</p>'},

 оба слоя одновременно или по очереди небольшими порциями, чтобы получился вертикальный слоистый эффект (жёлтый слой гуще — можно наливать по стенке, затем добавлять красный).</p><table class="ttk-table"><tr><th>Сырьё</th><th>400 мл</th></tr><tr><td>Банан п/ф (красный слой)</td><td>40 г</td></tr><tr><td>Пюре черника (Одеви)</td><td>50 г</td></tr><tr><td>Клубничное пюре (Одеви)</td><td>80 г</td></tr><tr><td>Коллаген</td><td>10 г</td></tr><tr><td>Лёд (красный слой)</td><td>50 г</td></tr><tr><td>Вода (красный слой)</td><td>40 г</td></tr><tr><td>Манго с/м (жёлтый слой)</td><td>50 г</td></tr><tr><td>Банан п/ф (жёлтый слой)</td><td>70 г</td></tr><tr><td>Вода (жёлтый слой)</td><td>70 г</td></tr><tr><td>Лёд (жёлтый слой)</td><td>70 г</td></tr></table><p><strong>Посуда для подачи:</strong> Стеклянный стакан.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 120 · Белки 0,6 · Жиры 0,1 · Углеводы 14,1</p>'},

      {title:'П/ф «Основа Какао»', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> Смешать ингредиенты согласно расходу сырья на нужный размер порции.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th><th>L</th></tr><tr><td>Какао порошок</td><td>10 г</td><td>50 г</td><td>100 г</td></tr><tr><td>Горячая вода</td><td>40 г</td><td>200 г</td><td>400 г</td></tr><tr><td>Количество порций</td><td>1</td><td>5</td><td>10</td></tr></table>'},
      {title:'П/ф «Сырный Латте крем»', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> Все ингредиенты взбиваем в блендере в течение 30–40 секунд (сливки рекомендуется использовать комнатной температуры). В сифон предварительно добавляем пружину, чтобы смесь перемешивалась легче и не образовывались комки.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th><th>L</th></tr><tr><td>Сливки 22%</td><td>150 г</td><td>300 г</td><td>600 г</td></tr><tr><td>Сыр</td><td>75 г</td><td>150 г</td><td>300 г</td></tr><tr><td>Сахар</td><td>25 г</td><td>50 г</td><td>100 г</td></tr><tr><td>Соль</td><td>1 г</td><td>2 г</td><td>4 г</td></tr><tr><td>Альбумин</td><td>5 г</td><td>10 г</td><td>20 г</td></tr><tr><td>Баллон N2O</td><td>1 шт</td><td>2 шт</td><td>2–3 шт</td></tr></table>'},
      {title:'Пена банан п/ф', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> Все ингредиенты взбиваем в блендере в течение 30–40 секунд (сливки рекомендуется использовать комнатной температуры). В сифон предварительно добавляем использованный баллон или пружину, чтобы смесь перемешивалась легче и не образовывались комки.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th><th>L</th></tr><tr><td>Сливки 22%</td><td>175 г</td><td>350 г</td><td>525 г</td></tr><tr><td>Эспрессо</td><td>1 шт (40 г)</td><td>2 шт (80 г)</td><td>4 шт (160 г)</td></tr><tr><td>Пюре банан (Монин)</td><td>87 г</td><td>175 г</td><td>260 г</td></tr><tr><td>Альбумин</td><td>10 г</td><td>20 г</td><td>30 г</td></tr><tr><td>Баллон N2O</td><td>1 шт</td><td>2 шт</td><td>3 шт</td></tr><tr><td>Количество порций</td><td>8 / 6 шт</td><td>16 / 12 шт</td><td>25 / 18 шт</td></tr></table>'},
      {title:'Пена апельсиновая п/ф', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> Все ингредиенты взбиваем в блендере в течение 30–40 секунд (сливки рекомендуется использовать комнатной температуры). В сифон предварительно добавляем использованный баллон или пружину, чтобы смесь перемешивалась легче и не образовывались комки.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th><th>L</th></tr><tr><td>Сливки 33%</td><td>130 г</td><td>260 г</td><td>525 г</td></tr><tr><td>Кордиал апельсин</td><td>112 г</td><td>225 г</td><td>450 г</td></tr><tr><td>Баллон N2O</td><td>1 шт</td><td>2 шт</td><td>3 шт</td></tr><tr><td>Количество порций</td><td>8 / 6 шт</td><td>16 / 12 шт</td><td>25 / 18 шт</td></tr></table>'},
      {title:'П/ф кордиал жасмин', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> Смешать ингредиенты в чайнике, воду брать 85°C, настаивать 2 часа, процедить от чая и бутонов, остудить до комнатной температуры, перелить в соусник.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th><th>L</th></tr><tr><td>Чай Моли Хуа Ча</td><td>12 г</td><td>24 г</td><td>48 г</td></tr><tr><td>Вода</td><td>280 г</td><td>560 г</td><td>1120 г</td></tr><tr><td>Выход</td><td>250 г</td><td>500 г</td><td>1000 г</td></tr></table>'},
      {title:'П/ф украшение для ягодного смузи', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 120 ч.</p><p><strong>Технология приготовления:</strong> В чистый сухой блендер налить холодную воду, добавить ксантан и краситель, перебить на низких оборотах до однородной консистенции. Перелить в соусник.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th><th>L</th></tr><tr><td>Вода</td><td>275 г</td><td>550 г</td><td>1100 г</td></tr><tr><td>Ксантан</td><td>уточнить у управляющего</td><td>5,5 г</td><td>11 г</td></tr><tr><td>Краситель</td><td>4 г</td><td>8 г</td><td>16 г</td></tr></table><p class="kb-italic">В исходном файле значение ксантана для размера S выглядит как опечатка/ошибка формата ячейки — уточните точную граммовку.</p>'},
      {title:'П/ф фиников', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+4°C, 48 ч.</p><p><strong>Технология приготовления:</strong> Очистить финики от косточек и промыть горячей водой.</p><table class="ttk-table"><tr><th>Сырьё</th><th>Расход</th></tr><tr><td>Финики</td><td>350 г (с косточкой)</td><td>300 г (без косточки)</td><td>потеря 0,15</td></tr></table>'},
      {title:'П/ф сахарный сироп', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 30 суток.</p><p><strong>Технология приготовления:</strong> Смешать ингредиенты в большом питчере, нагреть на форсунке кофемашины до полного растворения сахара. Остудить до комнатной температуры, перелить в стеклянную бутылку.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th><th>L</th></tr><tr><td>Сахар</td><td>—</td><td>260 г</td><td>510 г</td></tr><tr><td>Вода</td><td>—</td><td>260 г</td><td>510 г</td></tr></table>'},
      {title:'Нарезка цитрусовых фруктов', body:'<p><strong>Условия и срок хранения:</strong> —</p><p><strong>Технология приготовления:</strong> Нарезаем очень острым ножом, толщиной 4–5 мм.</p>'},
      {title:'П/ф Матча', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 12 ч.</p><p><strong>Технология приготовления:</strong> В блендер наливаем тёплую воду, затем добавляем матчу. Аккуратно перемешиваем на низкой скорости, после чего переливаем в бутылку. Перед каждым использованием активно встряхиваем бутылку, чтобы осадок перемешивался.</p><table class="ttk-table"><tr><th>Сырьё</th><th>Расход</th></tr><tr><td>Матча</td><td>20 г</td></tr><tr><td>Вода 40°C</td><td>400 г</td></tr></table>'},
      {title:'П/ф Ходзича', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> В блендер наливаем тёплую воду, затем добавляем ходзичу. Аккуратно перемешиваем на низкой скорости, после чего переливаем в бутылку. Перед каждым использованием активно встряхиваем бутылку, чтобы осадок перемешивался.</p><table class="ttk-table"><tr><th>Сырьё</th><th>Расход</th></tr><tr><td>Ходзича</td><td>20 г</td></tr><tr><td>Вода 40°C</td><td>400 г</td></tr></table>'},
      {title:'П/ф Сливочный сыр', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> Для милкшейка: на 300 мл — 140 г, на 400 мл — 170 г. Для сырного латте: на 300 мл — 50 г, на 400 мл — 75 г.</p><table class="ttk-table"><tr><th>Сырьё</th><th>Расход</th></tr><tr><td>Молоко</td><td>500 г</td></tr><tr><td>Сыр</td><td>350 г</td></tr></table>'},
      {title:'П/ф Лимонад щавель', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> На один лимонад расходуется 105 г заготовки.</p><table class="ttk-table"><tr><th>Сырьё</th><th>на 5 порций</th></tr><tr><td>Кордиал щавель</td><td>275 г</td></tr><tr><td>Сок лимона</td><td>75 г</td></tr><tr><td>Сахарный сироп</td><td>175 г</td></tr></table>'},
      {title:'П/ф Лимонад жасмин', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> На один лимонад расходуется 85 г заготовки.</p><table class="ttk-table"><tr><th>Сырьё</th><th>на 5 порций</th></tr><tr><td>Кордиал лемонграсс</td><td>100 г</td></tr><tr><td>Кордиал жасмин п/ф</td><td>50 г</td></tr><tr><td>Сок лимона</td><td>75 г</td></tr><tr><td>Сахарный сироп</td><td>50 г</td></tr><tr><td>Пюре юдзу</td><td>150 г</td></tr></table>'},
      {title:'П/ф Лимонад малина-маракуйя', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> На один лимонад расходуется 70 г заготовки.</p><table class="ttk-table"><tr><th>Сырьё</th><th>на 5 порций</th></tr><tr><td>Малина (Одеви)</td><td>200 г</td></tr><tr><td>Маракуйя (Монин)</td><td>125 г</td></tr><tr><td>Сок лимона</td><td>25 г</td></tr></table>'},
      {title:'П/ф Ореховый', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> На один напиток расходуется 40 г заготовки.</p><table class="ttk-table"><tr><th>Сырьё</th><th>на 5 порций</th></tr><tr><td>Фундук (паста)</td><td>100 г</td></tr><tr><td>Миндаль (паста)</td><td>100 г</td></tr></table>'},
      {title:'Протеиновое молоко', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+6°C, 48 ч.</p><p><strong>Технология приготовления:</strong> В питчер добавляем молоко, затем протеин и креатин (или другие ингредиенты в зависимости от напитка). Тщательно перемешиваем венчиком до однородной консистенции.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th><th>L</th></tr><tr><td>Безлактозное молоко</td><td>100 г</td><td>500 г</td><td>1000 г</td></tr><tr><td>Протеин</td><td>5 г</td><td>25 г</td><td>50 г</td></tr></table>'},
      {title:'Заготовка «Малиновый крем-латте» (Магнит, коллаба)', body:'<p><strong>Условия и срок хранения:</strong> Хранить при температуре +2…+24°C, 720 ч.</p><p><strong>Технология приготовления:</strong> Добавьте в питчер все ингредиенты, тщательно перемешайте венчиком до однородной консистенции, затем перелейте в соусник.</p><table class="ttk-table"><tr><th>Сырьё</th><th>S</th><th>M</th></tr><tr><td>Сироп малина</td><td>75 г</td><td>150 г</td></tr><tr><td>Краситель 7655</td><td>1 г</td><td>2 г</td></tr></table>'}
      ]

    {
      id:'sogrevayushie', icon:'🔥', title:'Согревающие напитки',
      articles:[
      {title:'Ореховый Раф', body:'<p>Плотный ореховый профиль с выраженными нотами миндаля и фундука на основе эспрессо. Сладковатый, сглаженный вкус.</p><p><strong>Технология приготовления:</strong> В чистый питчер добавляем эспрессо, пасты и активно перемешиваем. Далее добавляем молоко и сахарный сироп, перемешиваем венчиком до однородной массы и взбиваем, как на капучино, до 1,5 см при температуре 60°C. Аккуратно наливаем в чашку. Украшаем посыпкой с какао тонким слоем.</p><table class="ttk-table"><tr><th>Сырьё</th><th>300 мл</th></tr><tr><td>Миндальная паста</td><td>20 г</td></tr><tr><td>Фундучная паста</td><td>20 г</td></tr><tr><td>Эспрессо</td><td>2 шота</td></tr><tr><td>Молоко</td><td>200 г</td></tr><tr><td>Сахарный сироп</td><td>17 г</td></tr><tr><td>Какао (украшение)</td><td>0,2 г</td></tr></table><p><strong>В зале:</strong> Украшаем посыпкой с какао тонким слоем.</p><p><strong>В формате «с собой»:</strong> Без лепестков.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 121 · Белки 4,6 · Жиры 9,3 · Углеводы 9,3</p>'},

      {title:'Какао', body:'<p><strong>Технология приготовления:</strong> В маленький питчер добавляем первую порцию молока и ванильный сахар, нагреваем стиммером, далее добавляем какао. Размешиваем до однородной массы электрическим венчиком и переливаем в посуду для подачи ЧЕРЕЗ СИТО. Взбиваем вторую порцию молока и вливаем техникой латте-арт.</p><table class="ttk-table"><tr><th>Сырьё</th><th>200 мл</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Какао</td><td>7 г</td><td>10 г</td><td>13 г</td></tr><tr><td>Сахар ванильный</td><td>7 г</td><td>10 г</td><td>13 г</td></tr><tr><td>Молоко (1-я порция)</td><td>40 г</td><td>40 г</td><td>50 г</td></tr><tr><td>Молоко (2-я порция)</td><td>150 г</td><td>200 г</td><td>250 г</td></tr></table><p><strong>В зале:</strong> В керамической чашке 200/300/400 мл. Латте-арт обязателен.</p><p><strong>В формате «с собой»:</strong> Стакан для горячих напитков объёмом 250/350/450 мл. Латте-арт обязателен.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 76 · Белки 3,3 · Жиры 3,3 · Углеводы 8,4</p>'},
      {title:'Горячий шоколад', body:'<p><strong>Технология приготовления:</strong> В питчер наливаем сливки и добавляем шоколадные дропсы. Топим паровиком, пока шоколад не растопится в горячих сливках. Далее размешиваем венчиком.</p><table class="ttk-table"><tr><th>Сырьё</th><th>200 мл</th></tr><tr><td>Шоколадные дропсы тёмные</td><td>25 г</td></tr><tr><td>Шоколадные дропсы белые</td><td>25 г</td></tr><tr><td>Сливки</td><td>150 г</td></tr></table><p><strong>В зале:</strong> В стеклянном стакане 0,18 л (как для флэт уайт). Подаём на деревянной доске с ложкой и стаканом воды.</p><p><strong>В формате «с собой»:</strong> Стакан для горячих напитков объёмом 250 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 222 · Белки 3,4 · Жиры 15,9 · Углеводы 16</p>'}

      articles:[
      {title:'Матча-латте', body:'<p>Тонкий травянистый вкус и природный изумрудный цвет создают изысканное сочетание традиционного японского чая и мягкого молока.</p><p><strong>Технология приготовления:</strong> Воду и матчу добавляем в пиалу для матчи и доводим до однородной массы. Переливаем в посуду для подачи ЧЕРЕЗ СИТО. Взбиваем молоко, как для капучино, и вливаем с латте-артом.</p><table class="ttk-table"><tr><th>Сырьё</th><th>200 мл</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Горячая вода</td><td>—</td><td>40 г</td><td>50 г</td></tr><tr><td>Молоко</td><td>—</td><td>230 г</td><td>280 г</td></tr><tr><td>Матча</td><td>—</td><td>2 г</td><td>3 г</td></tr></table><p><strong>В зале:</strong> В керамической чашке 300/400 мл. Латте-арт обязателен.</p><p><strong>В формате «с собой»:</strong> Стакан для горячих напитков объёмом 350/450 мл. Латте-арт обязателен.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 48 · Белки 2,4 · Жиры 2,5 · Углеводы 3,9</p>'},
      {title:'Матча с апельсиновым соком/фрешем', body:'<p>Освежающая матча с сочным апельсиновым соком.</p><p><strong>Технология приготовления:</strong> В стакан для подачи насыпаем лёд. Отдельно в пиалу добавляем воду, матчу, размешиваем. Выливаем сначала матча-шот, на него сверху сок. В стекле и стаканах «с собой» с плоской крышкой напиток должен отступать от края на 1 см.</p><table class="ttk-table"><tr><th>Сырьё</th><th>200 мл</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Матча</td><td>—</td><td>2 г</td><td>3 г</td></tr><tr><td>Вода</td><td>—</td><td>40 г</td><td>50 г</td></tr><tr><td>Сок апельсин</td><td>—</td><td>200 г</td><td>250 г</td></tr><tr><td>Лёд</td><td>—</td><td>100 г</td><td>150 г</td></tr></table><p><strong>В зале:</strong> Стеклянный высокий бокал 300/400 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для холодных напитков объёмом 350/450 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 28 · Белки 0,6 · Жиры 0,1 · Углеводы 6,1</p>'},
      {title:'Холодная матча', body:'<p>Холодный бодрящий напиток на основе перемолотого японского зелёного чая. Прекрасно сочетается с альтернативным молоком.</p><p><strong>Технология приготовления:</strong> Порцию воды и матчу добавляем в пиалу, перемешиваем до однородной консистенции без комочков венчиком для матчи. В посуду для подачи добавляем лёд, сверху наливаем молоко, после добавляем матчу ЧЕРЕЗ СИТО. При добавлении сиропа — сначала в пиалу с матчей, затем выливаем на молоко со льдом.</p><table class="ttk-table"><tr><th>Сырьё</th><th>200 мл</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Горячая вода</td><td>—</td><td>40 г</td><td>50 г</td></tr><tr><td>Молоко</td><td>—</td><td>200 г</td><td>250 г</td></tr><tr><td>Матча</td><td>—</td><td>2 г</td><td>3 г</td></tr><tr><td>Лёд</td><td>—</td><td>100 г</td><td>150 г</td></tr></table><p><strong>В зале:</strong> Стеклянный высокий бокал 300/400 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для холодных напитков объёмом 350/450 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 37 · Белки 1,9 · Жиры 1,9 · Углеводы 3</p>'},
      {title:'Матча-тоник', body:'<p>Бодрящий зелёный чай матча в сочетании со швепсом и лёгкой кислинкой лимона.</p><p><strong>Технология приготовления:</strong> Порцию воды и матчу добавляем в пиалу, перемешиваем без комочков венчиком для матчи. В стакане для подачи мадлерим лимон, добавляем лёд, вливаем тоник. Сверху добавляем матчу.</p><table class="ttk-table"><tr><th>Сырьё</th><th>200 мл</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Горячая вода</td><td>—</td><td>40 г</td><td>50 г</td></tr><tr><td>Матча</td><td>—</td><td>2 г</td><td>3 г</td></tr><tr><td>Лимон</td><td>—</td><td>15 г</td><td>15 г</td></tr><tr><td>Тоник</td><td>—</td><td>200 г</td><td>250 г</td></tr><tr><td>Лёд</td><td>—</td><td>100 г</td><td>150 г</td></tr></table><p><strong>В зале:</strong> Стеклянный высокий бокал 300/400 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для холодных напитков объёмом 350/450 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 24 · Белки 0,2 · Жиры 0 · Углеводы 5,4</p>'}
      ]

      articles:[
      {title:'Чай листовой', body:'<p>У нас есть несколько видов чая: зелёный (молочный улун, классический зелёный сенча либо ганпаудэр), чёрный (классический чёрный, с бергамотом, манго) и красный (наглый фрукт).</p><p><strong>Технология приготовления:</strong> Насыпаем чай в пакетик, кладём в посуду для подачи, добавляем горячую воду.</p><table class="ttk-table"><tr><th>Сырьё</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Сенча / Молочный улун / Эрл грей / Ассам</td><td>3 г</td><td>4 г</td></tr><tr><td>Наглый фрукт / Гречишный чай</td><td>5 г</td><td>7 г</td></tr></table><p><strong>В зале:</strong> В керамической чашке 300/400 мл. Чайник 600 мл подаётся на подносе и с чашкой (уточните у гостя количество чашек).</p><p><strong>В формате «с собой»:</strong> Стакан для горячих напитков объёмом 350/450 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 0 · Белки 0 · Жиры 0 · Углеводы 0</p>'},
      {title:'Чай имбирный', body:'<p>Насыщенный согревающий напиток на основе имбиря.</p><p><strong>Технология приготовления:</strong> Добавляем в питчер лимон, немного мадлерим его. Далее добавляем все ингредиенты и прогреваем стимером до 80–90°C. Переливаем в посуду для подачи.</p><table class="ttk-table"><tr><th>Сырьё</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Пюре имбирь</td><td>50 г</td><td>70 г</td></tr><tr><td>Вода</td><td>200 г</td><td>300 г</td></tr><tr><td>Лимон</td><td>20 г</td><td>30 г</td></tr><tr><td>Мёд</td><td>20 г</td><td>30 г</td></tr></table><p><strong>В зале:</strong> В керамической чашке 300/400 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для горячих напитков объёмом 350/450 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 42,9 · Белки 0,1 · Жиры 0,1 · Углеводы 10,5</p>'},
      {title:'Чай малиновый', body:'<p>Насыщенный согревающий напиток на основе малины и лайма.</p><p><strong>Технология приготовления:</strong> В питчер добавляем лайм, немного мадлерим его. Добавляем размороженное пюре малины, топинамбур, холодную воду. Прогреваем все ингредиенты стимером до 80–90°C. С/м малину добавляем в стакан. Переливаем в посуду для подачи, украшаем 1 слайсом лайма.</p><table class="ttk-table"><tr><th>Сырьё</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Пюре малина (Одеви/Агробар)</td><td>50 г</td><td>65 г</td></tr><tr><td>Лайм</td><td>15 г</td><td>20 г</td></tr><tr><td>Вода</td><td>200 г</td><td>260 г</td></tr><tr><td>Топинамбур</td><td>30 г</td><td>39 г</td></tr><tr><td>Малина с/м</td><td>15 г</td><td>20 г</td></tr></table><p><strong>В зале:</strong> В керамической чашке 300/400 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для горячих напитков объёмом 350/450 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 62,3 · Белки 0,1 · Жиры 0 · Углеводы 17,2</p>'},
      {title:'Чай облепиховый', body:'<p>Насыщенный согревающий напиток на основе облепихи.</p><p><strong>Технология приготовления:</strong> В питчер добавляем топинамбур, облепиховый п/ф, лимон, холодную воду. Прогреваем все ингредиенты стимером до 80–90°C. Переливаем в посуду для подачи, украшаем мятой и цедрой апельсина.</p><table class="ttk-table"><tr><th>Сырьё</th><th>300 мл</th><th>400 мл</th></tr><tr><td>Пюре облепиха (Одеви)</td><td>70 г</td><td>90 г</td></tr><tr><td>Топинамбур</td><td>30 г</td><td>40 г</td></tr><tr><td>Мята</td><td>5 г</td><td>5 г</td></tr><tr><td>Лимон</td><td>20 г</td><td>25 г</td></tr><tr><td>Вода</td><td>200 г</td><td>260 г</td></tr><tr><td>Цедра апельсина</td><td>2 г</td><td>3 г</td></tr></table><p><strong>В зале:</strong> В керамической чашке 300/400 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для горячих напитков объёмом 350/450 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 75,1 · Белки 0,2 · Жиры 0 · Углеводы 19,3</p>'}

      {title:'Апельсиновый фреш', body:'<p><strong>Технология приготовления:</strong> Тщательно вымыть апельсины. Разрезать на две дольки. Выжать сок с помощью соковыжималки для цитрусовых, подставив под стакан весы. Опционально — процедить сок через сито для удаления мякоти.</p><table class="ttk-table"><tr><th>Сырьё</th><th>250 мл</th><th>350 мл</th></tr><tr><td>Фреш апельсин</td><td>250 г</td><td>350 г</td></tr></table><p><strong>В зале:</strong> Стеклянный высокий бокал 250/350 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для холодных напитков объёмом 250/350 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 45 · Белки 0,7 · Жиры 0,1 · Углеводы 10</p><p class="kb-italic">Хранение сырья: выбирайте свежие апельсины с гладкой кожурой без повреждений и плесени. Храните в холодильнике при +2…+8°C, в один слой, без герметичной упаковки — для циркуляции воздуха. Регулярно проверяйте на признаки порчи.</p>'},
      {title:'Грейпфрутовый фреш', body:'<p><strong>Технология приготовления:</strong> Тщательно вымыть грейпфрут. Разрезать на две дольки. Выжать сок с помощью соковыжималки для цитрусовых, подставив под стакан весы. Опционально — процедить через сито.</p><table class="ttk-table"><tr><th>Сырьё</th><th>250 мл</th><th>350 мл</th></tr><tr><td>Фреш грейпфрут</td><td>250 г</td><td>350 г</td></tr></table><p><strong>В зале:</strong> Стеклянный высокий бокал 250/350 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для холодных напитков объёмом 250/350 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 38 · Белки 0,6 · Жиры 0,1 · Углеводы 4,9</p><p class="kb-italic">Хранение сырья: выбирайте плоды без вмятин и мягких мест. Храните в холодильнике при +2…+8°C в контейнере/пакете с вентиляцией, до 3–4 недель. Достаньте за 30–60 минут до использования для большей сочности.</p>'},
      {title:'Фреш яблочный', body:'<p><strong>Технология приготовления:</strong> Тщательно вымыть яблоки. Удалить сердцевину и нарезать на кусочки. Загрузить в соковыжималку, получить свежевыжатый сок. Перелить в ёмкость.</p><table class="ttk-table"><tr><th>Сырьё</th><th>250 мл</th><th>350 мл</th></tr><tr><td>Фреш яблочный</td><td>250 г</td><td>350 г</td></tr></table><p><strong>В зале:</strong> Стеклянный высокий бокал 250/350 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для холодных напитков объёмом 250/350 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 46 · Белки 0,3 · Жиры 0 · Углеводы 11</p><p class="kb-italic">Хранение сырья: выбирайте свежие, плотные яблоки без порчи. Храните при +2…+8°C и влажности 85–90%, в один слой. Используйте в течение нескольких дней после покупки.</p>'},
      {title:'Морковный фреш', body:'<p><strong>Технология приготовления:</strong> Тщательно вымыть морковь и очистить от кожуры. Нарезать на небольшие кусочки. Измельчить с помощью овощерезки или ножа. Пропустить через соковыжималку. Опционально — процедить через сито. Разлить в стаканы.</p><table class="ttk-table"><tr><th>Сырьё</th><th>250 мл</th><th>350 мл</th></tr><tr><td>Морковный фреш</td><td>250 г</td><td>350 г</td></tr></table><p><strong>В зале:</strong> Стеклянный высокий бокал 250/350 мл.</p><p><strong>В формате «с собой»:</strong> Стакан для холодных напитков объёмом 250/350 мл.</p><p><strong>КБЖУ на 100 г:</strong> Ккал 41 · Белки 0,9 · Жиры 0,2 · Углеводы 9,6</p><p class="kb-italic">Хранение сырья: храните морковь в холодильнике при +2…+6°C и влажности 90–95%, в сухом чистом контейнере. Срок хранения около 2–3 недель.</p>'}

      id:'shift-manager', icon:'🗂️', title:'База знаний: менеджер',
      articles:[
        {title:'БЛОК: СЕРВИС', body:'<p>Менеджер смены - это глаза, руки и голос стандарта компании в течение конкретной смены. В отличие от территориального управляющего, который видит картину на горизонте недель и месяцев, менеджер работает в моменте «здесь и сейчас»: он не пишет стратегию сервиса, а обеспечивает, чтобы каждый Гость на этой смене получил то, что обещает бренд.</p><p><strong>Зона ответственности</strong></p><p>За соблюдение стандартов сервиса на смене. За качество напитков и блюд на выдаче. За внешний вид сотрудников и зоны обслуживания. За работу с обратной связью от Гостей на месте.</p><p><strong>Метрики и ожидаемые результаты</strong></p><ul><li>Оценка по чек-листам/КЛН</li><li>Результаты тайного гостя по смене</li><li>Количество жалоб Гостей за смену/период</li><li>Время обслуживания Гостя</li><li>% решённых конфликтных ситуаций на месте -----------------------------------------------------------------------</li></ul><h3>СОБЛЮДЕНИЕ СТАНДАРТОВ НА СМЕНЕ</h3><h4>1. Обеспечивать бесперебойную работу точки на своей смене в соответствии со стандартами компании</h4><p class="kb-italic">Что это значит на практике: Менеджер смены отвечает за то, чтобы конкретные 8-12 часов работы точки прошли без сбоев: не закончилось сырьё, не встала касса, не было провалов в расстановке людей. Это зона прямой, немедленной ответственности - в отличие от ТУ, у менеджера нет «потом разберёмся», есть только «сейчас работает или не работает».</p><p><strong>Как действовать:</strong></p><ul><li>В начале смены оценить вводные: сколько сырья, кто на смене, какие задачи передал предыдущий менеджер/управляющий.</li><li>Держать в голове или на бумаге чек-лист критичных точек (касса, кофемашина, наличие основных ингредиентов).</li><li>При любом сбое - реагировать в первые минуты, а не ждать, что «само наладится».</li><li>В конце смены передавать вводные следующему менеджеру: что произошло, на что обратить внимание.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В середине смены заканчивается молоко, а следующая поставка только вечером. Бариста продолжают принимать заказы на напитки с молоком, не предупреждая менеджера. Разбор. Проблема не в том, что молоко закончилось (это можно было предвидеть), а в том, что бариста не сообщили вовремя, и менеджер узнал о ситуации только когда Гости начали жаловаться на задержку. Действия. 1) Немедленно проверить остатки молока и альтернативы (другая точка сети, ближайший магазин, растительное молоко как временная замена). 2) Временно скорректировать меню на кассе/баре, чтобы бариста ы предупреждали Гостей заранее. 3) После смены - разобрать с командой правило: о любом критичном остатке сообщать менеджеру сразу, как только видно, что товара осталось на 1-2 часа работы.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Типичная ошибка - считать, что раз стандартный процесс «обычно работает», то не нужно проверять критичные остатки в начале и середине смены лично.</div></div><h4>2. Контролировать качество приготовления напитков и блюд бариста в течение смены</h4><p class="kb-italic">Что это значит на практике: в отличие от выборочных проверок ТУ (раз в несколько дней), менеджер смены контролирует качество практически непрерывно, потому что именно он физически присутствует на точке всю смену.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически (каждые 1-2 часа) проверять несколько готовых напитков на соответствие стандарту - температура, внешний вид, время приготовления.</li><li>Сразу останавливать систематическую ошибку, а не дожидаться жалобы Гостя.</li><li>Давать обратную связь бариста сразу, в моменте, а не откладывать на конец смены.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В час пик бариста начинают срезать углы - не взвешивают дозу кофе, чтобы успевать быстрее, и вкус напитков становится менее стабильным. Разбор. Под давлением потока бариста интуитивно выбирают скорость в ущерб стандарту, если не чувствуют контроля в моменте. Если менеджер не вмешается прямо во время пика, это закрепится как привычка. Действия. 1) В моменте пика - кратко напомнить бариста, что важнее: «делаем по стандарту, скорость идёт за качеством». 2) Если объективно не хватает рук - самому встать на помощь (сборка напитков, выдача), а не просто требовать. 3) После пика - короткий разбор с командой, как организовать рабочие места эффективнее, чтобы не приходилось выбирать между скоростью и стандартом.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - устраивать разбор ошибок прямо в разгар потока Гостей, что создаёт ещё больший хаос; лучше быстро скорректировать действие и разобрать ситуацию в спокойный момент.</div></div><h4>3. Контролировать стандарты обслуживания и скорость работы бариста на смене</h4><p class="kb-italic">Что это значит на практике: Скорость и вежливость обслуживания - то, что Гость замечает мгновенно. Менеджер должен балансировать эти два параметра в реальном времени, а не выбирать только один.</p><p><strong>Как действовать:</strong></p><ul><li>Наблюдать за линией обслуживания со стороны, особенно в часы пик.</li><li>Замечать, если очередь растёт быстрее, чем обычно, и оперативно подключать дополнительные руки.</li><li>Следить, чтобы скорость не достигалась за счёт грубости или невнимательности к Гостю.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В пиковые часы очередь выросла, бариста ё начинает обслуживать гостей резко, без приветствия, лишь бы быстрее закрыть очередь. Разбор. Бариста пытается решить проблему скорости единственным доступным ему способом - за счёт сервиса, потому что не видит другого выхода и не получает помощи. Действия. 1) Немедленно подключиться самому - взять часть потока (упаковка, расчёт) или попросить свободного сотрудника подойти. 2) Кратко напомнить бариста: «скорость нужна, но базовое приветствие и взгляд на Гостя не убираем». 3) После смены обсудить, как лучше распределять людей на пиковые часы, чтобы не доводить ситуацию до стресса одного сотрудника.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - требовать от сотрудника «быть вежливее» в момент перегрузки без реальной помощи, не решая саму причину перегрузки.</div></div><h4>4. Контролировать соблюдение стандартов внешнего вида сотрудников на смене</h4><p class="kb-italic">Что это значит на практике: это ежедневная, рутинная, но обязательная проверка - внешний вид команды формирует первое впечатление Гостя о точке в каждый конкретный день.</p><p><strong>Как действовать:</strong></p><ul><li>Проверять внешний вид при начале смены каждого сотрудника, не дожидаясь, что кто-то заметит сам.</li><li>Деликатно и не на глазах у Гостей делать замечания при отклонениях.</li><li>Иметь под рукой запасной элемент формы (бейдж, чистый фартук) на случай форс-мажора у сотрудника.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник приходит на смену без бейджа, объясняя, что забыл его дома, и предлагает поработать так, как есть, «один раз ничего не будет». Разбор. Разовое исключение быстро становится практикой, если менеджер каждый раз закрывает на это глаза - другие сотрудники тоже начнут считать это нормой. Действия. 1) Если есть запасной бейдж/бирка на точке - выдать на смену. 2) Если нет - мягко, но твёрдо напомнить о стандарте и попросить не забывать в следующий раз. 3) Зафиксировать ситуацию, чтобы при повторении было видно, что это не случайность.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - делать выговор сотруднику прямо перед Гостями, что роняет его авторитет и создаёт неловкость в зале.</div></div><h4>5. Контролировать чистоту и порядок в зале, на баре и в подсобных помещениях в течение смены</h4><p class="kb-italic">Что это значит на практике: Чистота - это процесс, который нужно поддерживать постоянно, а не разово в начале смены: пролитый кофе, упавшая салфетка, грязный стол должны устраняться в течение нескольких минут.</p><p><strong>Как действовать:</strong></p><ul><li>Распределить зоны ответственности за уборку в течение смены между сотрудниками.</li><li>Регулярно (раз в 30-60 минут) визуально проверять зал и бар.</li><li>Не откладывать уборку подсобки/мойки до конца смены, если есть свободная минута в течение дня.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В зале скопилось несколько грязных столов в час пик, потому что вся команда занята обслуживанием, и никто не успевает убирать. Разбор. При высокой загрузке уборка зала естественно отходит на второй план, если заранее не закреплена за конкретным человеком или не предусмотрен резерв на этот случай. Действия. 1) В моменте - менеджер лично быстро убирает 1-2 ближайших стола, чтобы не копилось. 2) Если поток стабильно высокий - выделить отдельного человека (помощника/мастера чистоты) именно на уборку зала в пиковые часы. 3) После смены зафиксировать наблюдение для управляющего, если проблема системная (нехватка рук на пике).</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - оставлять грязные столы «на потом», когда поток спадёт, что напрямую портит впечатление гостей, которые видят зал прямо сейчас.</div></div><h4>6. Следить за соблюдением санитарных норм (СанПиН), правил пожарной безопасности и охраны труда на смене</h4><p class="kb-italic">Что это значит на практике: это зона прямой ответственности менеджера именно в моменте смены: он физически присутствует и должен замечать нарушения сразу, а не постфактум при проверке.</p><p><strong>Как действовать:</strong></p><ul><li>Проверять температурные режимы холодильного оборудования согласно графику в течение смены.</li><li>Следить, чтобы пути эвакуации не были загромождены коробками или инвентарём.</li><li>Контролировать, чтобы сотрудники использовали защитные средства при работе с горячим оборудованием.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В разгар смены коробки с новой поставкой временно складывают возле запасного выхода, потому что «больше негде, потом переберём». Разбор. Загромождённый путь эвакуации - серьёзное нарушение пожарной безопасности, даже если это временно и «по необходимости». Риск не снижается от того, что ситуация считается временной. Действия. 1) Немедленно перенести коробки в другое место, даже если это создаёт временное неудобство в расстановке товара. 2) Найти постоянное решение для приёма поставок, не перекрывающее эвакуационные пути. 3) Напомнить команде, что проход к эвакуационному выходу - зона, которая не может быть временно занята ни при каких обстоятельствах.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - расценивать нарушения техники безопасности как «временные и несрочные», если внешне всё выглядит спокойно.</div></div><h3>ОТРАБОТКА СТАНДАРТОВ</h3><h4>7. Проводить пятиминутки перед началом смены с постановкой задач на смену</h4><p class="kb-italic">Что это значит на практике: Короткая встреча перед сменой - инструмент менеджера, который синхронизирует команду на конкретные 8-12 часов: что важно сегодня, какие риски, на что обратить внимание.</p><p><strong>Как действовать:</strong></p><ul><li>Готовить 2-3 конкретных пункта: вчерашние проблемы, сегодняшние задачи, акции.</li><li>Укладываться в 5 минут, не превращая встречу в долгое собрание.</li><li>Давать команде возможность быстро задать вопрос, если что-то неясно.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Команда уже неделю забывает предлагать гостям новую акционную позицию, хотя про неё рассказали один раз в начале недели. Разбор. Однократное объявление не держится в памяти команды на фоне рутины смены. Нужен короткий ежедневный напоминающий ритуал прямо перед началом работы. Действия. 1) Включить напоминание об акции в каждую пятиминутку этой недели. 2) Повесить заметный стикер-напоминание прямо на баре, в зоне видимости бариста а. 3) В середине смены кратко спросить у одного-двух сотрудников, предлагали ли они уже акцию - это держит фокус.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - пропускать пятиминутку, если «сегодня всё стандартно», хотя именно регулярность делает её эффективной.</div></div><h4>8. Контролировать знание сотрудниками меню, цен и состава напитков/блюд</h4><p class="kb-italic">Что это значит на практике: Менеджер должен быть уверен, что в любой момент смены любой сотрудник может корректно ответить Гостю про состав, цену или особенности позиции меню.</p><p><strong>Как действовать:</strong></p><ul><li>В начале смены или на пятиминутке кратко спросить о новых/сложных позициях.</li><li>Слушать, как сотрудники отвечают Гостям на вопросы о составе, и поправлять при ошибках.</li><li>Держать под рукой шпаргалку по составу для сложных или новых позиций.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Гость спрашивает у бариста про аллергены в одном из десертов, бариста не уверен и называет неверный состав. Разбор. Это не просто неудобная ситуация, а потенциальный риск для здоровья Гостя с аллергией, если информация была дана неверно. Действия. 1) Немедленно подойти и дать точную информацию Гостю, используя актуальную карточку состава. 2) Кратко на месте показать бариста, где искать актуальную информацию по аллергенам. 3) Включить вопросы по аллергенам в следующую пятиминутку как приоритетную тему.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - считать, что один раз пройденное обучение по составу гарантирует точное знание навсегда, без периодического напоминания.</div></div><h4>9. На месте поправлять и обучать сотрудников при отклонении от стандартов сервиса</h4><p class="kb-italic">Что это значит на практике: Это микро-обучение в моменте: менеджер не откладывает исправление до формального тренинга, а корректирует поведение сразу, пока ситуация свежа в памяти сотрудника.</p><p><strong>Как действовать:</strong></p><ul><li>Замечать отклонение сразу и реагировать в течение нескольких минут, а не в конце смены.</li><li>Делать замечание конструктивно и без свидетелей (Гостей, других сотрудников), если возможно.</li><li>Объяснять не только «что не так», но и «как правильно», показывая на примере.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Новый бариста неправильно оформляет возврат, нарушая порядок операции, и менеджер замечает это только через несколько часов при проверке кассы. Разбор. Чем позже исправляется ошибка, тем больше вероятность, что она повторится несколько раз за смену, и тем сложнее сотруднику вспомнить контекст конкретной ситуации для разбора. Действия. 1) В моменте обнаружения - сразу показать бариста у правильный порядок оформления возврата. 2) Проверить, не было ли уже совершено несколько таких операций за смену, и зафиксировать их для бухгалтерии при необходимости. 3) Договориться, что при любой неуверенности бариста обращается к менеджеру до завершения операции, а не после.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - откладывать исправление ошибки до конца смены «чтобы не отвлекать», когда контекст уже забыт и обучающий эффект теряется.</div></div><h3>ДОВЕДЕНИЕ ИЗМЕНЕНИЙ</h3><h4>10. Доводить до сотрудников на смене изменения меню, цен и стандартов, полученные от управляющего</h4><p class="kb-italic">Что это значит на практике: Менеджер это передаточное звено между решениями управляющего и реальной практикой смены. Информация должна дойти точно и быть понята, а не просто «переслана».</p><p><strong>Как действовать:</strong></p><ul><li>Получив информацию от управляющего, проверять её на полноту - задать вопросы, если что-то неясно, прежде чем доносить команде.</li><li>Доводить изменения через пятиминутку, а не только через сообщение в чате.</li><li>Убедиться, что каждый сотрудник смены понял изменение, особенно если оно касается цен или состава.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Управляющий сообщил об изменении цены на одну позицию, но менеджер забыл сообщить об этом ночной смене, и бариста продаёт по старой цене несколько часов. Разбор. Разовое информирование одной смены не гарантирует, что все смены в курсе изменения - нужна система передачи информации, охватывающая всех, кто работает в этот период. Действия. 1) Немедленно довести актуальную цену до текущей смены и исправить ценник/систему, если не было сделано вовремя. 2) Договориться с управляющим о способе фиксации изменений, видимом для всех смен (например, общий чат или журнал передачи смены). 3) Включить проверку актуальности цен в чек-лист открытия смены.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - передавать важные изменения только устно одной смене, без фиксации, доступной остальным сменам.</div></div><h4>11. Контролировать применение новых стандартов сотрудниками на практике сразу после внедрения</h4><p class="kb-italic">Что это значит на практике: объявить изменение недостаточно - менеджер должен в первые часы/дни после внедрения проверять, что новый стандарт реально применяется на практике, а не просто услышан.</p><p><strong>Как действовать:</strong></p><ul><li>В первые смены после изменения уделять этому отдельное внимание при наблюдении за работой команды.</li><li>Хвалить за правильное применение нового стандарта, мягко поправлять при ошибках.</li><li>Сообщать управляющему, если видно, что стандарт системно не приживается.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Внедрён новый скрипт приветствия Гостя, но через несколько дней половина команды вернулась к старой привычной фразе. Разбор. Без постоянного напоминания и контроля в первые дни люди инстинктивно возвращаются к привычному поведению - это нормальная особенность формирования новой привычки, а не сопротивление. Действия. 1) На ближайшей пятиминутке ещё раз кратко напомнить новый скрипт и почему он важен. 2) В течение смены точечно отслеживать использование скрипта у 2-3 сотрудников и давать обратную связь. 3) Сообщить управляющему, если через 1-2 недели стандарт всё ещё не закрепился - возможно, нужна более серьёзная отработка (тренинг).</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - считать задачу выполненной после однократного объявления изменения, не возвращаясь к проверке в последующие смены.</div></div><h3>РАБОТА С ОБРАТНОЙ СВЯЗЬЮ</h3><h4>12. Оперативно решать конфликтные ситуации и жалобы Гостей непосредственно на смене</h4><p class="kb-italic">Что это значит на практике: Менеджер - первая линия разрешения конфликта. Гость не должен ждать, пока «приедет управляющий» - решение нужно здесь и сейчас, в рамках полномочий менеджера.</p><p><strong>Как действовать:</strong></p><ul><li>Подходить лично при любом признаке недовольства Гостя, не дожидаясь, что бариста справится сам.</li><li>Слушать Гостя до конца, не перебивать и не оправдываться сразу.</li><li>Предлагать конкретное решение в рамках своих полномочий (замена напитка, извинение, небольшой бонус, если это разрешено).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Гость недоволен тем, что напиток оказался не таким, как ожидал по описанию в меню, и говорит на повышенных тонах при других Гостях. Разбор. Чем дольше менеджер не вмешивается, тем выше риск, что недовольство Гостя усилится и его услышат другие посетители, что создаёт репутационный риск для всей смены. Действия. 1) Подойти лично, вежливо извиниться за недопонимание, предложить заменить напиток или объяснить состав более подробно. 2) Решить вопрос быстро, не затягивая разговор на глазах других гостей - можно отойти в сторону для разговора. 3) После того как Гость успокоился, кратко обсудить с бариста, как описание напитка можно сделать понятнее на будущее.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - ждать, что конфликт «разрешится сам» или что сотрудник сам справится, если видно, что ситуация выходит за рамки его полномочий или опыта.</div></div><h4>13. Собирать обратную связь от Гостей лично, фиксировать и передавать управляющему повторяющиеся проблемы</h4><p class="kb-italic">Что это значит на практике: Менеджер видит и слышит то, что не всегда попадает в письменные отзывы - устные замечания, мимику недовольства, повторяющиеся вопросы Гостей. Эту информацию важно не терять, а передавать дальше.</p><p><strong>Как действовать:</strong></p><ul><li>Кратко фиксировать (хотя бы в заметках на телефоне) любые повторяющиеся замечания Гостей за смену.</li><li>В конце смены или в начале следующей передавать управляющему собранные наблюдения.</li><li>Не дожидаться формального отзыва - устное замечание тоже ценная информация.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. За несколько смен подряд разные Гости отмечают, что не могут найти место для зарядки телефона, хотя розетка есть, но она спрятана за мебелью. Разбор. Каждое отдельное замечание кажется мелочью, но в сумме это сигнал о неудобстве, которое легко устранить, если довести информацию до управляющего, отвечающего за оформление пространства. Действия. 1) Зафиксировать наблюдение с датами/количеством случаев. 2) Передать управляющему при следующем контакте с конкретным предложением (например, переставить мебель или повесить заметную табличку). 3) Если решение в силах самого менеджера (например, переставить один стул) - сделать сразу, не дожидаясь решения сверху.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - не фиксировать устные мелкие замечания Гостей, считая, что «это не отзыв, а так, разговор», и терять ценную информацию.</div></div><h4>14. Информировать управляющего о нестандартных ситуациях с Гостями (жалобы, инциденты, конфликты)</h4><p class="kb-italic">Что это значит на практике: не каждую ситуацию менеджер может и должен решать самостоятельно - серьёзные конфликты, угрозы, потенциально репутационно опасные ситуации требуют немедленной эскалации.</p><p><strong>Как действовать:</strong></p><ul><li>Определять для себя чёткую границу: что решается на месте, а что требует немедленного звонка управляющему.</li><li>Сообщать о серьёзном инциденте сразу, не дожидаясь конца смены.</li><li>Фиксировать детали ситуации (время, участники, суть), чтобы передать точную информацию.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Гость требует жалобную книгу и грозится написать в соцсетях разгромный отзыв с угрозами в адрес конкретного сотрудника, и менеджер не уверен, как реагировать. Разбор. Ситуация с публичной угрозой репутации требует не только локального решения (успокоить Гостя), но и немедленного информирования управляющего, который может подключить дополнительные ресурсы или провести юридическую оценку ситуации. Действия. 1) Сохранять спокойствие, предоставить книгу жалоб, не препятствовать законному праву Гостя оставить отзыв. 2) Сразу после ситуации позвонить или написать управляющему с подробным описанием. 3) Зафиксировать ситуацию письменно (что произошло, что было сказано) для возможного дальнейшего разбора.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - пытаться полностью самостоятельно разрешить ситуацию с серьёзным репутационным риском, не подключая управляющего вовремя, из желания «не создавать проблему».</div></div>'},
        {title:'БЛОК: ЛЮДИ', body:'<p>В блоке «Люди» роль менеджера смены отличается от роли территориального управляющего фокусом: если ТУ строит систему адаптации, мотивации и кадровую политику на месяцы вперёд, то менеджер управляет конкретными людьми в конкретной смене - здесь и сейчас. Его инструменты - расстановка, наставничество в моменте, дисциплина на смене и фиксация фактов для управляющего.</p><p><strong>Зона ответственности</strong></p><p>За расстановку и работу сотрудников на смене. За адаптацию новых сотрудников на месте. За дисциплину и соблюдение ПВТР на смене. За мотивацию команды в моменте. За учёт рабочего времени.</p><p><strong>Метрики и ожидаемые результаты</strong></p><ul><li>Отсутствие опозданий и прогулов на смене</li><li>Скорость адаптации новых сотрудников</li><li>% выполнения стандартов сотрудниками на смене</li><li>Корректность табеля учёта времени</li><li>Атмосфера и вовлечённость команды на смене -----------------------------------------------------------------------</li></ul><h3>АДАПТАЦИЯ И ОБУЧЕНИЕ НА МЕСТЕ</h3><h4>1. Вводить новых сотрудников в должность на смене: знакомить с рабочим местом, процессами, командой</h4><p class="kb-italic">Что это значит на практике: Первый день нового сотрудника на конкретной смене формирует его первое реальное впечатление о работе - не на собеседовании, а именно здесь. Менеджер отвечает за то, чтобы это впечатление было структурированным, а не хаотичным.</p><p><strong>Как действовать:</strong></p><ul><li>В начале смены нового сотрудника лично показать рабочие зоны, ключевые точки (касса, склад, подсобка).</li><li>Представить команде, обозначить, кто наставник.</li><li>Объяснить базовые правила смены (где брать форму, как сообщать о проблеме, к кому обращаться).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Новый бариста выходит на первую смену, но менеджер занят организацией потока Гостей в час пик и просто говорит «иди вставай к бару, разберёшься». Разбор. Новичок, оставленный без введения в первые минуты, чувствует себя потерянным и либо делает ошибки от неуверенности, либо формирует негативное первое впечатление о компании. Действия. 1) Если час пик - попросить свободного опытного сотрудника быстро ввести новичка в курс дел на 5 минут, пока менеджер занят потоком. 2) При первой свободной минуте лично подойти и кратко пройти по ключевым точкам. 3) В будущем планировать первый выход новичка не на самый напряжённый час смены, если это возможно.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - откладывать введение в должность «на потом, когда будет время», в результате новичок начинает работать без базовой ориентации в пространстве и процессах.</div></div><h4>2. Закреплять наставника за новым сотрудником и контролировать процесс наставничества на смене</h4><p class="kb-italic">Что это значит на практике: Наставник должен быть назначен явно и работать рядом с новичком физически в течение смены, а не просто формально считаться ответственным.</p><p><strong>Как действовать:</strong></p><ul><li>Выбирать наставником сотрудника, который не только хорошо работает, но и умеет объяснять.</li><li>Ставить наставника и новичка на соседние рабочие места в течение первых смен.</li><li>Периодически проверять, как идёт наставничество - наблюдать, спрашивать обоих.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Наставник назначен формально, но физически работает на другом конце бара и весь день занят своими задачами, почти не взаимодействуя с новичком. Разбор. Формальное назначение без реальной организации совместной работы не даёт эффекта - новичок учится методом проб и ошибок без поддержки. Действия. 1) Перераспределить расстановку так, чтобы наставник и новичок работали рядом физически. 2) Кратко обозначить наставнику конкретные задачи: что показать, что проверить за смену. 3) В конце смены спросить у обоих, как прошло взаимодействие, и скорректировать на следующую смену при необходимости.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - считать наставничество выполненным после простого объявления «ты будешь наставником», без организации реальной совместной работы.</div></div><h4>3. Контролировать применение новыми сотрудниками знаний, полученных на обучении</h4><p class="kb-italic">Что это значит на практике: Теоретическое обучение (от ТУ или централизованное) и практика на смене - разные вещи. Менеджер проверяет, насколько новичок реально умеет применять то, чему его учили.</p><p><strong>Как действовать:</strong></p><ul><li>Наблюдать за работой новичка в первые смены, сверяя её со стандартом, который он должен был усвоить на обучении.</li><li>Давать обратную связь сразу при отклонении, объясняя связь с тем, что проходили на обучении.</li><li>Не считать новичка «готовым» только на основании пройденного формального обучения - практика подтверждает усвоение.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Новый сотрудник прошёл обучение по приготовлению напитков, но на практике постоянно путает порядок действий и переспрашивает каждый шаг. Разбор. Это нормальная часть процесса перехода от теории к практике, но если не корректировать сразу, неправильный порядок действий может закрепиться как привычка. Действия. 1) В свободную минуту лично пройти с новичком приготовление сложного напитка ещё раз, медленно, шаг за шагом. 2) Дать простую подсказку-шпаргалку на первое время, если это разрешено стандартами точки. 3) Подключить наставника для дополнительной практики в спокойные часы смены.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - раздражаться на новичка за неуверенность сразу после обучения, не учитывая, что переход от теории к практике требует времени и поддержки.</div></div><h4>4. Передавать управляющему обратную связь по результатам адаптации нового сотрудника</h4><p class="kb-italic">Что это значит на практике: Менеджер - основной источник информации для управляющего о том, как реально проходит адаптация, потому что именно он физически наблюдает новичка на смене.</p><p><strong>Как действовать:</strong></p><ul><li>Фиксировать конкретные наблюдения по новичку (сильные стороны, сложности) в течение первых недель.</li><li>Передавать информацию управляющему регулярно, а не только в случае проблемы.</li><li>Быть конкретным: не «всё нормально», а что именно получается и что вызывает сложность.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Новый сотрудник работает уже две недели, и при плановой аттестации управляющий узнаёт, что у него серьёзные сложности с работой на кассе, о которых менеджер не упоминал. Разбор. Отсутствие регулярной обратной связи от менеджера привело к тому, что проблема накопилась, вместо того чтобы быть скорректированной на раннем этапе. Действия. 1) Срочно организовать дополнительную практику по кассе для сотрудника. 2) В будущем договориться с управляющим о регулярном (например, еженедельном) коротком отчёте по новичкам, а не только по запросу. 3) Зафиксировать сложность сейчас и отслеживать прогресс в последующих сменах.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - сообщать управляющему о проблемах адаптации только когда они становятся критичными, а не на ранней стадии, когда их легче скорректировать.</div></div><h3>РАССТАНОВКА И ОРГАНИЗАЦИЯ СМЕНЫ</h3><h4>5. Распределять зоны ответственности между сотрудниками в начале смены</h4><p class="kb-italic">Что это значит на практике: Чёткое распределение в начале смены - это профилактика хаоса: каждый знает, за что отвечает прямо сейчас, а не выясняет это в процессе работы.</p><p><strong>Как действовать:</strong></p><ul><li>Озвучивать расстановку явно на пятиминутке: кто на кассе, кто на баре, кто в зале.</li><li>Учитывать сильные и слабые стороны конкретных сотрудников при распределении.</li><li>Фиксировать расстановку видимо (например, на доске), если это принято на точке.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В начале смены менеджер не озвучил явно, кто отвечает за уборку зала, предположив, что «как обычно, кто свободен, тот и убирает», и в результате никто не убирает, потому что все заняты бариста-задачами. Разбор. Неявное распределение приводит к тому, что задача без явного владельца просто не выполняется, особенно в моменты высокой нагрузки. Действия. 1) Немедленно назначить конкретного человека на уборку на оставшуюся часть смены. 2) В будущем явно проговаривать распределение зон на каждой пятиминутке, не предполагая, что «всем всё понятно по умолчанию». 3) При нехватке людей для всех зон - определить приоритет (что важнее в данный момент) и сообщить команде явно.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - предполагать, что расстановка «сама собой понятна» команде, без явного озвучивания в начале смены.</div></div><h4>6. Оперативно перераспределять сотрудников в течение смены при изменении потока Гостей</h4><p class="kb-italic">Что это значит на практике: Поток Гостей не статичен - он растёт и падает в течение дня, и менеджер должен гибко переставлять людей, а не держать фиксированную расстановку весь день.</p><p><strong>Как действовать:</strong></p><ul><li>Постоянно отслеживать загрузку разных зон (касса, бар, зал) визуально.</li><li>При росте нагрузки в одной зоне - оперативно перебрасывать свободные руки туда.</li><li>Заранее предупреждать команду о скором изменении потока, если это предсказуемо (например, скоро обед).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Внезапно образовалась длинная очередь на кассе, в то время как на баре сотрудник выполняет менее срочную задачу (например, протирает оборудование). Разбор. Без оперативного решения менеджера сотрудники продолжают делать то, что делали, не имея полной картины ситуации - нужен человек, который видит всю смену целиком и принимает решение о перестановке. Действия. 1) Немедленно попросить свободного сотрудника подключиться к обслуживанию очереди. 2) Объяснить команде принцип: менее срочные задачи (уборка, протирка) всегда уступают приоритет прямому обслуживанию Гостей в очереди. 3) Похвалить сотрудников, которые сами замечают необходимость перестроиться без указания менеджера.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - держаться жёстко за утреннюю расстановку весь день, не реагируя на изменение реальной ситуации в зале.</div></div><h4>7. Контролировать выход сотрудников по графику, своевременно сообщать управляющему об отклонениях</h4><p class="kb-italic">Что это значит на практике: Менеджер - первый, кто замечает, если сотрудник не вышел или опоздал, и должен быстро принять меры на месте плюс сообщить дальше по цепочке.</p><p><strong>Как действовать:</strong></p><ul><li>В начале смены сверять фактический состав с графиком.</li><li>При опоздании/невыходе - оперативно искать замену (другой сотрудник, подработка) и одновременно сообщать управляющему.</li><li>Фиксировать факт отклонения письменно для последующего разбора с управляющим.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник не выходит на смену без предупреждения, и менеджер узнаёт об этом только через 20 минут после начала смены, когда не хватает рук на потоке. Разбор. 20 минут без понимания, кто будет работать, создают риск сбоя в обслуживании Гостей в самые первые, часто загруженные минуты смены. Действия. 1) Немедленно оценить, кто может закрыть нехватку (другой сотрудник на подработку, временно сам менеджер встаёт на линию). 2) Сразу сообщить управляющему о ситуации, чтобы он мог помочь с решением (вызвать резерв, прислать кого-то). 3) Зафиксировать факт неявки для дальнейшего разбора управляющим по дисциплине сотрудника.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - пытаться справиться с нехваткой персонала молча, без сообщения управляющему, в надежде, что «как-нибудь выкрутимся сами».</div></div><h3>МОТИВАЦИЯ И АТМОСФЕРА В КОМАНДЕ</h3><h4>8. Поддерживать рабочий настрой и вовлечённость команды на смене</h4><p class="kb-italic">Что это значит на практике: Настрой команды напрямую влияет на сервис: усталая, демотивированная смена работает медленнее и менее доброжелательно, даже если формально все стандарты соблюдены.</p><p><strong>Как действовать:</strong></p><ul><li>Замечать снижение энергии команды в течение смены (особенно в долгие или сложные смены).</li><li>Использовать простые инструменты поддержки настроя: короткий перерыв, доброе слово, музыка (если разрешено).</li><li>Самому демонстрировать спокойствие и позитивный настрой, особенно в стрессовые моменты.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. К вечеру долгой смены команда выглядит явно устало и раздражённо, что начинает чувствоваться в общении с Гостями. Разбор. Усталость к концу смены - естественный процесс, но если её не заметить и не отреагировать, она прямо повлияет на качество последних часов обслуживания Гостей. Действия. 1) Дать команде короткую возможность передохнуть по очереди, если поток позволяет. 2) Подбодрить команду коротко и искренне - отметить, что они хорошо справились с сегодняшним потоком. 3) Лично взять на себя более тяжёлые или неприятные задачи в конце смены, чтобы разгрузить команду.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - игнорировать видимую усталость команды и просто требовать «держать стандарт» без какой-либо поддержки в моменте.</div></div><h4>9. Хвалить и давать обратную связь сотрудникам по итогам смены</h4><p class="kb-italic">Что это значит на практике: Обратная связь в конце смены закрепляет правильное поведение и корректирует ошибки, пока всё свежо в памяти, и формирует у сотрудника ощущение, что его труд замечают.</p><p><strong>Как действовать:</strong></p><ul><li>Уделять 1-2 минуты в конце смены на короткий разбор с командой или индивидуально.</li><li>Начинать с конкретного позитивного наблюдения, а не только с замечаний.</li><li>Делать обратную связь конкретной: не «молодец», а «хорошо сработал с тем сложным Гостем утром».</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер торопится домой после смены и просто говорит «всем спасибо, до завтра», не давая никакой конкретной обратной связи команде. Разбор. Общая фраза без конкретики не несёт развивающего эффекта и со временем воспринимается командой как формальность, лишённая искреннего интереса к их работе. Действия. 1) Даже при нехватке времени - выделить хотя бы одно конкретное наблюдение по смене для команды или отдельного сотрудника. 2) Постараться системно (не каждый день, но регулярно) уделять чуть больше времени разбору смены. 3) Использовать групповой чат смены для короткой письменной благодарности, если личробщения не хватает времени.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - давать обратную связь только когда что-то пошло не так, без баланса похвалы за хорошую работу.</div></div><h4>10. Предотвращать и сглаживать конфликты внутри команды на смене, информировать управляющего о серьёзных конфликтах</h4><p class="kb-italic">Что это значит на практике: Конфликт между двумя сотрудниками во время смены немедленно влияет на атмосферу и качество работы - менеджер должен реагировать быстро, на месте, и решать, нужна ли эскалация.</p><p><strong>Как действовать:</strong></p><ul><li>Замечать напряжение между сотрудниками рано, до открытого
