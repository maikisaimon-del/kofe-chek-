<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Кофе Чек</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --espresso:#2C1B12;
    --espresso-soft:#5A4436;
    --cream:#FAF3E6;
    --parchment:#F1E4CC;
    --parchment-dark:#E7D5B2;
    --copper:#B5622B;
    --copper-dark:#8E4A1F;
    --sage:#78865B;
    --sage-dark:#5E6E47;
    --alert:#AE4038;
    --line:rgba(44,27,18,0.12);
    --shadow: 0 8px 24px rgba(44,27,18,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: linear-gradient(180deg,#EFE3CB 0%, #E3D2AD 100%);
    font-family:'Inter',sans-serif;
    color:var(--espresso);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .phone{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--cream);
    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--espresso);
    color:var(--cream);
    padding:16px 16px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    min-height:34px;
  }
  .topbar .back{
    width:32px;height:32px;border-radius:50%;
    background:rgba(250,243,230,0.12);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
    font-size:16px;
    user-select:none;
  }
  .topbar .back:active{background:rgba(250,243,230,0.25);}
  .topbar h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    margin:0;
    letter-spacing:0.2px;
    line-height:1.2;
  }
  .topbar .sub{
    font-size:11.5px;
    opacity:0.65;
    margin-top:2px;
    font-weight:500;
  }
  .content{
    flex:1;
    padding:18px 16px 90px;
    overflow-y:auto;
  }
  /* ---------- HOME ---------- */
  .brand{
    display:flex; align-items:center; gap:12px; margin-bottom:22px;
  }
  .brand .cup{
    width:46px;height:46px;flex-shrink:0;
  }
  .brand h1{
    font-family:'Fraunces',serif; font-size:26px; font-weight:700; margin:0; color:var(--espresso);
  }
  .brand .tag{
    font-size:12px; color:var(--espresso-soft); margin-top:1px; font-weight:500;
  }
  .section-title{
    font-family:'Fraunces',serif;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1.2px;
    color:var(--espresso-soft);
    margin:22px 0 10px 2px;
    font-weight:600;
  }
  .section-title:first-of-type{margin-top:0;}
  .card-grid{ display:flex; flex-direction:column; gap:10px; }
  .cat-card{
    background:var(--parchment);
    border-radius:16px;
    padding:14px 14px;
    display:flex; align-items:center; gap:13px;
    cursor:pointer;
    border:1px solid transparent;
    transition:transform .12s ease, border-color .12s ease;
  }
  .cat-card:active{ transform:scale(0.98); border-color:var(--copper); }
  .cat-card .icon{
    width:42px;height:42px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:20px; flex-shrink:0;
    background:var(--cream);
  }
  .cat-card .txt strong{ display:block; font-size:15px; font-weight:600; }
  .cat-card .txt span{ display:block; font-size:12px; color:var(--espresso-soft); margin-top:1px; }
  .cat-card .chev{ margin-left:auto; opacity:0.35; font-size:18px; }
  .feedback-strip{
    margin-top:26px;
    background:var(--espresso);
    color:var(--cream);
    border-radius:16px;
    padding:15px 16px;
    display:flex; align-items:center; gap:12px;
    cursor:pointer;
  }
  .feedback-strip .icon{ font-size:20px; }
  .feedback-strip strong{ font-size:14px; display:block; }
  .feedback-strip span{ font-size:11.5px; opacity:0.7; }

  /* ---------- LIST VIEW (audits/checklists/journals/reports/knowledge) ---------- */
  .item-row{
    background:var(--parchment);
    border-radius:14px;
    padding:14px 15px;
    margin-bottom:9px;
    display:flex; align-items:center; gap:12px;
    cursor:pointer;
  }
  .item-row:active{ background:var(--parchment-dark); }
  .item-row .num{
    font-family:'JetBrains Mono',monospace;
    font-size:12px; font-weight:600; color:var(--copper);
    width:22px; flex-shrink:0;
  }
  .item-row .txt{ flex:1; font-size:14.5px; font-weight:600; }
  .item-row .meta{ font-size:11.5px; color:var(--espresso-soft); font-weight:500; margin-top:2px;}
  .item-row .chev{ opacity:0.35; }

  /* ---------- FORM ---------- */
  .who-field{
    background:var(--parchment);
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:16px;
  }
  .who-field label{
    font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--espresso-soft); font-weight:600;
  }
  .who-field input, .who-field select{
    width:100%; border:none; background:transparent; font-family:'Inter',sans-serif;
    font-size:15px; font-weight:600; color:var(--espresso); padding:5px 0 0; outline:none;
  }
  .progress-wrap{
    display:flex; align-items:center; gap:12px; margin-bottom:20px;
  }
  .cup-gauge{ width:44px; height:44px; flex-shrink:0; }
  .progress-bar-track{
    flex:1; height:8px; border-radius:5px; background:var(--parchment-dark); overflow:hidden;
  }
  .progress-bar-fill{
    height:100%; background:linear-gradient(90deg,var(--copper),var(--copper-dark)); border-radius:5px;
    transition:width .25s ease;
  }
  .progress-txt{ font-size:11.5px; font-weight:600; color:var(--espresso-soft); white-space:nowrap; font-family:'JetBrains Mono',monospace;}

  .q-block{
    background:var(--parchment);
    border-radius:14px;
    padding:14px;
    margin-bottom:10px;
  }
  .q-cat{
    font-size:10.5px; text-transform:uppercase; letter-spacing:0.8px; color:var(--copper-dark); font-weight:700; margin-bottom:10px;
  }
  .q-text{ font-size:14.5px; font-weight:600; margin-bottom:11px; line-height:1.35; }
  .yesno-row{ display:flex; gap:8px; }
  .opt-btn{
    flex:1; text-align:center; padding:10px 6px; border-radius:10px; font-size:13px; font-weight:600;
    background:var(--cream); border:1.5px solid var(--line); cursor:pointer; color:var(--espresso-soft);
  }
  .opt-btn.yes.active{ background:var(--sage); border-color:var(--sage); color:#fff; }
  .opt-btn.no.active{ background:var(--alert); border-color:var(--alert); color:#fff; }
  .opt-btn.na.active{ background:var(--espresso-soft); border-color:var(--espresso-soft); color:#fff; }
  .scale-row{ display:flex; gap:6px; }
  .scale-btn{
    flex:1; text-align:center; padding:9px 0; border-radius:9px; font-size:14px; font-weight:700;
    background:var(--cream); border:1.5px solid var(--line); cursor:pointer; color:var(--espresso-soft);
    font-family:'JetBrains Mono',monospace;
  }
  .scale-btn.active{ background:var(--copper); border-color:var(--copper); color:#fff; }
  textarea, input[type=text], input[type=number], input[type=time]{
    width:100%; border-radius:10px; border:1.5px solid var(--line); background:var(--cream);
    font-family:'Inter',sans-serif; font-size:14px; padding:10px 11px; color:var(--espresso); outline:none; resize:vertical;
  }
  textarea:focus, input:focus, select:focus{ border-color:var(--copper); }
  .note-toggle{ font-size:12px; color:var(--copper-dark); font-weight:600; margin-top:9px; cursor:pointer; display:inline-block; }

  .sticky-submit{
    position:sticky; bottom:0; left:0; right:0;
    padding:12px 16px 18px;
    background:linear-gradient(180deg, rgba(250,243,230,0) 0%, var(--cream) 35%);
  }
  .btn-primary{
    width:100%; padding:15px; border-radius:14px; border:none; background:var(--copper); color:#fff;
    font-size:15px; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; box-shadow:0 6px 16px rgba(181,98,43,0.35);
  }
  .btn-primary:active{ background:var(--copper-dark); }
  .btn-secondary{
    width:100%; padding:14px; border-radius:14px; border:1.5px solid var(--line); background:transparent; color:var(--espresso);
    font-size:14.5px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; margin-top:8px;
  }

  /* ---------- SUCCESS ---------- */
  .success-wrap{ display:flex; flex-direction:column; align-items:center; text-align:center; padding:60px 10px 10px; }
  .success-wrap .cup{ width:88px; height:88px; margin-bottom:22px; }
  .success-wrap h2{ font-family:'Fraunces',serif; font-size:21px; margin:0 0 8px; }
  .success-wrap p{ font-size:13.5px; color:var(--espresso-soft); line-height:1.5; margin:0 0 26px; max-width:280px; }

  /* ---------- JOURNAL ENTRIES LIST ---------- */
  .entry-card{
    background:var(--parchment); border-radius:13px; padding:12px 14px; margin-bottom:8px;
  }
  .entry-card .row1{ display:flex; justify-content:space-between; font-size:13px; font-weight:700; }
  .entry-card .row2{ font-size:12px; color:var(--espresso-soft); margin-top:3px; }
  .empty-state{ text-align:center; padding:40px 10px; color:var(--espresso-soft); font-size:13px; }
  .empty-state .icon{ font-size:32px; display:block; margin-bottom:10px; }

  /* ---------- KNOWLEDGE ---------- */
  .kb-article{ background:var(--parchment); border-radius:14px; padding:14px 15px; margin-bottom:9px; cursor:pointer; }
  .kb-article strong{ font-size:14px; display:block; margin-bottom:3px; }
  .kb-article span{ font-size:12px; color:var(--espresso-soft); }
  .kb-body{ font-size:13.5px; line-height:1.6; color:var(--espresso-soft); }
  .kb-body h3{ font-family:'Fraunces',serif; font-size:16px; color:var(--espresso); margin:22px 0 10px; padding-bottom:6px; border-bottom:2px solid var(--copper); }
  .kb-body h3:first-child{ margin-top:0; }
  .kb-body h4{ font-family:'Fraunces',serif; font-size:14.5px; color:var(--espresso); margin:18px 0 6px; }
  .kb-body p{ margin:0 0 10px; }
  .kb-body p.kb-italic{ font-style:italic; color:var(--espresso-soft); }
  .kb-body ul, .kb-body ol{ margin:0 0 10px; padding-left:20px; }
  .kb-body li{ margin-bottom:5px; }
  .kb-body .case-box, .kb-body .error-box{
    border-radius:12px; padding:12px 14px; margin:10px 0; font-size:13px;
  }
  .kb-body .case-box{ background:var(--parchment); border-left:4px solid var(--sage-dark); }
  .kb-body .error-box{ background:var(--parchment); border-left:4px solid var(--alert); }
  .kb-body .box-label{ font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; color:var(--espresso); }
  .kb-body .box-body{ color:var(--espresso-soft); }

  /* ---------- SETTINGS ---------- */
  .settings-box{ background:var(--parchment); border-radius:14px; padding:15px; margin-bottom:14px; }
  .settings-box label{ font-size:12px; font-weight:700; display:block; margin-bottom:6px; color:var(--espresso-soft); }
  .status-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .badge{ display:inline-flex; align-items:center; font-size:11.5px; font-weight:600; padding:5px 9px; border-radius:20px; background:var(--cream); }

  select{ background:var(--cream); }

  ::-webkit-scrollbar{ width:0; }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--espresso); color:var(--cream); padding:11px 18px; border-radius:30px;
    font-size:13px; font-weight:600; box-shadow:var(--shadow); z-index:100; opacity:0; pointer-events:none;
    transition:opacity .25s ease, bottom .25s ease; max-width:85%; text-align:center;
  }
  .toast.show{ opacity:1; bottom:32px; }
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="topbar" id="topbar"></div>
  <div class="content" id="content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   КОФЕ ЧЕК — прототип мобильного веб-приложения
   Хранение данных о сессии — только в памяти (без localStorage),
   так как это требование среды артефактов.
   ========================================================= */

const CONFIG = {
  scriptUrl: '' // сюда вставляется URL веб-приложения Google Apps Script
};

const STATE = {
  submissions: [],     // локальный журнал отправок (демо-режим офлайн)
  journalEntries: {},  // записи в журналах, только в рамках сессии; ключи создаются динамически
  userName: ''
};

function getJournalEntries(key){
  if(!STATE.journalEntries[key]) STATE.journalEntries[key] = [];
  return STATE.journalEntries[key];
}

/* ---------------- ДАННЫЕ ПРИЛОЖЕНИЯ ---------------- */

function yn(id, cat, text, barista, alwaysPhoto, weight){ return {id, cat, type:'yesno', text, barista: !!barista, alwaysPhoto: !!alwaysPhoto, weight: (weight===undefined?1:weight)}; }
function sc(id, cat, text){ return {id, cat, type:'scale', text}; }
function tx(id, cat, text){ return {id, cat, type:'text', text}; }
function nb(id, cat, text, unit){ return {id, cat, type:'number', text, unit}; }
function ph(id, cat, text){ return {id, cat, type:'photo', text}; }
function au(id, cat, text){ return {id, cat, type:'audio', text}; }

const DATA = {
  audits: [
    {
      id:'full', icon:'📋', title:'Полный аудит',
      meta:'85 пунктов · с фото нарушений',
      scored:true,
      resultLabel:'Общий результат кофейни',
      hasBaristaSplit:true,
      headerFields:[ {id:'Кофейня', label:'Кофейня'}, {id:'Сотрудники на смене', label:'Сотрудники на смене'}, {id:'Дата', label:'Дата'} ],
      grading:[ {min:90, label:'Хорошо', color:'var(--sage)'}, {min:85, label:'Удовлетворительно', color:'var(--copper)'}, {min:0, label:'Плохо', color:'var(--alert)'} ],
      questions:[
        yn('a1','Входная группа (+летник)','Входная группа чистая'),
        yn('a2','Входная группа (+летник)','Территория кофейни на улице чистая (нет мусора, сигарет, бумажек, плитка чистая)'),
        yn('a3','Входная группа (+летник)','Летник чистый и стоит ровно (столы чистые без посуды, без крошек, без пыли)'),
        yn('a4','Входная группа (+летник)','Остеклённая часть фасада поддерживается в чистом состоянии (если ген. уборка была давно — не снимать)'),
        yn('a5','Входная группа (+летник)','Урна на улице (при наличии) заполнена не более чем на 70%, чистая'),

        yn('a6','Сервис','Сотрудник находится за баром, улыбается и доброжелательно приветствует', true),
        yn('a7','Сервис','Музыка играет с правильной громкостью и с правильного источника', true),
        yn('a8','Сервис','Внешний вид персонала соответствует корпоративным стандартам: утверждённая униформа, чистая и опрятная, волосы убраны, украшения отсутствуют, маникюр аккуратный', true),
        yn('a9','Сервис','Полиграфия читаемая, без потёртостей и грязи (меню, афиши, биперы и т.п.)', true),
        yn('a10','Сервис','Отсутствуют брендированные стаканы/наклейки на стаканах для лимонада/печать на стаканах', true),
        yn('a11','Сервис','Сотрудники не используют брендированные стаканы и посуду для гостей в личных целях, есть отдельная посуда для персонала', true),
        yn('a12','Сервис','Сотрудник предложил гостю конкретный доп. ингредиент (сироп, альтернативное молоко, взбитые сливки)', true),
        yn('a13','Сервис','Сотрудник предложил гостю конкретный десерт, сочетающийся с напитком (не более 1 предложения)', true),
        yn('a14','Сервис','Сотрудник спросил про карту лояльности, при отсутствии — предложил активировать и рассказал условия', true),
        yn('a15','Сервис','Сотрудник принимал заказ вежливо и дружелюбно', true),
        yn('a16','Сервис','При претензиях/задержках сотрудники сделали всё возможное, чтобы разрешить ситуацию', true),
        yn('a17','Сервис','Сотрудник выдал чек гостю или спросил, нужен ли чек', true),
        yn('a18','Сервис','Выдавая напиток, сотрудник улыбнулся, установил зрительный контакт, поблагодарил и попрощался', true),
        yn('a19','Сервис','Сотрудник разбирается в ассортименте и ценах, ориентирует по меню, красочно описывает вкус напитков', true),
        yn('a20','Сервис','Сотрудники знают о текущих акциях, могут рассказать условия и пробить в кассе', true),
        yn('a21','Сервис','Сотрудники при выдаче десертов надевают одноразовые перчатки/используют щипцы', true),

        yn('a22','Витрина и прикассовая зона','Чистота витрины, рельсы (без крошек, пятен и разводов внутри и снаружи)'),
        yn('a23','Витрина и прикассовая зона','Регламент витрины соблюдается'),
        yn('a24','Витрина и прикассовая зона','Подложки для десертов чистые (без лишних маркировок, без крошек)'),

        yn('a28','Витрина и прикассовая зона','Отсутствует продукция с истекшим сроком годности на витрине'),
        yn('a29','Витрина и прикассовая зона','Органайзеры в прикассовой зоне наполнены минимум наполовину, чистые'),
        yn('a30','Витрина и прикассовая зона','Одноразовая посуда, упаковка и расходники в достаточном количестве, хранение без загрязнения'),
        yn('a31','Витрина и прикассовая зона','Кассовые терминалы чистые, без пыли'),
        yn('a32','Витрина и прикассовая зона','Ротация продуктов соблюдена'),
        yn('a33','Витрина и прикассовая зона','В наличии исправный дублирующий термометр в витрине (норма +4°C ±2°C)'),
        yn('a34','Витрина и прикассовая зона','В прикассовой зоне нет мусора, крошек, пыли на подставках, личных вещей'),

        yn('a35','Зал','На столах и стульях чисто, пятна и крошки отсутствуют, столики убирают своевременно'),
        yn('a36','Зал','Мебель и декор чистые'),
        yn('a37','Зал','Мебель стоит на своих местах (ровно, стулья задвинуты)'),
        yn('a38','Зал','Поверхности в зале чистые (зеркала, стеллажи, подоконники)'),
        yn('a39','Зал','Есть отдельная зелёная ветошь для дезинфекции столиков, раствор промаркирован (срок годности 7 сут)'),
        yn('a40','Зал','Полы в чистом состоянии, без пятен и мусора, плинтусы чистые'),
        yn('a41','Зал','Стены чистые, признаки загрязнений отсутствуют'),
        yn('a42','Зал','Потолок без следов подтёков, штукатурка целая'),
        yn('a43','Зал','Ковры и коврики чистые'),
        yn('a44','Зал','Двери в производственные помещения чистые'),
        yn('a45','Зал','Все источники освещения работают исправно'),
        yn('a46','Зал','Плафоны чистые, без загрязнений'),
        yn('a47','Зал','Вешала для одежды в наличии, в хорошем состоянии (по 2 плечика)'),
        yn('a48','Зал','Таймер на зал и туалет работает'),

    {

      articles:[
        {title:'БЛОК: СЕРВИС', body:'<p>Менеджер смены - это глаза, руки и голос стандарта компании в течение конкретной смены. В отличие от территориального управляющего, который видит картину на горизонте недель и месяцев, менеджер работает в моменте «здесь и сейчас»: он не пишет стратегию сервиса, а обеспечивает, чтобы каждый Гость на этой смене получил то, что обещает бренд.</p><p><strong>Зона ответственности</strong></p><p>За соблюдение стандартов сервиса на смене. За качество напитков и блюд на выдаче. За внешний вид сотрудников и зоны обслуживания. За работу с обратной связью от Гостей на месте.</p><p><strong>Метрики и ожидаемые результаты</strong></p><ul><li>Оценка по чек-листам/КЛН</li><li>Результаты тайного гостя по смене</li><li>Количество жалоб Гостей за смену/период</li><li>Время обслуживания Гостя</li><li>% решённых конфликтных ситуаций на месте -----------------------------------------------------------------------</li></ul><h3>СОБЛЮДЕНИЕ СТАНДАРТОВ НА СМЕНЕ</h3><h4>1. Обеспечивать бесперебойную работу точки на своей смене в соответствии со стандартами компании</h4><p class="kb-italic">Что это значит на практике: Менеджер смены отвечает за то, чтобы конкретные 8-12 часов работы точки прошли без сбоев: не закончилось сырьё, не встала касса, не было провалов в расстановке людей. Это зона прямой, немедленной ответственности - в отличие от ТУ, у менеджера нет «потом разберёмся», есть только «сейчас работает или не работает».</p><p><strong>Как действовать:</strong></p><ul><li>В начале смены оценить вводные: сколько сырья, кто на смене, какие задачи передал предыдущий менеджер/управляющий.</li><li>Держать в голове или на бумаге чек-лист критичных точек (касса, кофемашина, наличие основных ингредиентов).</li><li>При любом сбое - реагировать в первые минуты, а не ждать, что «само наладится».</li><li>В конце смены передавать вводные следующему менеджеру: что произошло, на что обратить внимание.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В середине смены заканчивается молоко, а следующая поставка только вечером. Бариста продолжают принимать заказы на напитки с молоком, не предупреждая менеджера. Разбор. Проблема не в том, что молоко закончилось (это можно было предвидеть), а в том, что бариста не сообщили вовремя, и менеджер узнал о ситуации только когда Гости начали жаловаться на задержку. Действия. 1) Немедленно проверить остатки молока и альтернативы (другая точка сети, ближайший магазин, растительное молоко как временная замена). 2) Временно скорректировать меню на кассе/баре, чтобы бариста ы предупреждали Гостей заранее. 3) После смены - разобрать с командой правило: о любом критичном остатке сообщать менеджеру сразу, как только видно, что товара осталось на 1-2 часа работы.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Типичная ошибка - считать, что раз стандартный процесс «обычно работает», то не нужно проверять критичные остатки в начале и середине смены лично.</div></div><h4>2. Контролировать качество приготовления напитков и блюд бариста в течение смены</h4><p class="kb-italic">Что это значит на практике: в отличие от выборочных проверок ТУ (раз в несколько дней), менеджер смены контролирует качество практически непрерывно, потому что именно он физически присутствует на точке всю смену.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически (каждые 1-2 часа) проверять несколько готовых напитков на соответствие стандарту - температура, внешний вид, время приготовления.</li><li>Сразу останавливать систематическую ошибку, а не дожидаться жалобы Гостя.</li><li>Давать обратную связь бариста сразу, в моменте, а не откладывать на конец смены.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В час пик бариста начинают срезать углы - не взвешивают дозу кофе, чтобы успевать быстрее, и вкус напитков становится менее стабильным. Разбор. Под давлением потока бариста интуитивно выбирают скорость в ущерб стандарту, если не чувствуют контроля в моменте. Если менеджер не вмешается прямо во время пика, это закрепится как привычка. Действия. 1) В моменте пика - кратко напомнить бариста, что важнее: «делаем по стандарту, скорость идёт за качеством». 2) Если объективно не хватает рук - самому встать на помощь (сборка напитков, выдача), а не просто требовать. 3) После пика - короткий разбор с командой, как организовать рабочие места эффективнее, чтобы не приходилось выбирать между скоростью и стандартом.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - устраивать разбор ошибок прямо в разгар потока Гостей, что создаёт ещё больший хаос; лучше быстро скорректировать действие и разобрать ситуацию в спокойный момент.</div></div><h4>3. Контролировать стандарты обслуживания и скорость работы бариста на смене</h4><p class="kb-italic">Что это значит на практике: Скорость и вежливость обслуживания - то, что Гость замечает мгновенно. Менеджер должен балансировать эти два параметра в реальном времени, а не выбирать только один.</p><p><strong>Как действовать:</strong></p><ul><li>Наблюдать за линией обслуживания со стороны, особенно в часы пик.</li><li>Замечать, если очередь растёт быстрее, чем обычно, и оперативно подключать дополнительные руки.</li><li>Следить, чтобы скорость не достигалась за счёт грубости или невнимательности к Гостю.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В пиковые часы очередь выросла, бариста ё начинает обслуживать гостей резко, без приветствия, лишь бы быстрее закрыть очередь. Разбор. Бариста пытается решить проблему скорости единственным доступным ему способом - за счёт сервиса, потому что не видит другого выхода и не получает помощи. Действия. 1) Немедленно подключиться самому - взять часть потока (упаковка, расчёт) или попросить свободного сотрудника подойти. 2) Кратко напомнить бариста: «скорость нужна, но базовое приветствие и взгляд на Гостя не убираем». 3) После смены обсудить, как лучше распределять людей на пиковые часы, чтобы не доводить ситуацию до стресса одного сотрудника.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - требовать от сотрудника «быть вежливее» в момент перегрузки без реальной помощи, не решая саму причину перегрузки.</div></div><h4>4. Контролировать соблюдение стандартов внешнего вида сотрудников на смене</h4><p class="kb-italic">Что это значит на практике: это ежедневная, рутинная, но обязательная проверка - внешний вид команды формирует первое впечатление Гостя о точке в каждый конкретный день.</p><p><strong>Как действовать:</strong></p><ul><li>Проверять внешний вид при начале смены каждого сотрудника, не дожидаясь, что кто-то заметит сам.</li><li>Деликатно и не на глазах у Гостей делать замечания при отклонениях.</li><li>Иметь под рукой запасной элемент формы (бейдж, чистый фартук) на случай форс-мажора у сотрудника.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник приходит на смену без бейджа, объясняя, что забыл его дома, и предлагает поработать так, как есть, «один раз ничего не будет». Разбор. Разовое исключение быстро становится практикой, если менеджер каждый раз закрывает на это глаза - другие сотрудники тоже начнут считать это нормой. Действия. 1) Если есть запасной бейдж/бирка на точке - выдать на смену. 2) Если нет - мягко, но твёрдо напомнить о стандарте и попросить не забывать в следующий раз. 3) Зафиксировать ситуацию, чтобы при повторении было видно, что это не случайность.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - делать выговор сотруднику прямо перед Гостями, что роняет его авторитет и создаёт неловкость в зале.</div></div><h4>5. Контролировать чистоту и порядок в зале, на баре и в подсобных помещениях в течение смены</h4><p class="kb-italic">Что это значит на практике: Чистота - это процесс, который нужно поддерживать постоянно, а не разово в начале смены: пролитый кофе, упавшая салфетка, грязный стол должны устраняться в течение нескольких минут.</p><p><strong>Как действовать:</strong></p><ul><li>Распределить зоны ответственности за уборку в течение смены между сотрудниками.</li><li>Регулярно (раз в 30-60 минут) визуально проверять зал и бар.</li><li>Не откладывать уборку подсобки/мойки до конца смены, если есть свободная минута в течение дня.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В зале скопилось несколько грязных столов в час пик, потому что вся команда занята обслуживанием, и никто не успевает убирать. Разбор. При высокой загрузке уборка зала естественно отходит на второй план, если заранее не закреплена за конкретным человеком или не предусмотрен резерв на этот случай. Действия. 1) В моменте - менеджер лично быстро убирает 1-2 ближайших стола, чтобы не копилось. 2) Если поток стабильно высокий - выделить отдельного человека (помощника/мастера чистоты) именно на уборку зала в пиковые часы. 3) После смены зафиксировать наблюдение для управляющего, если проблема системная (нехватка рук на пике).</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - оставлять грязные столы «на потом», когда поток спадёт, что напрямую портит впечатление гостей, которые видят зал прямо сейчас.</div></div><h4>6. Следить за соблюдением санитарных норм (СанПиН), правил пожарной безопасности и охраны труда на смене</h4><p class="kb-italic">Что это значит на практике: это зона прямой ответственности менеджера именно в моменте смены: он физически присутствует и должен замечать нарушения сразу, а не постфактум при проверке.</p><p><strong>Как действовать:</strong></p><ul><li>Проверять температурные режимы холодильного оборудования согласно графику в течение смены.</li><li>Следить, чтобы пути эвакуации не были загромождены коробками или инвентарём.</li><li>Контролировать, чтобы сотрудники использовали защитные средства при работе с горячим оборудованием.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В разгар смены коробки с новой поставкой временно складывают возле запасного выхода, потому что «больше негде, потом переберём». Разбор. Загромождённый путь эвакуации - серьёзное нарушение пожарной безопасности, даже если это временно и «по необходимости». Риск не снижается от того, что ситуация считается временной. Действия. 1) Немедленно перенести коробки в другое место, даже если это создаёт временное неудобство в расстановке товара. 2) Найти постоянное решение для приёма поставок, не перекрывающее эвакуационные пути. 3) Напомнить команде, что проход к эвакуационному выходу - зона, которая не может быть временно занята ни при каких обстоятельствах.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - расценивать нарушения техники безопасности как «временные и несрочные», если внешне всё выглядит спокойно.</div></div><h3>ОТРАБОТКА СТАНДАРТОВ</h3><h4>7. Проводить пятиминутки перед началом смены с постановкой задач на смену</h4><p class="kb-italic">Что это значит на практике: Короткая встреча перед сменой - инструмент менеджера, который синхронизирует команду на конкретные 8-12 часов: что важно сегодня, какие риски, на что обратить внимание.</p><p><strong>Как действовать:</strong></p><ul><li>Готовить 2-3 конкретных пункта: вчерашние проблемы, сегодняшние задачи, акции.</li><li>Укладываться в 5 минут, не превращая встречу в долгое собрание.</li><li>Давать команде возможность быстро задать вопрос, если что-то неясно.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Команда уже неделю забывает предлагать гостям новую акционную позицию, хотя про неё рассказали один раз в начале недели. Разбор. Однократное объявление не держится в памяти команды на фоне рутины смены. Нужен короткий ежедневный напоминающий ритуал прямо перед началом работы. Действия. 1) Включить напоминание об акции в каждую пятиминутку этой недели. 2) Повесить заметный стикер-напоминание прямо на баре, в зоне видимости бариста а. 3) В середине смены кратко спросить у одного-двух сотрудников, предлагали ли они уже акцию - это держит фокус.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - пропускать пятиминутку, если «сегодня всё стандартно», хотя именно регулярность делает её эффективной.</div></div><h4>8. Контролировать знание сотрудниками меню, цен и состава напитков/блюд</h4><p class="kb-italic">Что это значит на практике: Менеджер должен быть уверен, что в любой момент смены любой сотрудник может корректно ответить Гостю про состав, цену или особенности позиции меню.</p><p><strong>Как действовать:</strong></p><ul><li>В начале смены или на пятиминутке кратко спросить о новых/сложных позициях.</li><li>Слушать, как сотрудники отвечают Гостям на вопросы о составе, и поправлять при ошибках.</li><li>Держать под рукой шпаргалку по составу для сложных или новых позиций.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Гость спрашивает у бариста про аллергены в одном из десертов, бариста не уверен и называет неверный состав. Разбор. Это не просто неудобная ситуация, а потенциальный риск для здоровья Гостя с аллергией, если информация была дана неверно. Действия. 1) Немедленно подойти и дать точную информацию Гостю, используя актуальную карточку состава. 2) Кратко на месте показать бариста, где искать актуальную информацию по аллергенам. 3) Включить вопросы по аллергенам в следующую пятиминутку как приоритетную тему.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - считать, что один раз пройденное обучение по составу гарантирует точное знание навсегда, без периодического напоминания.</div></div><h4>9. На месте поправлять и обучать сотрудников при отклонении от стандартов сервиса</h4><p class="kb-italic">Что это значит на практике: Это микро-обучение в моменте: менеджер не откладывает исправление до формального тренинга, а корректирует поведение сразу, пока ситуация свежа в памяти сотрудника.</p><p><strong>Как действовать:</strong></p><ul><li>Замечать отклонение сразу и реагировать в течение нескольких минут, а не в конце смены.</li><li>Делать замечание конструктивно и без свидетелей (Гостей, других сотрудников), если возможно.</li><li>Объяснять не только «что не так», но и «как правильно», показывая на примере.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Новый бариста неправильно оформляет возврат, нарушая порядок операции, и менеджер замечает это только через несколько часов при проверке кассы. Разбор. Чем позже исправляется ошибка, тем больше вероятность, что она повторится несколько раз за смену, и тем сложнее сотруднику вспомнить контекст конкретной ситуации для разбора. Действия. 1) В моменте обнаружения - сразу показать бариста у правильный порядок оформления возврата. 2) Проверить, не было ли уже совершено несколько таких операций за смену, и зафиксировать их для бухгалтерии при необходимости. 3) Договориться, что при любой неуверенности бариста обращается к менеджеру до завершения операции, а не после.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - откладывать исправление ошибки до конца смены «чтобы не отвлекать», когда контекст уже забыт и обучающий эффект теряется.</div></div><h3>ДОВЕДЕНИЕ ИЗМЕНЕНИЙ</h3><h4>10. Доводить до сотрудников на смене изменения меню, цен и стандартов, полученные от управляющего</h4><p class="kb-italic">Что это значит на практике: Менеджер это передаточное звено между решениями управляющего и реальной практикой смены. Информация должна дойти точно и быть понята, а не просто «переслана».</p><p><strong>Как действовать:</strong></p><ul><li>Получив информацию от управляющего, проверять её на полноту - задать вопросы, если что-то неясно, прежде чем доносить команде.</li><li>Доводить изменения через пятиминутку, а не только через сообщение в чате.</li><li>Убедиться, что каждый сотрудник смены понял изменение, особенно если оно касается цен или состава.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Управляющий сообщил об изменении цены на одну позицию, но менеджер забыл сообщить об этом ночной смене, и бариста продаёт по старой цене несколько часов. Разбор. Разовое информирование одной смены не гарантирует, что все смены в курсе изменения - нужна система передачи информации, охватывающая всех, кто работает в этот период. Действия. 1) Немедленно довести актуальную цену до текущей смены и исправить ценник/систему, если не было сделано вовремя. 2) Договориться с управляющим о способе фиксации изменений, видимом для всех смен (например, общий чат или журнал передачи смены). 3) Включить проверку актуальности цен в чек-лист открытия смены.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - передавать важные изменения только устно одной смене, без фиксации, доступной остальным сменам.</div></div><h4>11. Контролировать применение новых стандартов сотрудниками на практике сразу после внедрения</h4><p class="kb-italic">Что это значит на практике: объявить изменение недостаточно - менеджер должен в первые часы/дни после внедрения проверять, что новый стандарт реально применяется на практике, а не просто услышан.</p><p><strong>Как действовать:</strong></p><ul><li>В первые смены после изменения уделять этому отдельное внимание при наблюдении за работой команды.</li><li>Хвалить за правильное применение нового стандарта, мягко поправлять при ошибках.</li><li>Сообщать управляющему, если видно, что стандарт системно не приживается.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Внедрён новый скрипт приветствия Гостя, но через несколько дней половина команды вернулась к старой привычной фразе. Разбор. Без постоянного напоминания и контроля в первые дни люди инстинктивно возвращаются к привычному поведению - это нормальная особенность формирования новой привычки, а не сопротивление. Действия. 1) На ближайшей пятиминутке ещё раз кратко напомнить новый скрипт и почему он важен. 2) В течение смены точечно отслеживать использование скрипта у 2-3 сотрудников и давать обратную связь. 3) Сообщить управляющему, если через 1-2 недели стандарт всё ещё не закрепился - возможно, нужна более серьёзная отработка (тренинг).</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - считать задачу выполненной после однократного объявления изменения, не возвращаясь к проверке в последующие смены.</div></div><h3>РАБОТА С ОБРАТНОЙ СВЯЗЬЮ</h3><h4>12. Оперативно решать конфликтные ситуации и жалобы Гостей непосредственно на смене</h4><p class="kb-italic">Что это значит на практике: Менеджер - первая линия разрешения конфликта. Гость не должен ждать, пока «приедет управляющий» - решение нужно здесь и сейчас, в рамках полномочий менеджера.</p><p><strong>Как действовать:</strong></p><ul><li>Подходить лично при любом признаке недовольства Гостя, не дожидаясь, что бариста справится сам.</li><li>Слушать Гостя до конца, не перебивать и не оправдываться сразу.</li><li>Предлагать конкретное решение в рамках своих полномочий (замена напитка, извинение, небольшой бонус, если это разрешено).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Гость недоволен тем, что напиток оказался не таким, как ожидал по описанию в меню, и говорит на повышенных тонах при других Гостях. Разбор. Чем дольше менеджер не вмешивается, тем выше риск, что недовольство Гостя усилится и его услышат другие посетители, что создаёт репутационный риск для всей смены. Действия. 1) Подойти лично, вежливо извиниться за недопонимание, предложить заменить напиток или объяснить состав более подробно. 2) Решить вопрос быстро, не затягивая разговор на глазах других гостей - можно отойти в сторону для разговора. 3) После того как Гость успокоился, кратко обсудить с бариста, как описание напитка можно сделать понятнее на будущее.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - ждать, что конфликт «разрешится сам» или что сотрудник сам справится, если видно, что ситуация выходит за рамки его полномочий или опыта.</div></div><h4>13. Собирать обратную связь от Гостей лично, фиксировать и передавать управляющему повторяющиеся проблемы</h4><p class="kb-italic">Что это значит на практике: Менеджер видит и слышит то, что не всегда попадает в письменные отзывы - устные замечания, мимику недовольства, повторяющиеся вопросы Гостей. Эту информацию важно не терять, а передавать дальше.</p><p><strong>Как действовать:</strong></p><ul><li>Кратко фиксировать (хотя бы в заметках на телефоне) любые повторяющиеся замечания Гостей за смену.</li><li>В конце смены или в начале следующей передавать управляющему собранные наблюдения.</li><li>Не дожидаться формального отзыва - устное замечание тоже ценная информация.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. За несколько смен подряд разные Гости отмечают, что не могут найти место для зарядки телефона, хотя розетка есть, но она спрятана за мебелью. Разбор. Каждое отдельное замечание кажется мелочью, но в сумме это сигнал о неудобстве, которое легко устранить, если довести информацию до управляющего, отвечающего за оформление пространства. Действия. 1) Зафиксировать наблюдение с датами/количеством случаев. 2) Передать управляющему при следующем контакте с конкретным предложением (например, переставить мебель или повесить заметную табличку). 3) Если решение в силах самого менеджера (например, переставить один стул) - сделать сразу, не дожидаясь решения сверху.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - не фиксировать устные мелкие замечания Гостей, считая, что «это не отзыв, а так, разговор», и терять ценную информацию.</div></div><h4>14. Информировать управляющего о нестандартных ситуациях с Гостями (жалобы, инциденты, конфликты)</h4><p class="kb-italic">Что это значит на практике: не каждую ситуацию менеджер может и должен решать самостоятельно - серьёзные конфликты, угрозы, потенциально репутационно опасные ситуации требуют немедленной эскалации.</p><p><strong>Как действовать:</strong></p><ul><li>Определять для себя чёткую границу: что решается на месте, а что требует немедленного звонка управляющему.</li><li>Сообщать о серьёзном инциденте сразу, не дожидаясь конца смены.</li><li>Фиксировать детали ситуации (время, участники, суть), чтобы передать точную информацию.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Гость требует жалобную книгу и грозится написать в соцсетях разгромный отзыв с угрозами в адрес конкретного сотрудника, и менеджер не уверен, как реагировать. Разбор. Ситуация с публичной угрозой репутации требует не только локального решения (успокоить Гостя), но и немедленного информирования управляющего, который может подключить дополнительные ресурсы или провести юридическую оценку ситуации. Действия. 1) Сохранять спокойствие, предоставить книгу жалоб, не препятствовать законному праву Гостя оставить отзыв. 2) Сразу после ситуации позвонить или написать управляющему с подробным описанием. 3) Зафиксировать ситуацию письменно (что произошло, что было сказано) для возможного дальнейшего разбора.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - пытаться полностью самостоятельно разрешить ситуацию с серьёзным репутационным риском, не подключая управляющего вовремя, из желания «не создавать проблему».</div></div>'},
        {title:'БЛОК: ЛЮДИ', body:'<p>В блоке «Люди» роль менеджера смены отличается от роли территориального управляющего фокусом: если ТУ строит систему адаптации, мотивации и кадровую политику на месяцы вперёд, то менеджер управляет конкретными людьми в конкретной смене - здесь и сейчас. Его инструменты - расстановка, наставничество в моменте, дисциплина на смене и фиксация фактов для управляющего.</p><p><strong>Зона ответственности</strong></p><p>За расстановку и работу сотрудников на смене. За адаптацию новых сотрудников на месте. За дисциплину и соблюдение ПВТР на смене. За мотивацию команды в моменте. За учёт рабочего времени.</p><p><strong>Метрики и ожидаемые результаты</strong></p><ul><li>Отсутствие опозданий и прогулов на смене</li><li>Скорость адаптации новых сотрудников</li><li>% выполнения стандартов сотрудниками на смене</li><li>Корректность табеля учёта времени</li><li>Атмосфера и вовлечённость команды на смене -----------------------------------------------------------------------</li></ul><h3>АДАПТАЦИЯ И ОБУЧЕНИЕ НА МЕСТЕ</h3><h4>1. Вводить новых сотрудников в должность на смене: знакомить с рабочим местом, процессами, командой</h4><p class="kb-italic">Что это значит на практике: Первый день нового сотрудника на конкретной смене формирует его первое реальное впечатление о работе - не на собеседовании, а именно здесь. Менеджер отвечает за то, чтобы это впечатление было структурированным, а не хаотичным.</p><p><strong>Как действовать:</strong></p><ul><li>В начале смены нового сотрудника лично показать рабочие зоны, ключевые точки (касса, склад, подсобка).</li><li>Представить команде, обозначить, кто наставник.</li><li>Объяснить базовые правила смены (где брать форму, как сообщать о проблеме, к кому обращаться).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Новый бариста выходит на первую смену, но менеджер занят организацией потока Гостей в час пик и просто говорит «иди вставай к бару, разберёшься». Разбор. Новичок, оставленный без введения в первые минуты, чувствует себя потерянным и либо делает ошибки от неуверенности, либо формирует негативное первое впечатление о компании. Действия. 1) Если час пик - попросить свободного опытного сотрудника быстро ввести новичка в курс дел на 5 минут, пока менеджер занят потоком. 2) При первой свободной минуте лично подойти и кратко пройти по ключевым точкам. 3) В будущем планировать первый выход новичка не на самый напряжённый час смены, если это возможно.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - откладывать введение в должность «на потом, когда будет время», в результате новичок начинает работать без базовой ориентации в пространстве и процессах.</div></div><h4>2. Закреплять наставника за новым сотрудником и контролировать процесс наставничества на смене</h4><p class="kb-italic">Что это значит на практике: Наставник должен быть назначен явно и работать рядом с новичком физически в течение смены, а не просто формально считаться ответственным.</p><p><strong>Как действовать:</strong></p><ul><li>Выбирать наставником сотрудника, который не только хорошо работает, но и умеет объяснять.</li><li>Ставить наставника и новичка на соседние рабочие места в течение первых смен.</li><li>Периодически проверять, как идёт наставничество - наблюдать, спрашивать обоих.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Наставник назначен формально, но физически работает на другом конце бара и весь день занят своими задачами, почти не взаимодействуя с новичком. Разбор. Формальное назначение без реальной организации совместной работы не даёт эффекта - новичок учится методом проб и ошибок без поддержки. Действия. 1) Перераспределить расстановку так, чтобы наставник и новичок работали рядом физически. 2) Кратко обозначить наставнику конкретные задачи: что показать, что проверить за смену. 3) В конце смены спросить у обоих, как прошло взаимодействие, и скорректировать на следующую смену при необходимости.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - считать наставничество выполненным после простого объявления «ты будешь наставником», без организации реальной совместной работы.</div></div><h4>3. Контролировать применение новыми сотрудниками знаний, полученных на обучении</h4><p class="kb-italic">Что это значит на практике: Теоретическое обучение (от ТУ или централизованное) и практика на смене - разные вещи. Менеджер проверяет, насколько новичок реально умеет применять то, чему его учили.</p><p><strong>Как действовать:</strong></p><ul><li>Наблюдать за работой новичка в первые смены, сверяя её со стандартом, который он должен был усвоить на обучении.</li><li>Давать обратную связь сразу при отклонении, объясняя связь с тем, что проходили на обучении.</li><li>Не считать новичка «готовым» только на основании пройденного формального обучения - практика подтверждает усвоение.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Новый сотрудник прошёл обучение по приготовлению напитков, но на практике постоянно путает порядок действий и переспрашивает каждый шаг. Разбор. Это нормальная часть процесса перехода от теории к практике, но если не корректировать сразу, неправильный порядок действий может закрепиться как привычка. Действия. 1) В свободную минуту лично пройти с новичком приготовление сложного напитка ещё раз, медленно, шаг за шагом. 2) Дать простую подсказку-шпаргалку на первое время, если это разрешено стандартами точки. 3) Подключить наставника для дополнительной практики в спокойные часы смены.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - раздражаться на новичка за неуверенность сразу после обучения, не учитывая, что переход от теории к практике требует времени и поддержки.</div></div><h4>4. Передавать управляющему обратную связь по результатам адаптации нового сотрудника</h4><p class="kb-italic">Что это значит на практике: Менеджер - основной источник информации для управляющего о том, как реально проходит адаптация, потому что именно он физически наблюдает новичка на смене.</p><p><strong>Как действовать:</strong></p><ul><li>Фиксировать конкретные наблюдения по новичку (сильные стороны, сложности) в течение первых недель.</li><li>Передавать информацию управляющему регулярно, а не только в случае проблемы.</li><li>Быть конкретным: не «всё нормально», а что именно получается и что вызывает сложность.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Новый сотрудник работает уже две недели, и при плановой аттестации управляющий узнаёт, что у него серьёзные сложности с работой на кассе, о которых менеджер не упоминал. Разбор. Отсутствие регулярной обратной связи от менеджера привело к тому, что проблема накопилась, вместо того чтобы быть скорректированной на раннем этапе. Действия. 1) Срочно организовать дополнительную практику по кассе для сотрудника. 2) В будущем договориться с управляющим о регулярном (например, еженедельном) коротком отчёте по новичкам, а не только по запросу. 3) Зафиксировать сложность сейчас и отслеживать прогресс в последующих сменах.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - сообщать управляющему о проблемах адаптации только когда они становятся критичными, а не на ранней стадии, когда их легче скорректировать.</div></div><h3>РАССТАНОВКА И ОРГАНИЗАЦИЯ СМЕНЫ</h3><h4>5. Распределять зоны ответственности между сотрудниками в начале смены</h4><p class="kb-italic">Что это значит на практике: Чёткое распределение в начале смены - это профилактика хаоса: каждый знает, за что отвечает прямо сейчас, а не выясняет это в процессе работы.</p><p><strong>Как действовать:</strong></p><ul><li>Озвучивать расстановку явно на пятиминутке: кто на кассе, кто на баре, кто в зале.</li><li>Учитывать сильные и слабые стороны конкретных сотрудников при распределении.</li><li>Фиксировать расстановку видимо (например, на доске), если это принято на точке.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В начале смены менеджер не озвучил явно, кто отвечает за уборку зала, предположив, что «как обычно, кто свободен, тот и убирает», и в результате никто не убирает, потому что все заняты бариста-задачами. Разбор. Неявное распределение приводит к тому, что задача без явного владельца просто не выполняется, особенно в моменты высокой нагрузки. Действия. 1) Немедленно назначить конкретного человека на уборку на оставшуюся часть смены. 2) В будущем явно проговаривать распределение зон на каждой пятиминутке, не предполагая, что «всем всё понятно по умолчанию». 3) При нехватке людей для всех зон - определить приоритет (что важнее в данный момент) и сообщить команде явно.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - предполагать, что расстановка «сама собой понятна» команде, без явного озвучивания в начале смены.</div></div><h4>6. Оперативно перераспределять сотрудников в течение смены при изменении потока Гостей</h4><p class="kb-italic">Что это значит на практике: Поток Гостей не статичен - он растёт и падает в течение дня, и менеджер должен гибко переставлять людей, а не держать фиксированную расстановку весь день.</p><p><strong>Как действовать:</strong></p><ul><li>Постоянно отслеживать загрузку разных зон (касса, бар, зал) визуально.</li><li>При росте нагрузки в одной зоне - оперативно перебрасывать свободные руки туда.</li><li>Заранее предупреждать команду о скором изменении потока, если это предсказуемо (например, скоро обед).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Внезапно образовалась длинная очередь на кассе, в то время как на баре сотрудник выполняет менее срочную задачу (например, протирает оборудование). Разбор. Без оперативного решения менеджера сотрудники продолжают делать то, что делали, не имея полной картины ситуации - нужен человек, который видит всю смену целиком и принимает решение о перестановке. Действия. 1) Немедленно попросить свободного сотрудника подключиться к обслуживанию очереди. 2) Объяснить команде принцип: менее срочные задачи (уборка, протирка) всегда уступают приоритет прямому обслуживанию Гостей в очереди. 3) Похвалить сотрудников, которые сами замечают необходимость перестроиться без указания менеджера.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - держаться жёстко за утреннюю расстановку весь день, не реагируя на изменение реальной ситуации в зале.</div></div><h4>7. Контролировать выход сотрудников по графику, своевременно сообщать управляющему об отклонениях</h4><p class="kb-italic">Что это значит на практике: Менеджер - первый, кто замечает, если сотрудник не вышел или опоздал, и должен быстро принять меры на месте плюс сообщить дальше по цепочке.</p><p><strong>Как действовать:</strong></p><ul><li>В начале смены сверять фактический состав с графиком.</li><li>При опоздании/невыходе - оперативно искать замену (другой сотрудник, подработка) и одновременно сообщать управляющему.</li><li>Фиксировать факт отклонения письменно для последующего разбора с управляющим.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник не выходит на смену без предупреждения, и менеджер узнаёт об этом только через 20 минут после начала смены, когда не хватает рук на потоке. Разбор. 20 минут без понимания, кто будет работать, создают риск сбоя в обслуживании Гостей в самые первые, часто загруженные минуты смены. Действия. 1) Немедленно оценить, кто может закрыть нехватку (другой сотрудник на подработку, временно сам менеджер встаёт на линию). 2) Сразу сообщить управляющему о ситуации, чтобы он мог помочь с решением (вызвать резерв, прислать кого-то). 3) Зафиксировать факт неявки для дальнейшего разбора управляющим по дисциплине сотрудника.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - пытаться справиться с нехваткой персонала молча, без сообщения управляющему, в надежде, что «как-нибудь выкрутимся сами».</div></div><h3>МОТИВАЦИЯ И АТМОСФЕРА В КОМАНДЕ</h3><h4>8. Поддерживать рабочий настрой и вовлечённость команды на смене</h4><p class="kb-italic">Что это значит на практике: Настрой команды напрямую влияет на сервис: усталая, демотивированная смена работает медленнее и менее доброжелательно, даже если формально все стандарты соблюдены.</p><p><strong>Как действовать:</strong></p><ul><li>Замечать снижение энергии команды в течение смены (особенно в долгие или сложные смены).</li><li>Использовать простые инструменты поддержки настроя: короткий перерыв, доброе слово, музыка (если разрешено).</li><li>Самому демонстрировать спокойствие и позитивный настрой, особенно в стрессовые моменты.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. К вечеру долгой смены команда выглядит явно устало и раздражённо, что начинает чувствоваться в общении с Гостями. Разбор. Усталость к концу смены - естественный процесс, но если её не заметить и не отреагировать, она прямо повлияет на качество последних часов обслуживания Гостей. Действия. 1) Дать команде короткую возможность передохнуть по очереди, если поток позволяет. 2) Подбодрить команду коротко и искренне - отметить, что они хорошо справились с сегодняшним потоком. 3) Лично взять на себя более тяжёлые или неприятные задачи в конце смены, чтобы разгрузить команду.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - игнорировать видимую усталость команды и просто требовать «держать стандарт» без какой-либо поддержки в моменте.</div></div><h4>9. Хвалить и давать обратную связь сотрудникам по итогам смены</h4><p class="kb-italic">Что это значит на практике: Обратная связь в конце смены закрепляет правильное поведение и корректирует ошибки, пока всё свежо в памяти, и формирует у сотрудника ощущение, что его труд замечают.</p><p><strong>Как действовать:</strong></p><ul><li>Уделять 1-2 минуты в конце смены на короткий разбор с командой или индивидуально.</li><li>Начинать с конкретного позитивного наблюдения, а не только с замечаний.</li><li>Делать обратную связь конкретной: не «молодец», а «хорошо сработал с тем сложным Гостем утром».</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер торопится домой после смены и просто говорит «всем спасибо, до завтра», не давая никакой конкретной обратной связи команде. Разбор. Общая фраза без конкретики не несёт развивающего эффекта и со временем воспринимается командой как формальность, лишённая искреннего интереса к их работе. Действия. 1) Даже при нехватке времени - выделить хотя бы одно конкретное наблюдение по смене для команды или отдельного сотрудника. 2) Постараться системно (не каждый день, но регулярно) уделять чуть больше времени разбору смены. 3) Использовать групповой чат смены для короткой письменной благодарности, если личробщения не хватает времени.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - давать обратную связь только когда что-то пошло не так, без баланса похвалы за хорошую работу.</div></div><h4>10. Предотвращать и сглаживать конфликты внутри команды на смене, информировать управляющего о серьёзных конфликтах</h4><p class="kb-italic">Что это значит на практике: Конфликт между двумя сотрудниками во время смены немедленно влияет на атмосферу и качество работы - менеджер должен реагировать быстро, на месте, и решать, нужна ли эскалация.</p><p><strong>Как действовать:</strong></p><ul><li>Замечать напряжение между сотрудниками рано, до открытого конфликта.</li><li>При конфликте - разделить стороны физически (разные зоны/задачи), затем поговорить отдельно с каждым.</li><li>Если конфликт серьёзный или повторяющийся - сообщить управляющему для более глубокого разбора.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Два сотрудника на смене начинают открыто спорить из-за того, кто должен выполнять менее приятную задачу (уборка туалета), прямо в зале, где это могут услышать Гости. Разбор. Публичный конфликт между сотрудниками сильно вредит впечатлению Гостей и требует немедленного, но спокойного вмешательства, а не разбирательства «кто прав» прямо в моменте на глазах у всех. Действия. 1) Сразу развести сотрудников по разным задачам/зонам, не разбирая конфликт публично. 2) В свободную минуту поговорить с каждым отдельно, понять причину. 3) Если конфликт повторяющийся - обязательно сообщить управляющему для системного решения (например, пересмотра распределения неприятных задач).</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - пытаться разрешить конфликт «здесь и сейчас» публично, требуя от сотрудников немедленно помириться на глазах у Гостей.</div></div><h3>КОНТРОЛЬ И ДИСЦИПЛИНА</h3><h4>11. Контролировать соблюдение сотрудниками правил внутреннего трудового распорядка (ПВТР) на смене</h4><p class="kb-italic">Что это значит на практике: Менеджер - тот, кто видит дисциплину в реальном времени: опоздания, незапланированные перерывы, использование телефона в рабочее время.</p><p><strong>Как действовать:</strong></p><ul><li>Отмечать факт начала и окончания работы каждого сотрудника на смене.</li><li>Реагировать на нарушение сразу, но без излишней драматизации по мелочам.</li><li>Применять правило одинаково ко всем сотрудникам без исключений.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник несколько раз за смену проверяет личный телефон в рабочей зоне, хотя это запрещено правилами точки. Разбор. Если не сделать замечание сразу, поведение закрепится и станет восприниматься как норма, особенно если другие сотрудники это видят. Действия. 1) Спокойно, без публичного выговора, напомнить сотруднику правило в моменте. 2) Если ситуация повторяется в течение смены - сделать более серьёзное предупреждение и зафиксировать для управляющего. 3) Применять то же правило ко всем сотрудникам смены одинаково.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - закрывать глаза на мелкие нарушения у «удобных» сотрудников, создавая ощущение несправедливости у остальной команды.</div></div><h4>12. Контролировать соблюдение сотрудниками правил охраны труда и техники безопасности на смене</h4><p class="kb-italic">Что это значит на практике: Прямой контроль безопасности людей в моменте - задача менеджера, потому что только он физически видит, как именно сотрудники работают с оборудованием на этой смене.</p><p><strong>Как действовать:</strong></p><ul><li>Следить за использованием защитных средств при работе с горячим оборудованием, острыми предметами.</li><li>Реагировать немедленно на любое нарушение, не дожидаясь, что «обойдётся».</li><li>Поддерживать порядок на полу (отсутствие пролитой жидкости, скользких поверхностей).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. На полу за баром пролита вода, и сотрудники продолжают ходить через эту зону, не вытирая лужу немедленно, потому что «заняты потоком». Разбор. Мокрый пол - прямой риск падения и травмы, и отложенная уборка даже на несколько минут создаёт реальную опасность для команды. Действия. 1) Немедленно (лично или поручив свободному человеку) убрать лужу, прежде чем заниматься чем-либо ещё. 2) Поставить предупреждающий знак, если уборка не моментальна. 3) Напомнить команде: безопасность - приоритет даже выше скорости обслуживания в моменте, когда есть прямой риск травмы.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - откладывать устранение очевидной опасности (мокрый пол, незакреплённое оборудование) на «когда будет свободная минута».</div></div><h4>13. Фиксировать нарушения дисциплины и докладывать управляющему</h4><p class="kb-italic">Что это значит на практике: Менеджер не принимает финальные дисциплинарные решения (это зона управляющего и HR), но обязан точно фиксировать факты, чтобы решение можно было принять обоснованно.</p><p><strong>Как действовать:</strong></p><ul><li>Записывать нарушение сразу после факта: дата, время, что произошло, кто свидетель.</li><li>Передавать информацию управляющему оперативно, а не накапливать «на потом».</li><li>Быть объективным в описании, избегая личных оценок и эмоций в фиксации.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник систематически опаздывает на 5-10 минут, но менеджер не фиксирует это письменно, считая, что «и так все знают». Разбор. Без письменной фиксации управляющему сложно принять обоснованное дисциплинарное решение - устные жалобы выглядят менее весомо и сложно восстановить точную хронологию нарушений. Действия. 1) Начать вести простую запись (дата, на сколько минут опоздание) с этого момента. 2) Передать управляющему собранные факты за прошедший период. 3) В дальнейшем фиксировать каждое нарушение сразу в момент его обнаружения, а не пытаться вспомнить потом.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - полагаться на память и устные жалобы вместо системной письменной фиксации фактов нарушения.</div></div><h3>УЧЁТ РАБОЧЕГО ВРЕМЕНИ</h3><h4>14. Вести и своевременно передавать управляющему данные для табеля учёта рабочего времени</h4><p class="kb-italic">Что это значит на практике: Точность данных от менеджера - основа корректного расчёта зарплаты команды. Ошибка здесь прямо бьёт по доходу конкретных людей.</p><p><strong>Как действовать:</strong></p><ul><li>Фиксировать фактическое время начала/окончания смены каждого сотрудника, а не ориентироваться только на график.</li><li>Передавать данные управляющему регулярно (например, по итогам каждой смены или раз в несколько дней), а не накапливать на конец месяца.</li><li>Перепроверять данные перед передачей, особенно по нестандартным случаям (подработки, замены, переработки).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер забывает зафиксировать, что один из сотрудников отработал дополнительные два часа из-за подмены коллеги, и эта информация не попадает в табель. Разбор. Без своевременной фиксации сотрудник просто не получит оплату за реально отработанное время, что несправедливо и демотивирует. Действия. 1) Немедленно восстановить и передать управляющему точную информацию о переработке. 2) Извиниться перед сотрудником и объяснить, что вопрос будет решён в следующей выплате. 3) Ввести для себя привычку фиксировать любые отклонения от стандартного графика сразу в момент, когда они происходят, а не вспоминать в конце смены.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - фиксировать рабочее время «по памяти» в конце смены, когда детали (особенно нестандартные часы) легко забываются.</div></div><h4>15. Контролировать фактическое время начала и окончания смены сотрудниками</h4><p class="kb-italic">Что это значит на практике: Это конкретное ежедневное действие - отметить, когда реально сотрудник начал и закончил работу, независимо от того, что написано в графике.</p><p><strong>Как действовать:</strong></p><ul><li>Использовать систему учёта (если есть) или фиксировать вручную фактическое время.</li><li>Сверять фактическое время с плановым графиком, отмечая отклонения.</li><li>Не позволять задним числом корректировать время без объективной причины.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Сотрудник просит менеджера отметить в системе, что он начал смену вовремя, хотя реально пришёл на 15 минут позже, обещая «отработать в следующий раз». Разбор. Согласие на искажение фактических данных, даже из лучших побуждений (не хочется наказывать хорошего сотрудника), создаёт прецедент недостоверного учёта и риск для самого менеджера, если это будет обнаружено при проверке. Действия. 1) Зафиксировать фактическое время прихода, как было на самом деле. 2) Отдельно поговорить с сотрудником о причине опоздания и напомнить о важности пунктуальности. 3) Не идти на компромисс с точностью данных учёта времени, даже по личной просьбе сотрудника.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - искажать фактические данные учёта времени из желания не создавать сотруднику проблему, что подрывает достоверность всей системы учёта.</div></div>'},
        {title:'БЛОК: ПРОЦЕССЫ', body:'<p>Блок «Процессы» для менеджера смены - это конкретные, повторяющиеся операционные ритуалы: открытие и закрытие точки, контроль кассы и оборудования, журналы. В отличие от ТУ, который выстраивает процессы на уровне точки в целом, менеджер исполняет и контролирует их исполнение именно в рамках своей смены, без права на пропуск ни одного шага.</p><p><strong>Зона ответственности</strong></p><p>За открытие и закрытие смены. За операционные процессы на точке во время смены. За исправность оборудования на смене. За соблюдение кассовой дисциплины.</p><p><strong>Метрики и ожидаемые результаты</strong></p><ul><li>Время открытия/закрытия смены</li><li>Отсутствие сбоев и простоев на смене</li><li>Время реакции на неисправность оборудования</li><li>Отсутствие кассовых нарушений -----------------------------------------------------------------------</li></ul><h3>ОТКРЫТИЕ И ЗАКРЫТИЕ СМЕНЫ</h3><h4>1. Открывать точку в соответствии с чек-листом открытия (готовность оборудования, выкладка, касса)</h4><p class="kb-italic">Что это значит на практике: Открытие смены - это не «прийти и начать работать», а структурированная последовательность проверок, которая гарантирует, что точка готова принять первого Гостя без сбоев.</p><p><strong>Как действовать:</strong></p><ul><li>Идти по чек-листу пошагово, не пропускать пункты «потому что вроде всё в порядке».</li><li>Проверять оборудование на готовность к работе (прогрев кофемашины, исправность техники).</li><li>Сверять кассу на старте - наличие необходимой суммы для расчётов, исправность терминала.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер торопится и открывает точку без полной проверки по чек-листу, понадеявшись, что «вчера всё было в порядке», а в итоге через час выясняется, что кофемашина не до конца прогрелась и первые напитки получаются неоднородного качества. Разбор. Пропуск даже одного пункта чек-листа экономит пару минут, но создаёт риск, который проявляется уже при первых Гостях, когда исправить ситуацию сложнее и заметнее. Действия. 1) Срочно дать машине время на полный прогрев, временно скорректировав скорость обслуживания. 2) Извиниться перед затронутыми Гостями и предложить замену напитка при необходимости. 3) Возобновить строгое следование чек-листу открытия без исключений, даже при нехватке времени.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - воспринимать чек-лист открытия как формальность, которую можно сократить, если «вроде всё было в порядке накануне».</div></div><h4>2. Закрывать точку в соответствии с чек-листом закрытия (уборка, сдача кассы, выключение оборудования)</h4><p class="kb-italic">Что это значит на практике: Закрытие смены так же критично, как открытие: ошибка здесь (не выключенное оборудование, неправильно сданная касса) создаёт проблему уже для следующей смены или для безопасности точки в нерабочее время.</p><p><strong>Как действовать:</strong></p><ul><li>Идти по чек-листу закрытия так же тщательно, как по открытию, не торопясь из желания быстрее уйти домой.</li><li>Сверять кассу точно, без приближённых оценок «на глаз».</li><li>Проверять, что всё оборудование, требующее выключения, действительно выключено.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В конце долгой и утомительной смены менеджер быстро проходит по чек-листу закрытия, не проверяя внимательно, и забывает выключить одно из вспомогательных устройств, которое работает всю ночь впустую. Разбор. Усталость в конце смены - главный риск для качественного закрытия, именно поэтому строгое следование чек-листу важнее личного ощущения «я и так помню, что нужно сделать». Действия. 1) Если ошибка обнаружена утром следующей смены - немедленно исправить и сообщить о случившемся. 2) Использовать чек-лист буквально, отмечая каждый пункт галочкой, а не полагаясь на память в конце смены. 3) При системной усталости к концу смены - поднять вопрос с управляющим о возможной корректировке графика или распределении задач закрытия между двумя людьми.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - ускорять или сокращать процедуру закрытия именно в конце смены, когда внимание и так уже снижено из-за усталости.</div></div><h4>3. Проверять готовность точки к приёму Гостей перед открытием</h4><p class="kb-italic">Что это значит на практике: Финальная проверка перед тем, как открыть двери - взгляд на точку глазами первого Гостя дня: чисто, аккуратно, всё на месте.</p><p><strong>Как действовать:</strong></p><ul><li>Пройти по залу за несколько минут до открытия, оценивая визуальное состояние.</li><li>Проверить, что меню, ценники и рекламные материалы на месте и актуальны.</li><li>Убедиться, что вся команда готова и расставлена по местам.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. За пять минут до открытия менеджер замечает, что не выставлена свежая выпечка на витрину, потому что сотрудник отвлёкся на другую задачу. Разбор. Без финальной проверки этот пробел был бы замечен только первым Гостем, что создаёт негативное первое впечатление в самом начале дня. Действия. 1) Немедленно выставить выпечку до открытия дверей. 2) Включить проверку витрины в личный финальный обход перед открытием как обязательный пункт. 3) Уточнить с сотрудником, что отвлекло его от задачи, чтобы избежать повторения.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - открывать точку по времени строго по графику, не уделяя последние минуты финальной визуальной проверке готовности.</div></div><h3>ОПЕРАЦИОННЫЕ ПРОЦЕССЫ СМЕНЫ</h3><h4>4. Контролировать кассовую дисциплину и порядок расчёта с Гостями на смене</h4><p class="kb-italic">Что это значит на практике: Менеджер следит, чтобы каждая операция с деньгами на смене проводилась корректно - это защита и Гостя, и компании, и самого сотрудника от ошибок и подозрений.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически наблюдать за процессом расчёта с Гостями.</li><li>Проверять, что чеки выдаются корректно, скидки и акции применяются правильно.</li><li>Реагировать сразу при любом отклонении от стандартного порядка расчёта.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Бариста в спешке забывает выдать чек нескольким Гостям подряд, торопясь обслужить очередь быстрее. Разбор. Это не злой умысел, а следствие давления скорости, но накопление таких ошибок создаёт риски при кассовой сверке и потенциальное недовольство Гостей, которым может понадобиться чек. Действия. 1) В моменте напомнить бариста у о необходимости выдавать чек каждому Гостю. 2) Помочь разгрузить поток (подключиться самому или попросить помощи), чтобы бариста не чувствовал необходимости жертвовать процедурой ради скорости. 3) После смены кратко обсудить с бариста ом важность этого правила без излишней строгости, понимая контекст спешки.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - реагировать на нарушение кассовой дисциплины только при кассовой сверке в конце смены, а не замечать его в моменте, когда легче исправить.</div></div><h4>5. Контролировать соблюдение технологии приготовления напитков и блюд на смене</h4><p class="kb-italic">Что это значит на практике: В отличие от пункта про качество в блоке «Сервис» (контроль готового результата), здесь фокус на процессе - соблюдается ли сама технология (порядок действий, температура, время), а не только то, как выглядит готовый напиток.</p><p><strong>Как действовать:</strong></p><ul><li>Периодически наблюдать сам процесс приготовления, а не только проверять результат.</li><li>Сверять с технологическими картами, если есть сомнения в правильности процесса.</li><li>Обращать внимание на распространённые отклонения (пропуск шага для скорости, неправильная температура).</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Бариста готовит напиток быстрее обычного, и при наблюдении выясняется, что он пропускает этап взбивания молока до нужной консистенции, чтобы сэкономить время. Разбор. Конечный напиток может визуально выглядеть приемлемо, но нарушение технологии повлияет на вкус и консистенцию, что Гость заметит при дегустации, даже если не сразу при выдаче. Действия. 1) В моменте остановить и показать правильную технологию, объяснив, на что она влияет во вкусе. 2) Понаблюдать за следующими несколькими напитками этого бариста, чтобы убедиться в исправлении. 3) Включить этот момент в следующую пятиминутку как напоминание для всей команды.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - оценивать качество работы только по внешнему виду готового напитка, не наблюдая сам процесс приготовления.</div></div><h4>6. Вести журналы и отчётность по смене (явки, температурные режимы, чек-листы и др.)</h4><p class="kb-italic">Что это значит на практике: Журналы - это не бюрократия, а ежедневное документальное доказательство того, что процессы реально соблюдались, что критично при любой внешней проверке.</p><p><strong>Как действовать:</strong></p><ul><li>Заполнять журналы в течение смены, в момент проведения проверки, а не задним числом в конце дня.</li><li>Быть точным и честным в записях, даже если показатель не идеальный.</li><li>Хранить журналы в порядке, доступном для проверки в любой момент.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. В конце смены менеджер обнаруживает, что не заполнил температурный журнал холодильников за весь день, и заполняет его задним числом «по примерным значениям». Разбор. Заполнение журнала задним числом по приближённым данным - это фактически создание недостоверного документа, который не отражает реальный контроль, даже если показатели, скорее всего, были в порядке. Действия. 1) В этой ситуации честно отметить факт пропуска, а не подделывать данные, и сообщить управляющему о произошедшем сбое в процессе. 2) Установить себе конкретные временные точки в течение смены для заполнения журнала (например, при каждой плановой проверке оборудования). 3) Использовать напоминания (будильник, чек-лист на бумаге), чтобы не забывать о регулярном заполнении.</div></div><div class="error-box"><div class="box-label">⚠️ ТИПИЧНАЯ ОШИБКА</div><div class="box-body">Ошибка - заполнять журналы «задним числом» по приближённым или придуманным значениям вместо честной фиксации реального пропуска контроля.</div></div><h4>7. Соблюдать и контролировать соблюдение сотрудниками регламентов, установленных на предприятии</h4><p class="kb-italic">Что это значит на практике: Менеджер - пример соблюдения правил для команды на смене; любое личное отступление от регламента подрывает требовательность к остальным.</p><p><strong>Как действовать:</strong></p><ul><li>Знать действующие регламенты компании, относящиеся к смене.</li><li>Соблюдать их лично, даже когда «никто не видит» и это неудобно.</li><li>Требовать соблюдения от команды последовательно, без исключений.</li></ul><div class="case-box"><div class="box-label">📋 КЕЙС</div><div class="box-body">Ситуация. Менеджер лично нарушает один из регламентов (например, не соблюдает порядок открытия кассы), считая его неудобным, а команда видит это расхождение между требованиями к ним и поведением самого менеджера. Разбор. Подобное поведение разрушает авторитет менеджера, когда он позже требует от команды строгого соблюдения других правил - двойные стандарты быстро становятся заметны. Действия. 1) Вернуться к соблюдению регламента лично, даже если это неудобно. 2) Если регламент действительно создаёт практические сложности - поднять вопрос с управляющим официально, а не игнорировать молча. 3) Транслировать команде только то поведение, которое сам менеджер готов
